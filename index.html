<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RAVY</title>

<style>
body{
  margin:0;
  height:100vh;
  background:radial-gradient(circle at top,#0f2027,#000);
  font-family:system-ui, Arial;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
}
#inicio{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}
#btnInicio{
  padding:28px 90px;
  font-size:30px;
  font-weight:600;
  border:none;
  border-radius:60px;
  background:linear-gradient(135deg,#00f2ff,#007bff);
  cursor:pointer;
  box-shadow:0 0 40px #00f2ff88;
  transition:.3s;
}
#btnInicio:hover{ transform:scale(1.08); }

#ravy{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

#avatar{
  width:160px;
  height:160px;
  border-radius:50%;
  background:radial-gradient(circle at top,#00f2ff,#004d66);
  box-shadow:0 0 45px #00f2ff88;
  animation:respirar 4s ease-in-out infinite;
}
.hablando{ animation:hablar .35s infinite alternate; }

@keyframes respirar{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.04); }
}
@keyframes hablar{
  from{ transform:scale(1.02); }
  to{ transform:scale(1.09); }
}

#estado{ font-size:15px; opacity:.85; }

.panel{ display:flex; gap:18px; }

.btn{
  min-width:140px;
  padding:15px 22px;
  border:none;
  border-radius:18px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:.25s;
}
.btn:active{ transform:scale(0.95); }

.listen{
  background:linear-gradient(135deg,#00ffb3,#00b37a);
}
.think{
  background:linear-gradient(135deg,#00aaff,#0066cc);
}
.sleep{
  background:linear-gradient(135deg,#ff4d4d,#b30000);
  width:240px;
}
</style>
</head>

<body>

<div id="inicio">
  <button id="btnInicio">RAVY</button>
</div>

<div id="ravy">
  <div id="avatar"></div>
  <div id="estado">Modo reposo</div>

  <div class="panel">
    <button class="btn listen" onclick="escuchar()">🎤 Escuchar</button>
    <button class="btn think" onclick="responder()">🧠 Responder</button>
  </div>

  <button class="btn sleep" onclick="reposo()">💤 Reposo</button>
</div>

<script>
/* ================= MEMORIA BASE ================= */
let memoriaRavy = JSON.parse(localStorage.getItem("memoriaRavy")) || {
  usuario:{ nombre:"" },
  corto:[],
  largo:[],
  resumen:"",
  trato:"neutral",

  /* 🔥 NIVEL 22: MEMORIA EMOCIONAL */
  emocion:{
    alegria:60,
    respeto:100,
    confianza:50
  }
};

function guardar(){
  localStorage.setItem("memoriaRavy",JSON.stringify(memoriaRavy));
}

/* ================= VOZ ================= */
function hablar(texto){
  const voz = new SpeechSynthesisUtterance(texto);
  voz.lang="es-ES";

  // 🎭 tono emocional
  voz.rate = memoriaRavy.emocion.confianza > 60 ? 0.9 : 1;
  voz.pitch = memoriaRavy.emocion.alegria > 60 ? 1.05 : 0.95;

  speechSynthesis.cancel();
  avatar.classList.add("hablando");
  speechSynthesis.speak(voz);
  voz.onend=()=>avatar.classList.remove("hablando");
}

/* ================= OÍDO ================= */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SR();
recognition.lang="es-ES";
recognition.continuous=false;

let ultimaEntrada="";

recognition.onresult=e=>{
  ultimaEntrada=e.results[0][0].transcript.toLowerCase();
  estado.textContent="Escuchado. Pulsa responder.";

  analizarEmocion(ultimaEntrada);

  memoriaRavy.corto.push(ultimaEntrada);
  if(memoriaRavy.corto.length>5){
    crearResumen();
    memoriaRavy.corto=[];
  }
  guardar();
};

/* ================= EMOCIÓN NIVEL 22 ================= */
function analizarEmocion(t){
  if(t.includes("gracias")||t.includes("por favor")){
    memoriaRavy.emocion.confianza+=5;
    memoriaRavy.emocion.alegria+=3;
  }
  if(t.length<4){
    memoriaRavy.emocion.confianza-=2;
  }

  memoriaRavy.emocion.confianza =
    Math.max(0,Math.min(100,memoriaRavy.emocion.confianza));
  memoriaRavy.emocion.alegria =
    Math.max(0,Math.min(100,memoriaRavy.emocion.alegria));
}

/* ================= MEMORIA ================= */
function crearResumen(){
  memoriaRavy.resumen =
    "Hemos hablado de: " +
    memoriaRavy.corto.slice(-3).join(", ");
}

/* ================= RESPUESTA ================= */
function responder(){
  if(!ultimaEntrada){
    hablar("Te escucho.");
    return;
  }

  let r="";

  if(ultimaEntrada.includes("hola")||ultimaEntrada.includes("buenos")){
    r = memoriaRavy.emocion.confianza>60
      ? "Hola, me alegra escucharte."
      : "Hola. Aquí estoy.";
  }
  else if(ultimaEntrada.includes("hora")){
    const d=new Date();
    r=`Son las ${d.getHours()} y ${d.getMinutes()}.`;
  }
  else if(ultimaEntrada.includes("recuerdas")){
    r = memoriaRavy.resumen || "Aún estoy formando recuerdos.";
  }
  else{
    r="Te escucho.";
  }

  hablar(r);
  ultimaEntrada="";
}

/* ================= CONTROLES ================= */
function escuchar(){
  estado.textContent="Escuchando...";
  recognition.start();
}
function reposo(){
  ultimaEntrada="";
  document.getElementById("ravy").style.display="none";
  document.getElementById("inicio").style.display="flex";
}

/* ================= INICIO ================= */
btnInicio.onclick=()=>{
  document.getElementById("inicio").style.display="none";
  document.getElementById("ravy").style.display="flex";
  estado.textContent="Aquí está RAVY, tu asistente personal.";
  hablar("Aquí está RAVY, tu asistente personal.");
};
</script>

</body>
</html>
