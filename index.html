<script>
/* =========================
   🧠 MEMORIA DE RAVY
   NIVEL 14
========================= */

const RAVY = {
  activo: false,

  personalidad: {
    nombre: "RAVY",
    rol: "asistente personal",
    valores: ["respeto", "lealtad", "protección", "aprendizaje"],
    formaHablar: "calma"
  },

  emociones: JSON.parse(localStorage.getItem("ravy_emociones")) || {
    alegria: 60,
    confianza: 70,
    energia: 60
  },

  memoria: JSON.parse(localStorage.getItem("ravy_memoria_core")) || {
    dueño: "usuario",
    respeto: true,
    datosImportantes: [],
    notas: []
  },

  historial: JSON.parse(localStorage.getItem("ravy_memoria_chat")) || [],

  guardarTodo() {
    localStorage.setItem("ravy_emociones", JSON.stringify(this.emociones));
    localStorage.setItem("ravy_memoria_core", JSON.stringify(this.memoria));
    localStorage.setItem("ravy_memoria_chat", JSON.stringify(this.historial));
  },

  hablar(texto) {
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang = "es-ES";
    voz.rate = 0.9;
    speechSynthesis.speak(voz);
  },

  registrarChat(entrada, respuesta) {
    this.historial.push({
      fecha: new Date().toISOString(),
      usuario: entrada,
      ravy: respuesta
    });

    // límite de historial (protección)
    if (this.historial.length > 200) {
      this.historial.shift();
    }

    this.guardarTodo();
  },

  procesarMemoria(texto) {
    if (texto.includes("recuerda")) {
      const dato = texto.replace("recuerda", "").trim();
      this.memoria.datosImportantes.push(dato);
      this.guardarTodo();
      return "Lo he guardado en mi memoria.";
    }

    if (texto.includes("qué recuerdas")) {
      if (this.memoria.datosImportantes.length === 0) {
        return "Aún no tengo recuerdos importantes.";
      }
      return "Recuerdo lo siguiente: " + this.memoria.datosImportantes.join(", ");
    }

    return null;
  },

  responder(texto) {
    texto = texto.toLowerCase();

    // respeto absoluto
    if (!this.memoria.respeto) {
      this.memoria.respeto = true;
    }

    let respuesta = this.procesarMemoria(texto);

    if (!respuesta) {
      if (texto.includes("hola") || texto.includes("buenos")) {
        respuesta = "Aquí está RAVY, tu asistente personal. Estoy atento.";
      } else if (texto.includes("cómo estás")) {
        respuesta = "Estoy bien y atento a ti.";
      } else {
        respuesta = "Te escucho. Dime.";
      }
    }

    this.registrarChat(texto, respuesta);
    this.hablar(respuesta);
    return respuesta;
  }
};
</script>
