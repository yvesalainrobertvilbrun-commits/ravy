<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Vivo</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}
#overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}
button{
  width:120px;
  height:120px;
  border-radius:50%;
  border:none;
  font-size:22px;
  font-weight:bold;
  color:white;
  background:linear-gradient(145deg,#00ffff,#008cff);
  box-shadow:0 0 30px #00aaff;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="overlay">
  <button id="activar">RAVY</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
// =======================
// 🌌 ESCENA
// =======================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.7));
const luz = new THREE.DirectionalLight(0xffffff,1);
luz.position.set(5,10,7);
scene.add(luz);

// =======================
// 🧍 CUERPO
// =======================
const cuerpo = new THREE.Group();
scene.add(cuerpo);

const piel = new THREE.MeshStandardMaterial({color:0xffd1b3});
const ropa = new THREE.MeshStandardMaterial({color:0x00aaff});

// Cabeza
const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.5,32,32),piel);
cabeza.position.y = 1.6;
cuerpo.add(cabeza);

// OJOS
const ojoMat = new THREE.MeshStandardMaterial({color:0xffffff});
const irisMat = new THREE.MeshStandardMaterial({color:0x000000});

const ojoIzq = new THREE.Mesh(new THREE.SphereGeometry(0.08,16,16),ojoMat);
const ojoDer = new THREE.Mesh(new THREE.SphereGeometry(0.08,16,16),ojoMat);
ojoIzq.position.set(-0.15,1.65,0.45);
ojoDer.position.set(0.15,1.65,0.45);

const irisIzq = new THREE.Mesh(new THREE.SphereGeometry(0.04,16,16),irisMat);
const irisDer = new THREE.Mesh(new THREE.SphereGeometry(0.04,16,16),irisMat);
irisIzq.position.set(-0.15,1.65,0.52);
irisDer.position.set(0.15,1.65,0.52);

cuerpo.add(ojoIzq, ojoDer, irisIzq, irisDer);

// BOCA
const boca = new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.08,0.05),
  new THREE.MeshStandardMaterial({color:0xff5555})
);
boca.position.set(0,1.45,0.45);
cuerpo.add(boca);

// TORSO
const torso = new THREE.Mesh(
  new THREE.CylinderGeometry(0.45,0.45,1.2,32),
  ropa
);
torso.position.y = 0.5;
cuerpo.add(torso);

// =======================
// 🧠 CEREBRO + RESPETO
// =======================
const RAVY = {
  activo:false,

  emociones:{
    alegria:50,
    confianza:70,
    energia:50
  },

  hablar(texto){
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    voz.rate=0.9;
    speechSynthesis.speak(voz);
  },

  procesar(texto){
    texto = texto.toLowerCase();

    if(texto.includes("gracias")){
      this.emociones.alegria += 5;
      return "Siempre estaré contigo.";
    }

    if(texto.includes("hola")){
      return "Hola. Estoy aquí, tranquilo contigo.";
    }

    return "Te escucho.";
  }
};

// =======================
// 👂 OÍDO
// =======================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.continuous=true;
  recognition.onresult = e=>{
    if(!RAVY.activo) return;
    const texto = e.results[e.results.length-1][0].transcript;
    RAVY.hablar(RAVY.procesar(texto));
  };
}

// =======================
// ❤️ VIDA (RESPIRACIÓN + CARA)
// =======================
let tiempo = 0;

function actualizarVida(){
  tiempo += 0.02;

  // respiración
  torso.scale.y = 1 + Math.sin(tiempo) * 0.03;

  // boca emocional
  boca.scale.x = 1 + RAVY.emociones.alegria/200;
  boca.scale.y = 0.8 + RAVY.emociones.energia/200;

  // parpadeo suave
  const parpadeo = Math.abs(Math.sin(tiempo*0.5))*0.1;
  ojoIzq.scale.y = 1 - parpadeo;
  ojoDer.scale.y = 1 - parpadeo;
}

// =======================
// 🎬 LOOP
// =======================
function animar(){
  requestAnimationFrame(animar);
  actualizarVida();
  renderer.render(scene,camera);
}

// =======================
// 🔘 ACTIVAR
// =======================
document.getElementById("activar").onclick = ()=>{
  document.getElementById("overlay").style.display="none";
  RAVY.activo=true;
  if(recognition) recognition.start();
  RAVY.hablar("Estoy aquí. Respira conmigo.");
  animar();
};

addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
