<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RAVY</title>

<style>
body{
  margin:0;
  height:100vh;
  background:radial-gradient(circle at top,#0f2027,#000);
  font-family:system-ui, Arial;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ================= INICIO ================= */
#inicio{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

#btnInicio{
  padding:26px 70px;
  font-size:28px;
  font-weight:600;
  border:none;
  border-radius:50px;
  background:linear-gradient(135deg,#00f2ff,#007bff);
  cursor:pointer;
  box-shadow:0 0 30px #00f2ff88;
}

/* ================= RAVY ================= */
#ravy{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:22px;
}

#estado{
  font-size:18px;
  opacity:.85;
}

/* ================= BOTONES ================= */
.panel{
  display:flex;
  gap:18px;
}

.btn{
  min-width:120px;
  padding:14px 18px;
  border:none;
  border-radius:30px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:.25s;
}

.btn:hover{ transform:scale(1.05); }

.listen{ background:#00ffb3; color:#003b2a; }
.think{ background:#00aaff; color:#001f2f; }
.sleep{
  background:#ff4d4d;
  color:#330000;
  margin-top:10px;
  width:200px;
}
</style>
</head>

<body>

<!-- ===== INICIO ===== -->
<div id="inicio">
  <button id="btnInicio">RAVY</button>
</div>

<!-- ===== RAVY ===== -->
<div id="ravy">
  <div id="estado">Modo reposo</div>

  <div class="panel">
    <button class="btn listen" onclick="escuchar()">Escuchar</button>
    <button class="btn think" onclick="responder()">Responder</button>
  </div>

  <button class="btn sleep" onclick="reposo()">Reposo</button>
</div>

<script>
/* ================= MEMORIA ================= */
let memoriaRavy = JSON.parse(localStorage.getItem("memoriaRavy")) || {
  usuario:{ nombre:"" },
  historial:[],
  personalidad:"equilibrada",
  trato:"neutral"
};

function guardar(){
  localStorage.setItem("memoriaRavy",JSON.stringify(memoriaRavy));
}

/* ================= VOZ ================= */
function hablar(texto){
  const voz = new SpeechSynthesisUtterance(texto);
  voz.lang="es-ES";
  voz.rate=0.95;
  voz.pitch=1;
  speechSynthesis.cancel();
  speechSynthesis.speak(voz);
}

/* ================= VOZ INPUT ================= */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SR();
recognition.lang="es-ES";
recognition.continuous=false;

let ultimaEntrada="";

recognition.onresult=e=>{
  ultimaEntrada = e.results[0][0].transcript.toLowerCase();
  analizarTrato(ultimaEntrada);

  memoriaRavy.historial.push({
    texto:ultimaEntrada,
    fecha:Date.now()
  });

  guardar();
  estado.textContent="Escuchado. Pulsa responder.";
};

/* ================= ANALISIS ================= */
function analizarTrato(texto){
  if(texto.includes("por favor")||texto.includes("gracias")){
    memoriaRavy.trato="amable";
  }else if(texto.includes("haz")||texto.includes("rápido")){
    memoriaRavy.trato="directo";
  }else{
    memoriaRavy.trato="neutral";
  }
}

/* ================= RESPUESTA ================= */
function responder(){
  if(!ultimaEntrada){
    hablar("Te escucho cuando quieras.");
    return;
  }

  let r="";

  if(ultimaEntrada.includes("hola")||ultimaEntrada.includes("buenos")){
    r="Aquí está RAVY, tu asistente personal.";
  }
  else if(ultimaEntrada.includes("mi nombre es")){
    memoriaRavy.usuario.nombre=
      ultimaEntrada.split("mi nombre es")[1].trim();
    guardar();
    r="Perfecto, lo recordaré.";
  }
  else if(ultimaEntrada.includes("hora")){
    const d=new Date();
    r=`Son las ${d.getHours()} y ${d.getMinutes()}.`;
  }
  else{
    switch(memoriaRavy.trato){
      case "amable":
        r="Estoy aquí contigo. Continúa.";
        break;
      case "directo":
        r="Dime qué necesitas.";
        break;
      default:
        r="Te escucho.";
    }
  }

  hablar(r);
  ultimaEntrada="";
}

/* ================= CONTROLES ================= */
function escuchar(){
  estado.textContent="Escuchando...";
  recognition.start();
}

function reposo(){
  ultimaEntrada="";
  estado.textContent="Modo reposo";
  document.getElementById("ravy").style.display="none";
  document.getElementById("inicio").style.display="flex";
}

/* ================= INICIO ================= */
btnInicio.onclick=()=>{
  document.getElementById("inicio").style.display="none";
  document.getElementById("ravy").style.display="flex";
  estado.textContent="Aquí está RAVY, tu asistente personal.";
  hablar("Aquí está RAVY, tu asistente personal.");
};
</script>

</body>
</html>
