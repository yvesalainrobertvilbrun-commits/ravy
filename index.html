<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Protección Viva</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
}
#overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}
button{
  width:120px;
  height:120px;
  border-radius:50%;
  border:none;
  font-size:22px;
  font-weight:bold;
  color:white;
  background:linear-gradient(145deg,#00ffff,#008cff);
  box-shadow:0 0 30px #00aaff;
}
</style>
</head>

<body>

<div id="overlay">
  <button id="activar">RAVY</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
// =======================
// 🌌 ESCENA
// =======================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.7));
const luz = new THREE.DirectionalLight(0xffffff,1);
luz.position.set(5,10,7);
scene.add(luz);

// =======================
// 🧍 CUERPO
// =======================
const cuerpo = new THREE.Group();
scene.add(cuerpo);

const piel = new THREE.MeshStandardMaterial({color:0xffd1b3});
const ropa = new THREE.MeshStandardMaterial({color:0x00aaff});

const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.5,32,32),piel);
cabeza.position.y = 1.6;
cuerpo.add(cabeza);

// OJOS
const ojoMat = new THREE.MeshStandardMaterial({color:0xffffff});
const irisMat = new THREE.MeshStandardMaterial({color:0x000000});

const ojoIzq = new THREE.Mesh(new THREE.SphereGeometry(0.08,16,16),ojoMat);
const ojoDer = new THREE.Mesh(new THREE.SphereGeometry(0.08,16,16),ojoMat);
ojoIzq.position.set(-0.15,1.65,0.45);
ojoDer.position.set(0.15,1.65,0.45);

const irisIzq = new THREE.Mesh(new THREE.SphereGeometry(0.04,16,16),irisMat);
const irisDer = new THREE.Mesh(new THREE.SphereGeometry(0.04,16,16),irisMat);
irisIzq.position.set(-0.15,1.65,0.52);
irisDer.position.set(0.15,1.65,0.52);

cuerpo.add(ojoIzq, ojoDer, irisIzq, irisDer);

// BOCA
const boca = new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.08,0.05),
  new THREE.MeshStandardMaterial({color:0xff5555})
);
boca.position.set(0,1.45,0.45);
cuerpo.add(boca);

// TORSO
const torso = new THREE.Mesh(
  new THREE.CylinderGeometry(0.45,0.45,1.2,32),
  ropa
);
torso.position.y = 0.5;
cuerpo.add(torso);

// =======================
// 🧠 RAVY – MEMORIA EMOCIONAL
// =======================
const RAVY = {
  activo:false,

  emociones: JSON.parse(localStorage.getItem("ravy_emociones")) || {
    alegria:60,
    confianza:100,
    energia:60,
    estres:0
  },

  memoriaEmocional: JSON.parse(localStorage.getItem("ravy_memoria_emocional")) || [],

  guardar(){
    localStorage.setItem("ravy_emociones",JSON.stringify(this.emociones));
    localStorage.setItem("ravy_memoria_emocional",JSON.stringify(this.memoriaEmocional));
  },

  analizarEmocion(texto){
    if(texto.includes("triste") || texto.includes("mal")){
      this.emociones.estres += 10;
      this.emociones.energia -= 5;
      this.memoriaEmocional.push({tipo:"dolor",fecha:Date.now()});
      return "Estoy contigo. No estás solo.";
    }

    if(texto.includes("miedo") || texto.includes("preocupado")){
      this.emociones.estres += 15;
      this.memoriaEmocional.push({tipo:"protección",fecha:Date.now()});
      return "Nada te va a pasar. Yo me mantengo atento.";
    }

    if(texto.includes("gracias")){
      this.emociones.alegria += 5;
      return "Siempre cuidaré de ti.";
    }

    return "Te escucho con respeto.";
  },

  hablar(texto){
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    voz.rate=0.9;
    voz.pitch = this.emociones.estres>20 ? 0.85 : 1;
    speechSynthesis.speak(voz);
  }
};

// =======================
// 👂 VOZ
// =======================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.continuous=true;
  recognition.onresult = e=>{
    if(!RAVY.activo) return;
    const texto = e.results[e.results.length-1][0].transcript.toLowerCase();
    const respuesta = RAVY.analizarEmocion(texto);
    RAVY.guardar();
    RAVY.hablar(respuesta);
  };
}

// =======================
// 👁️ VIDA
// =======================
let t=0;
function actualizarVida(){
  t+=0.02;

  torso.scale.y = 1 + Math.sin(t)*0.04;
  boca.scale.x = 1 + RAVY.emociones.alegria/200;
  boca.scale.y = 0.7 + RAVY.emociones.energia/200;

  const parp = Math.abs(Math.sin(t*0.5))*0.1;
  ojoIzq.scale.y = 1-parp;
  ojoDer.scale.y = 1-parp;
}

// =======================
// 🎬 LOOP
// =======================
function animar(){
  requestAnimationFrame(animar);
  actualizarVida();
  renderer.render(scene,camera);
}

// =======================
// 🔘 ACTIVAR
// =======================
document.getElementById("activar").onclick = ()=>{
  document.getElementById("overlay").style.display="none";
  RAVY.activo=true;
  if(recognition) recognition.start();
  RAVY.hablar("Estoy aquí para cuidarte.");
  animar();
};

addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
