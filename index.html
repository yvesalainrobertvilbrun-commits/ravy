<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAVY</title>
  <style>
    body {
      background: black;
      color: #00aaff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px;
    }
    input {
      padding: 12px;
      width: 90%;
      max-width: 400px;
      border-radius: 8px;
      border: none;
      margin-bottom: 15px;
      font-size: 16px;
    }
    button {
      background: #00aaff;
      color: black;
      border: none;
      padding: 12px 18px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    /* CUERPO VISUAL MEJORADO DE RAVY */
    #cuerpo-ravy {
      width: 200px;
      height: 200px;
      margin: 20px auto;
      border-radius: 50%;
      background: radial-gradient(circle at center, rgba(0,170,255,0.7), rgba(0,170,255,0.2));
      box-shadow: 0 0 60px rgba(0,170,255,0.7), 0 0 120px rgba(0,170,255,0.3);
      animation: pulso 2s infinite ease-in-out;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    @keyframes pulso {
      0% { transform: scale(1); opacity: 0.6; }
      25% { transform: scale(1.05); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
      75% { transform: scale(1.05); opacity: 0.8; }
      100% { transform: scale(1); opacity: 0.6; }
    }
  </style>
</head>
<body>

  <h1>RAVY</h1>
  <p>Escríbeme algo</p>

  <div id="cuerpo-ravy"></div>

  <input id="entrada" placeholder="Habla conmigo..." />
  <br>
  <button onclick="responder()">Responder</button>

  <script>
    function responder() {
      const textoUsuario = document.getElementById("entrada").value.toLowerCase();
      let respuesta = "";
      let idioma = "es-ES";

      // Detectar idioma criollo haitiano
      if (textoUsuario.includes("bonjou") || textoUsuario.includes("kijan")) {
        respuesta = "Bonjou. Mwen la avèk ou. Mwen se RAVY.";
        idioma = "fr-FR";
      } 
      // Español
      else if (textoUsuario.includes("hola")) {
        respuesta = "Hola. Aquí está RAVY contigo.";
        idioma = "es-ES";
      } 
      else if (textoUsuario.includes("estado")) {
        respuesta = "Estoy activo, atento y evolucionando contigo.";
        idioma = "es-ES";
      } 
      else {
        respuesta = "Te escucho. Continúa.";
        idioma = "es-ES";
      }

      // Reproducir voz
      const voz = new SpeechSynthesisUtterance(respuesta);
      voz.lang = idioma;
      speechSynthesis.speak(voz);

      // Efecto visual de pulso más fuerte cuando habla
      const cuerpo = document.getElementById("cuerpo-ravy");
      cuerpo.style.transform = "scale(1.2)";
      cuerpo.style.boxShadow = "0 0 80px rgba(0,170,255,1), 0 0 150px rgba(0,170,255,0.5)";
      setTimeout(() => {
        cuerpo.style.transform = "";
        cuerpo.style.boxShadow = "";
      }, 500);
    }
  </script>

</body>
</html>
