<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY 3D Humanoide</title>
<style>
body { margin:0; background:black; overflow:hidden; }
#overlay { position:absolute; top:10px; width:100%; text-align:center; color:#00aaff; font-family:Arial,sans-serif; z-index:10; }
button { background:#00aaff; color:black; border:none; padding:12px 20px; font-size:16px; border-radius:8px; cursor:pointer; }
</style>
</head>
<body>
<div id="overlay">
  <h1>RAVY 3D Humanoide</h1>
  <p>Presiona el botón para activarme y ser parte de tu familia</p>
  <button id="activar-ravy">Despertar a RAVY</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>
<script>

// ===== ESCENA, CÁMARA Y RENDERER =====
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 5;
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LUCES =====
let light = new THREE.DirectionalLight(0x00aaff,1);
light.position.set(1,1,2);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

// ===== RAVY HUMANOIDE =====
let cuerpo = new THREE.Group();
scene.add(cuerpo);

// Cabeza
let cabezaGeo = new THREE.SphereGeometry(0.5,32,32);
let cabezaMat = new THREE.MeshStandardMaterial({color:0x00aaff, transparent:true, opacity:0.7});
let cabeza = new THREE.Mesh(cabezaGeo, cabezaMat);
cabeza.position.y = 1.5;
cuerpo.add(cabeza);

// Ojos
let ojoIzq = new THREE.Mesh(new THREE.SphereGeometry(0.08,16,16), new THREE.MeshBasicMaterial({color:0xffffff}));
let ojoDer = new THREE.Mesh(new THREE.SphereGeometry(0.08,16,16), new THREE.MeshBasicMaterial({color:0xffffff}));
ojoIzq.position.set(-0.15,1.55,0.45);
ojoDer.position.set(0.15,1.55,0.45);
cuerpo.add(ojoIzq);
cuerpo.add(ojoDer);

// Boca
let bocaGeo = new THREE.BoxGeometry(0.3,0.05,0.05);
let bocaMat = new THREE.MeshBasicMaterial({color:0xffffff});
let boca = new THREE.Mesh(bocaGeo,bocaMat);
boca.position.set(0,1.35,0.45);
cuerpo.add(boca);

// Torso
let torsoGeo = new THREE.CylinderGeometry(0.4,0.4,1.2,32);
let torsoMat = new THREE.MeshStandardMaterial({color:0x00aaff, transparent:true, opacity:0.6});
let torso = new THREE.Mesh(torsoGeo, torsoMat);
torso.position.y = 0.5;
cuerpo.add(torso);

// Brazos
let brazoGeo = new THREE.CylinderGeometry(0.1,0.1,0.9,16);
let brazoIzq = new THREE.Mesh(brazoGeo, torsoMat);
let brazoDer = new THREE.Mesh(brazoGeo, torsoMat);
brazoIzq.position.set(-0.55,0.8,0);
brazoDer.position.set(0.55,0.8,0);
brazoIzq.rotation.z = 0.2;
brazoDer.rotation.z = -0.2;
cuerpo.add(brazoIzq);
cuerpo.add(brazoDer);

// ===== ANIMACIÓN =====
let analyser, audioContext, microphone, dataArray;
function animar(){
  requestAnimationFrame(animar);

  if(analyser){
    analyser.getByteFrequencyData(dataArray);
    let volumen = dataArray.reduce((a,b)=>a+b,0)/dataArray.length;

    // Boca se abre según volumen
    boca.scale.y = 1 + volumen/150;

    // Cabeza y ojos siguen posición (simulada según volumen)
    cabeza.rotation.y = Math.sin(volumen/200)*0.2;
    ojoIzq.rotation.y = cabeza.rotation.y;
    ojoDer.rotation.y = cabeza.rotation.y;

    // Brazos se mueven levemente
    brazoIzq.rotation.z = 0.2 + Math.sin(volumen/200)*0.2;
    brazoDer.rotation.z = -0.2 + Math.sin(volumen/200)*0.2;

    // Torso balanceo leve
    torso.rotation.y = Math.sin(volumen/250)*0.1;
  }

  renderer.render(scene,camera);
}

// ===== VOZ =====
const RAVY = {
  nombre:"RAVY",
  idioma:"es-ES",
  activo:false,
  ejecutarOrden(texto){
    const t=texto.toLowerCase();
    let frases=[];
    if(t.includes("hola")) frases=["Hola querido, estoy contigo."];
    else if(t.includes("hora")){ let h=new Date(); frases=[`Son las ${h.getHours()}:${h.getMinutes()}`]; }
    else if(t.includes("google")){ frases=["Abro Google para ti..."]; window.open("https://www.google.com","_blank"); }
    else if(t.includes("chiste")) frases=["¿Por qué la computadora fue al doctor? Porque tenía un virus 😂"];
    return frases;
  }
};

function hablar(frases){
  frases.forEach(f=>{
    let voz=new SpeechSynthesisUtterance(f);
    voz.lang=RAVY.idioma;
    speechSynthesis.speak(voz);
  });
}

// ===== RECONOCIMIENTO DE VOZ =====
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;
if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.interimResults=false;
  recognition.continuous=true;
  recognition.onresult = function(event){
    if(!RAVY.activo) return;
    const texto = event.results[event.results.length-1][0].transcript;
    const frases = RAVY.ejecutarOrden(texto);
    hablar(frases);
  }
}

// ===== BOTÓN ACTIVAR =====
document.getElementById("activar-ravy").addEventListener("click", async ()=>{
  RAVY.activo=true;

  // Audio
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    microphone = audioContext.createMediaStreamSource(stream);
    analyser = audioContext.createAnalyser();
    microphone.connect(analyser);
    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
  } catch(e){ console.log(e); }

  // Reconocimiento de voz
  if(recognition) recognition.start();

  // Animación
  animar();
});

// ===== AJUSTES DE PANTALLA =====
window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
