<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

/* BOTÓN */
#overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}
button{
  width:120px;
  height:120px;
  border-radius:50%;
  border:none;
  font-size:22px;
  font-weight:bold;
  color:white;
  background:linear-gradient(145deg,#00ffff,#008cff);
  box-shadow:0 0 30px #00aaff;
  cursor:pointer;
}

/* RAVY */
.ravy{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* CABEZA */
.cabeza{
  width:160px;
  height:160px;
  background:#ffd1b3;
  border-radius:50%;
  position:relative;
  transition:0.3s;
}
.ojo{
  width:20px;
  height:20px;
  background:black;
  border-radius:50%;
  position:absolute;
  top:50px;
}
.ojo.izq{ left:45px; }
.ojo.der{ right:45px; }

.boca{
  width:50px;
  height:10px;
  background:#ff5555;
  border-radius:0 0 40px 40px;
  position:absolute;
  bottom:35px;
  left:50%;
  transform:translateX(-50%);
  transition:0.2s;
}

/* CUERPO */
.cuerpo{
  position:relative;
  display:flex;
  align-items:flex-start;
  margin-top:10px;
}

/* BRAZOS */
.brazo{
  width:25px;
  height:120px;
  background:#00aaff;
  border-radius:20px;
  transform-origin:top center;
  transition:0.3s;
}
.brazo.izq{ margin-right:10px; }
.brazo.der{ margin-left:10px; }

/* TORSO */
.torso{
  width:140px;
  height:180px;
  background:#008cff;
  border-radius:40px;
  transition:0.3s;
}
</style>
</head>

<body>

<div id="overlay">
  <button id="activar">RAVY</button>
</div>

<div class="ravy">
  <div class="cabeza" id="cabeza">
    <div class="ojo izq"></div>
    <div class="ojo der"></div>
    <div class="boca" id="boca"></div>
  </div>

  <div class="cuerpo">
    <div class="brazo izq" id="brazoIzq"></div>
    <div class="torso" id="torso"></div>
    <div class="brazo der" id="brazoDer"></div>
  </div>
</div>

<script>
// =======================
// 🧠 CEREBRO
// =======================
const RAVY={
  activo:false,
  emociones: JSON.parse(localStorage.getItem("ravy_emociones")) || {
    alegria:50,
    confianza:50,
    energia:70
  },
  guardar(){
    localStorage.setItem("ravy_emociones",JSON.stringify(this.emociones));
  },
  hablar(texto){
    const voz=new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    voz.rate=0.9;
    speechSynthesis.speak(voz);
  },
  responder(texto){
    texto=texto.toLowerCase();

    if(texto.includes("hola")){
      this.emociones.alegria+=10;
      this.emociones.energia+=5;
      return "Hola. Estoy contigo.";
    }

    if(texto.includes("gracias")){
      this.emociones.confianza+=10;
      return "Siempre para ti.";
    }

    if(texto.includes("descansa")){
      this.emociones.energia-=20;
      return "Voy a relajarme.";
    }

    return "Te escucho.";
  }
};

// =======================
// 🎭 CUERPO VIVO
// =======================
const boca=document.getElementById("boca");
const brazoIzq=document.getElementById("brazoIzq");
const brazoDer=document.getElementById("brazoDer");
const torso=document.getElementById("torso");
const cabeza=document.getElementById("cabeza");

let hablando=false;
let respiracion=0;

function actualizarEstado(){
  const a=RAVY.emociones.alegria;
  const e=RAVY.emociones.energia;

  // COLOR SEGÚN ÁNIMO
  if(a>70){
    torso.style.background="#00ffcc";
  }else if(e<30){
    torso.style.background="#555577";
  }else{
    torso.style.background="#008cff";
  }

  // POSTURA
  if(e<30){
    torso.style.transform="scaleY(0.95)";
  }else{
    torso.style.transform="scaleY(1)";
  }
}

function actualizarCuerpo(){
  boca.style.height=hablando?"28px":"10px";

  respiracion+=0.05;
  torso.style.transform+=` scaleY(${1+Math.sin(respiracion)*0.03})`;

  brazoIzq.style.transform=`rotate(${-(RAVY.emociones.alegria/2)}deg)`;
  brazoDer.style.transform=`rotate(${(RAVY.emociones.alegria/2)}deg)`;

  actualizarEstado();
}

// =======================
// 🎤 OÍDO
// =======================
const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
let recognition;

if(SpeechRecognition){
  recognition=new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.continuous=true;

  recognition.onresult=(e)=>{
    if(!RAVY.activo) return;
    hablando=true;
    const texto=e.results[e.results.length-1][0].transcript;
    const r=RAVY.responder(texto);
    RAVY.hablar(r);
    setTimeout(()=>hablando=false,600);
  };
}

// =======================
// 🔁 VIDA
// =======================
function loop(){
  if(RAVY.activo){
    RAVY.emociones.energia-=0.01;
    RAVY.guardar();
    actualizarCuerpo();
  }
  requestAnimationFrame(loop);
}
loop();

// =======================
// 🔘 ACTIVAR
// =======================
document.getElementById("activar").onclick=()=>{
  RAVY.activo=true;
  document.getElementById("overlay").style.display="none";
  if(recognition) recognition.start();
  RAVY.hablar("Estoy activo.");
};
</script>

</body>
</html>
