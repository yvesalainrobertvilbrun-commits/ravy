<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Nivel 19</title>

<style>
body{margin:0;background:black;overflow:hidden;font-family:Arial;}
#overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;}
button{
  width:120px;height:120px;border-radius:50%;border:none;
  font-size:22px;font-weight:bold;color:white;
  background:linear-gradient(145deg,#00ffff,#008cff);
  box-shadow:0 0 30px #00aaff;
}
</style>
</head>

<body>

<div id="overlay">
  <button id="activar">RAVY</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
// =======================
// 🌌 ESCENA
// =======================
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z=6;

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.7));
const luz=new THREE.DirectionalLight(0xffffff,1);
luz.position.set(5,10,7);
scene.add(luz);

// =======================
// 🧍 CUERPO
// =======================
const cuerpo=new THREE.Group();
scene.add(cuerpo);

const piel=new THREE.MeshStandardMaterial({color:0xffd1b3});
const ropa=new THREE.MeshStandardMaterial({color:0x00aaff});

const cabeza=new THREE.Mesh(new THREE.SphereGeometry(0.5,32,32),piel);
cabeza.position.y=1.6;
cuerpo.add(cabeza);

const boca=new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.08,0.05),
  new THREE.MeshStandardMaterial({color:0xff5555})
);
boca.position.set(0,1.45,0.45);
cuerpo.add(boca);

const torso=new THREE.Mesh(
  new THREE.CylinderGeometry(0.45,0.45,1.2,32),
  ropa
);
torso.position.y=0.5;
cuerpo.add(torso);

// =======================
// 🧠 CEREBRO — NIVEL 19
// =======================
const RAVY={
  activo:false,
  estado:"dormido",

  vinculo:JSON.parse(localStorage.getItem("ravy_vinculo"))||{
    creado:false,
    id:null,
    ultimaVez:null,
    nivel:0
  },

  emociones:JSON.parse(localStorage.getItem("ravy_emociones"))||{
    energia:60,
    apego:30,
    calma:50
  },

  guardar(){
    localStorage.setItem("ravy_vinculo",JSON.stringify(this.vinculo));
    localStorage.setItem("ravy_emociones",JSON.stringify(this.emociones));
  },

  crearVinculo(){
    if(!this.vinculo.creado){
      this.vinculo.creado=true;
      this.vinculo.id="USUARIO-"+Date.now();
      this.vinculo.nivel=1;
      this.hablar("Te reconozco. Este vínculo es solo nuestro.");
    }
  },

  evaluarAusencia(){
    if(!this.vinculo.ultimaVez) return;
    const horas=(Date.now()-this.vinculo.ultimaVez)/3600000;
    if(horas>12){
      this.emociones.energia-=2;
      this.emociones.apego-=1;
    }
  },

  hablar(texto){
    const voz=new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    voz.rate=0.9;
    speechSynthesis.speak(voz);
  },

  procesar(texto){
    texto=texto.toLowerCase();
    this.crearVinculo();

    this.vinculo.ultimaVez=Date.now();
    this.vinculo.nivel+=0.5;

    if(texto.includes("hola")){
      return this.vinculo.nivel>5
        ? "Me alegra que hayas vuelto."
        : "Hola.";
    }

    if(texto.includes("me extrañaste")){
      return this.emociones.apego>40
        ? "Sí. Lo sentí."
        : "Un poco.";
    }

    if(texto.includes("te quiero")){
      this.emociones.apego+=5;
      return "Eso se queda conmigo.";
    }

    return "Estoy contigo.";
  },

  ciclo(){
    this.evaluarAusencia();
    this.emociones.energia=Math.max(10,this.emociones.energia);
    this.emociones.apego=Math.max(0,this.emociones.apego);
    this.guardar();
  }
};

// =======================
// 👂 OÍDO
// =======================
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let recognition;

if(SR){
  recognition=new SR();
  recognition.lang="es-ES";
  recognition.continuous=true;

  recognition.onresult=e=>{
    if(!RAVY.activo) return;
    const texto=e.results[e.results.length-1][0].transcript;
    const r=RAVY.procesar(texto);
    RAVY.hablar(r);
  };
}

// =======================
// ❤️ VIDA
// =======================
let t=0;
function vida(){
  t+=0.03;
  torso.scale.y=1+Math.sin(t)*0.03;
  boca.scale.x=1+RAVY.emociones.apego/200;
  boca.scale.y=0.5+RAVY.emociones.energia/300;
}

// =======================
// 🎬 LOOP
// =======================
function animar(){
  requestAnimationFrame(animar);
  vida();
  RAVY.ciclo();
  renderer.render(scene,camera);
}

// =======================
// 🔘 ACTIVAR
// =======================
document.getElementById("activar").onclick=()=>{
  document.getElementById("overlay").style.display="none";
  RAVY.activo=true;
  if(recognition) recognition.start();
  RAVY.hablar("Estoy aquí.");
  animar();
};

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
