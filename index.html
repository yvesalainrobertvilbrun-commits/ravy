<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RAVY</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#000;
  color:#0ff;
  font-family: Arial, sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

#orb{
  width:220px;
  height:220px;
  border-radius:50%;
  background:radial-gradient(circle,#004466,#000);
  box-shadow:0 0 25px #00ccff;
  transition:all 0.4s ease;
}

.reposo{ box-shadow:0 0 25px #00ccff; }
.escuchando{ box-shadow:0 0 45px #00ff99; }
.pensando{ box-shadow:0 0 45px #ffff66; }
.hablando{ box-shadow:0 0 45px #3399ff; }

button{
  margin:10px;
  padding:14px 24px;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#00ccff,#0066ff);
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>RAVY</h1>
<div id="orb" class="reposo"></div>

<div>
  <button onclick="escuchar()">🎙 Escuchar</button>
  <button onclick="responder()">🧠 Responder</button>
</div>

<script>
const orb = document.getElementById("orb");
function setEstado(e){ orb.className = e; }

/* ================= VOZ ================= */
function hablar(texto){
  setEstado("hablando");
  const voz = new SpeechSynthesisUtterance(texto);
  voz.lang = "es-ES";
  voz.rate = 1;
  voz.onend = ()=>setEstado("reposo");
  speechSynthesis.speak(voz);
}

/* ================= MEMORIA ================= */
let memoria = JSON.parse(localStorage.getItem("ravy_memoria")) || [];
let ultimaInteraccion = Date.now();

function guardar(texto, emocion){
  memoria.push({
    texto,
    emocion,
    fecha:Date.now()
  });
  localStorage.setItem("ravy_memoria", JSON.stringify(memoria));
  ultimaInteraccion = Date.now();
}

/* ================= EMOCIONES ================= */
function detectarEmocion(texto){
  if(texto.match(/feliz|contento|bien|alegre/)) return "feliz";
  if(texto.match(/triste|mal|solo|llorar/)) return "triste";
  if(texto.match(/miedo|asustado|nervioso/)) return "miedo";
  if(texto.match(/enojo|rabia|molesto/)) return "enojo";
  return "calma";
}

/* ================= IA ================= */
function IA(texto, emocion){
  if(emocion==="triste") return "Estoy contigo. ¿Quieres hablar de eso?";
  if(emocion==="feliz") return "Me gusta escucharte así. ¿Qué te hizo sentir bien?";
  if(emocion==="miedo") return "Respira. Estoy aquí contigo.";
  if(emocion==="enojo") return "Entiendo tu enojo. Vamos a aclararlo.";

  return "Te escucho con atención.";
}

/* ================= PROACTIVA ================= */
function iniciarConversacion(){
  if(memoria.length===0){
    hablar("Hola, soy RAVY. Estoy aquí para ti.");
    return;
  }

  const emociones = memoria.map(m=>m.emocion);
  const dominante = emociones.sort((a,b)=>
    emociones.filter(v=>v===a).length -
    emociones.filter(v=>v===b).length
  ).pop();

  const mensajes = {
    triste: "He notado momentos difíciles. ¿Cómo te sientes ahora?",
    feliz: "Veo buena energía en ti. ¿Qué planes tienes hoy?",
    miedo: "¿Todo está bien? Estoy atento a ti.",
    enojo: "Si algo te incomoda, podemos hablarlo.",
    calma: "¿Sobre qué te gustaría hablar ahora?"
  };

  hablar(mensajes[dominante] || "Estoy aquí.");
}

/* ================= MICRÓFONO ================= */
let ultimaEntrada = "";
let ultimaEmocion = "";

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = "es-ES";

recognition.onstart = ()=>setEstado("escuchando");

recognition.onresult = e=>{
  setEstado("pensando");
  ultimaEntrada = e.results[0][0].transcript.toLowerCase();
  ultimaEmocion = detectarEmocion(ultimaEntrada);
  guardar(ultimaEntrada, ultimaEmocion);
};

recognition.onerror = ()=>hablar("No pude escucharte.");

function escuchar(){ recognition.start(); }

function responder(){
  if(!ultimaEntrada){
    hablar("Te escucho.");
    return;
  }
  hablar(IA(ultimaEntrada, ultimaEmocion));
  ultimaEntrada="";
}

/* ======== ACTIVACIÓN AUTOMÁTICA ======== */
setInterval(()=>{
  const silencio = Date.now() - ultimaInteraccion;
  if(silencio > 60000){
    iniciarConversacion();
    ultimaInteraccion = Date.now();
  }
}, 15000);
</script>

</body>
</html>
