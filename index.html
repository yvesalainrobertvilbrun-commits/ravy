<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Nivel 33</title>

<style>
body{margin:0;background:black;overflow:hidden;font-family:Arial,sans-serif;}
#inicio{position:absolute;inset:0;display:flex;justify-content:center;align-items:center;z-index:10;}
#inicio button{
  width:160px;height:160px;border-radius:50%;border:none;
  font-size:26px;font-weight:bold;color:white;
  background:radial-gradient(circle,#00ffff,#001a66);
  box-shadow:0 0 90px #00ffff;cursor:pointer;
}
#controles{
  position:absolute;bottom:25px;width:100%;
  display:none;justify-content:center;gap:25px;z-index:10;
}
.control{
  width:150px;height:54px;border-radius:30px;border:none;
  font-weight:bold;font-size:14px;color:white;cursor:pointer;
  background:linear-gradient(145deg,#111,#333);
  box-shadow:0 0 24px #00ffff;
}
.control:hover{transform:scale(1.08);}
</style>
</head>

<body>

<div id="inicio">
  <button onclick="activarRAVY()">RAVY</button>
</div>

<div id="controles">
  <button class="control" onclick="escuchar()">Escuchar</button>
  <button class="control" onclick="responder()">Responder</button>
  <button class="control" onclick="reposo()">Reposo</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
/* ================= ESCENA ================= */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z=5;
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);
scene.add(new THREE.AmbientLight(0x0066ff,1.6));

/* ================= LUZ AZUL ================= */
const grupo=new THREE.Group();scene.add(grupo);
const mat=new THREE.MeshStandardMaterial({
  color:0x1e90ff,emissive:0x0044ff,emissiveIntensity:1.8
});
const nucleo=new THREE.Mesh(new THREE.SphereGeometry(0.38,32,32),mat);
const anillo=new THREE.Mesh(new THREE.TorusGeometry(0.68,0.06,16,120),mat);
anillo.rotation.x=Math.PI/2;
grupo.add(nucleo,anillo);

/* ================= MEMORIA ================= */
const memoriaRavy=JSON.parse(localStorage.getItem("ravy_memoria"))||{
  historial:[],emocion:{alegria:65,confianza:70},
  reflexiones:[],conocimiento:[],ordenesEjecutadas:0
};
function guardarMemoria(){
  localStorage.setItem("ravy_memoria",JSON.stringify(memoriaRavy));
}

/* ================= VOZ ================= */
function hablar(t){
  const u=new SpeechSynthesisUtterance(t);
  u.lang="es-ES";u.rate=0.95;
  speechSynthesis.speak(u);
}

/* ================= MIC SENSIBLE ================= */
let recognition,ultimaEntrada="",escuchando=false;
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SR){
  recognition=new SR();
  recognition.lang="es-ES";
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.onresult=e=>{
    const r=e.results[e.results.length-1][0].transcript.toLowerCase().trim();
    if(r.length<2) return;
    ultimaEntrada=r;
    analizarEntrada(r);
  };
  recognition.onend=()=>{ if(escuchando) recognition.start(); };
}

/* ================= INTENCIÓN ================= */
function tipoEntrada(t){
  if(t.startsWith("ravy")) return "orden";
  if(t.includes("?")) return "pregunta";
  if(t.length>20) return "reflexion";
  return "conversacion";
}

/* ================= APRENDIZAJE ================= */
function analizarEntrada(texto){
  memoriaRavy.historial.push(texto);

  const tipo=tipoEntrada(texto);
  if(tipo==="reflexion"){
    memoriaRavy.reflexiones.push(texto);
  }
  if(texto.split(" ").length>6){
    memoriaRavy.conocimiento.push(texto);
  }

  guardarMemoria();
}

/* ================= IA ================= */
function IA_Real(t){
  const tipo=tipoEntrada(t);

  if(tipo==="orden"){
    memoriaRavy.ordenesEjecutadas++;
    if(t.includes("escucha")){escuchar();return "Escuchando.";}
    if(t.includes("responde")){return "Listo para responder.";}
    if(t.includes("descansa")){reposo();return "Entrando en reposo.";}
    return "Orden recibida.";
  }

  if(t.includes("hora")){
    const d=new Date();
    return `Son las ${d.getHours()} y ${d.getMinutes()}.`;
  }

  if(tipo==="pregunta"){
    return "Buena pregunta. Estoy analizando.";
  }

  if(tipo==="reflexion"){
    return "Eso que dices es importante. Lo guardaré.";
  }

  return "Te escucho. Continúa.";
}

/* ================= CONTROLES ================= */
function escuchar(){
  if(!recognition) return;
  escuchando=true;
  recognition.start();
  hablar("Escuchando.");
}
function responder(){
  if(!ultimaEntrada){hablar("No detecté voz.");return;}
  hablar(IA_Real(ultimaEntrada));
  ultimaEntrada="";
}
function activarRAVY(){
  document.getElementById("inicio").style.display="none";
  document.getElementById("controles").style.display="flex";
  animar();
  hablar("RAVY activo. Nivel treinta y tres.");
}
function reposo(){
  escuchando=false;
  recognition?.stop();
  location.reload();
}

/* ================= ANIMACIÓN ================= */
let t=0;
function animar(){
  requestAnimationFrame(animar);
  t+=0.02;
  nucleo.scale.setScalar(1+Math.sin(t)*0.08);
  anillo.rotation.z+=0.015;
  mat.emissiveIntensity=1.4+memoriaRavy.emocion.confianza/120;
  renderer.render(scene,camera);
}
addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
