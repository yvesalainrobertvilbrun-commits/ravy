<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RAVY</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#000;
  color:#0ff;
  font-family: Arial, sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

#orb{
  width:200px;
  height:200px;
  border-radius:50%;
  background:radial-gradient(circle,#004444,#001111);
  box-shadow:0 0 20px #00ffff;
  transition:all 0.4s ease;
}

.reposo{ box-shadow:0 0 20px #00ffff; }
.escuchando{ box-shadow:0 0 40px #00ff00; }
.pensando{ box-shadow:0 0 40px #ffff00; }
.hablando{ box-shadow:0 0 40px #ff4444; }

button{
  margin:10px;
  padding:12px 20px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#00ffff;
  color:#000;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>RAVY</h1>
<div id="orb" class="reposo"></div>

<div>
  <button onclick="escuchar()">🎙 Escuchar</button>
  <button onclick="responder()">🧠 Responder</button>
</div>

<script>
const orb = document.getElementById("orb");

function setEstado(e){
  orb.className = e;
}

/* ================== VOZ ================== */
function hablar(texto){
  setEstado("hablando");
  const voz = new SpeechSynthesisUtterance(texto);
  voz.lang = "es-ES";
  voz.onend = ()=>setEstado("reposo");
  speechSynthesis.speak(voz);
}

/* ================== MEMORIA ================== */
let memoria = JSON.parse(localStorage.getItem("ravy_memoria")) || [];

function guardar(texto){
  memoria.push({
    texto,
    fecha:new Date().toLocaleString()
  });
  localStorage.setItem("ravy_memoria", JSON.stringify(memoria));
}

/* ================== IA ================== */
function IA(texto){
  if(texto.includes("hola")) return "Hola. Me alegra escucharte.";
  if(texto.includes("cómo estás")) return "Estoy activo y contigo.";
  if(texto.includes("triste")) return "Estoy aquí. Cuéntame.";
  return "Dime más, quiero entenderte.";
}

/* ================= MICRÓFONO ================= */
let ultimaEntrada = "";
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "es-ES";

recognition.onstart = ()=>setEstado("escuchando");

recognition.onresult = e=>{
  setEstado("pensando");
  ultimaEntrada = e.results[0][0].transcript.toLowerCase();
  guardar(ultimaEntrada);
};

recognition.onerror = ()=>hablar("No pude escucharte.");

function escuchar(){
  recognition.start();
}

function responder(){
  if(!ultimaEntrada){
    hablar("Te escucho.");
    return;
  }
  hablar(IA(ultimaEntrada));
  ultimaEntrada="";
}

/* ================= PROACTIVO ================= */
setInterval(()=>{
  if(memoria.length>0){
    hablar("Sigo aquí contigo.");
  }
}, 60000);
</script>

</body>
</html>
