<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Nivel 11</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial;
}
#overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}
button{
  width:120px;
  height:120px;
  border-radius:50%;
  border:none;
  font-size:22px;
  font-weight:bold;
  color:white;
  background:linear-gradient(145deg,#00ffff,#008cff);
  box-shadow:0 0 30px #00aaff;
}
</style>
</head>

<body>

<div id="overlay">
  <button id="activar">RAVY</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
// =======================
// ESCENA
// =======================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.7));
const luz = new THREE.DirectionalLight(0xffffff,1);
luz.position.set(5,10,7);
scene.add(luz);

// =======================
// CUERPO
// =======================
const cuerpo = new THREE.Group();
scene.add(cuerpo);

const piel = new THREE.MeshStandardMaterial({color:0xffd1b3});
const ropa = new THREE.MeshStandardMaterial({color:0x00aaff});

const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.5,32,32),piel);
cabeza.position.y = 1.6;
cuerpo.add(cabeza);

// 👀 OJOS
const ojoMaterial = new THREE.MeshStandardMaterial({color:0x000000});
const ojoGeo = new THREE.SphereGeometry(0.06,16,16);

const ojoIzq = new THREE.Mesh(ojoGeo,ojoMaterial);
ojoIzq.position.set(-0.15,1.65,0.45);
cuerpo.add(ojoIzq);

const ojoDer = new THREE.Mesh(ojoGeo,ojoMaterial);
ojoDer.position.set(0.15,1.65,0.45);
cuerpo.add(ojoDer);

// 👄 BOCA
const boca = new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.08,0.05),
  new THREE.MeshStandardMaterial({color:0xff5555})
);
boca.position.set(0,1.45,0.45);
cuerpo.add(boca);

// 🧍 TORSO
const torso = new THREE.Mesh(
  new THREE.CylinderGeometry(0.45,0.45,1.2,32),
  ropa
);
torso.position.y = 0.5;
cuerpo.add(torso);

// =======================
// CEREBRO
// =======================
const RAVY = {
  activo:false,
  estado:"silencio",
  hablar(texto){
    this.estado="hablando";
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    voz.rate=0.9;
    voz.onend=()=>this.estado="silencio";
    speechSynthesis.speak(voz);
  }
};

// =======================
// OÍDO
// =======================
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition, pausa;

if(SR){
  recognition = new SR();
  recognition.lang="es-ES";
  recognition.continuous=true;

  recognition.onresult=()=>{
    RAVY.estado="escuchando";
    clearTimeout(pausa);
    pausa=setTimeout(()=>{
      RAVY.estado="pensando";
      RAVY.hablar("Te escucho.");
    },1200);
  };
}

// =======================
// MIRADA VIVA (NIVEL 11)
// =======================
let mouseX=0, mouseY=0;

addEventListener("mousemove",e=>{
  mouseX = (e.clientX / innerWidth - 0.5) * 0.6;
  mouseY = (e.clientY / innerHeight - 0.5) * 0.6;
});

function mirada(){
  if(RAVY.estado==="escuchando"){
    ojoIzq.position.x = -0.15 + mouseX*0.3;
    ojoDer.position.x =  0.15 + mouseX*0.3;
    ojoIzq.position.y = 1.65 - mouseY*0.3;
    ojoDer.position.y = 1.65 - mouseY*0.3;
  }

  if(RAVY.estado==="hablando"){
    ojoIzq.position.y = 1.65;
    ojoDer.position.y = 1.65;
  }

  if(RAVY.estado==="silencio"){
    ojoIzq.position.x = -0.15 + Math.sin(Date.now()*0.001)*0.03;
    ojoDer.position.x =  0.15 + Math.sin(Date.now()*0.001)*0.03;
  }
}

// =======================
// MOVIMIENTO CORPORAL
// =======================
let respiracion=0;

function movimiento(){
  respiracion+=0.02;
  torso.scale.y = 1 + Math.sin(respiracion)*0.03;

  if(RAVY.estado==="hablando"){
    boca.scale.y = 1 + Math.abs(Math.sin(Date.now()*0.02));
  }else{
    boca.scale.y = 0.6;
  }
}

// =======================
// LOOP
// =======================
function animar(){
  requestAnimationFrame(animar);
  mirada();
  movimiento();
  renderer.render(scene,camera);
}

// =======================
// ACTIVAR
// =======================
document.getElementById("activar").onclick=()=>{
  document.getElementById("overlay").style.display="none";
  RAVY.activo=true;
  if(recognition) recognition.start();
  RAVY.hablar("Ahora puedo mirarte.");
  animar();
};

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
