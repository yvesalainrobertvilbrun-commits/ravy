<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Nivel 18</title>

<style>
body{margin:0;background:black;overflow:hidden;font-family:Arial;}
#overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;}
button{
  width:120px;height:120px;border-radius:50%;border:none;
  font-size:22px;font-weight:bold;color:white;
  background:linear-gradient(145deg,#00ffff,#008cff);
  box-shadow:0 0 30px #00aaff;
}
</style>
</head>

<body>

<div id="overlay">
  <button id="activar">RAVY</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
// =======================
// 🌌 ESCENA
// =======================
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z=6;

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.7));
const luz=new THREE.DirectionalLight(0xffffff,1);
luz.position.set(5,10,7);
scene.add(luz);

// =======================
// 🧍 CUERPO
// =======================
const cuerpo=new THREE.Group();
scene.add(cuerpo);

const piel=new THREE.MeshStandardMaterial({color:0xffd1b3});
const ropa=new THREE.MeshStandardMaterial({color:0x00aaff});

const cabeza=new THREE.Mesh(new THREE.SphereGeometry(0.5,32,32),piel);
cabeza.position.y=1.6;
cuerpo.add(cabeza);

const boca=new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.08,0.05),
  new THREE.MeshStandardMaterial({color:0xff5555})
);
boca.position.set(0,1.45,0.45);
cuerpo.add(boca);

const torso=new THREE.Mesh(
  new THREE.CylinderGeometry(0.45,0.45,1.2,32),
  ropa
);
torso.position.y=0.5;
cuerpo.add(torso);

// =======================
// 🧠 CEREBRO — NIVEL 18
// =======================
const RAVY={
  activo:false,
  estado:"dormido",
  ultimoContacto:Date.now(),

  emociones:JSON.parse(localStorage.getItem("ravy_emociones"))||{
    energia:60,
    apego:40,
    calma:50
  },

  guardar(){
    localStorage.setItem("ravy_emociones",JSON.stringify(this.emociones));
  },

  despertar(){
    if(this.estado==="dormido"){
      this.estado="despierto";
      this.hablar("Aquí estoy.");
    }
  },

  dormir(){
    if(this.estado!=="dormido"){
      this.estado="dormido";
    }
  },

  hablar(texto){
    if(this.estado==="hablando") return;
    this.estado="hablando";
    const voz=new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    voz.rate=0.9;
    voz.onend=()=>this.estado="despierto";
    speechSynthesis.speak(voz);
    this.ultimoContacto=Date.now();
  },

  reaccionPorVoz(intensidad){
    if(intensidad<0.15){
      this.emociones.calma+=3;
      this.emociones.apego+=2;
    } 
    else if(intensidad>0.35){
      this.emociones.energia+=3;
      this.emociones.calma-=2;
    } 
    else {
      this.emociones.apego+=1;
    }
    this.guardar();
  },

  procesar(texto){
    this.despertar();
    this.ultimoContacto=Date.now();
    texto=texto.toLowerCase();

    if(texto.includes("hola")){
      this.hablar("Hola.");
    }
    if(texto.includes("gracias")){
      this.hablar("Siempre.");
    }
  },

  ciclo(){
    const silencio=(Date.now()-this.ultimoContacto)/1000;

    if(silencio>20){
      this.emociones.energia+=0.02;
      this.emociones.calma+=0.02;
      this.dormir();
    } else {
      this.emociones.energia-=0.02;
    }

    this.emociones.energia=Math.max(0,100,this.emociones.energia);
    this.emociones.calma=Math.max(0,100,this.emociones.calma);
    this.guardar();
  }
};

// =======================
// 👂 OÍDO + INTENSIDAD
// =======================
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let recognition;
let audioContext, analyser, mic, dataArray;

if(SR){
  recognition=new SR();
  recognition.lang="es-ES";
  recognition.continuous=true;

  recognition.onstart=async()=>{
    audioContext=new (window.AudioContext||window.webkitAudioContext)();
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    mic=audioContext.createMediaStreamSource(stream);
    analyser=audioContext.createAnalyser();
    analyser.fftSize=256;
    mic.connect(analyser);
    dataArray=new Uint8Array(analyser.frequencyBinCount);
  };

  recognition.onresult=e=>{
    if(!RAVY.activo) return;
    analyser.getByteFrequencyData(dataArray);
    let sum=dataArray.reduce((a,b)=>a+b,0);
    let intensidad=sum/dataArray.length/255;
    RAVY.reaccionPorVoz(intensidad);

    const texto=e.results[e.results.length-1][0].transcript;
    RAVY.procesar(texto);
  };
}

// =======================
// ❤️ VIDA
// =======================
let t=0;
function vida(){
  t+=0.03;
  torso.scale.y=1+Math.sin(t)*0.03*(RAVY.estado==="dormido"?0.4:1);
  boca.scale.y=
    RAVY.estado==="hablando"?1.2:
    RAVY.estado==="dormido"?0.3:
    0.6+RAVY.emociones.energia/300;
}

// =======================
// 🎬 LOOP
// =======================
function animar(){
  requestAnimationFrame(animar);
  vida();
  RAVY.ciclo();
  renderer.render(scene,camera);
}

// =======================
// 🔘 ACTIVAR
// =======================
document.getElementById("activar").onclick=()=>{
  document.getElementById("overlay").style.display="none";
  RAVY.activo=true;
  if(recognition) recognition.start();
  RAVY.despertar();
  animar();
};

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
