<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

/* BOTÓN */
#overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}
button{
  width:120px;
  height:120px;
  border-radius:50%;
  border:none;
  font-size:22px;
  font-weight:bold;
  color:white;
  background:linear-gradient(145deg,#00ffff,#008cff);
  box-shadow:0 0 30px #00aaff;
  cursor:pointer;
}

/* RAVY */
#escena{
  position:absolute;
  width:100%;
  height:100%;
}
.ravy{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}
.cabeza{
  width:160px;
  height:160px;
  background:#ffd1b3;
  border-radius:50%;
  position:relative;
  transition:0.2s;
}
.ojo{
  width:20px;
  height:20px;
  background:black;
  border-radius:50%;
  position:absolute;
  top:50px;
}
.ojo.izq{ left:45px; }
.ojo.der{ right:45px; }
.boca{
  width:50px;
  height:10px;
  background:#ff5555;
  border-radius:0 0 40px 40px;
  position:absolute;
  bottom:35px;
  left:50%;
  transform:translateX(-50%);
  transition:0.1s;
}
</style>
</head>

<body>

<div id="overlay">
  <button id="activar">RAVY</button>
</div>

<div id="escena">
  <div class="ravy">
    <div class="cabeza" id="cabeza">
      <div class="ojo izq"></div>
      <div class="ojo der"></div>
      <div class="boca" id="boca"></div>
    </div>
  </div>
</div>

<script>
// =======================
// 🧠 CEREBRO EVOLUTIVO
// =======================
const RAVY = {
  activo:false,

  emociones: JSON.parse(localStorage.getItem("ravy_emociones")) || {
    alegria:50,
    confianza:50,
    energia:50
  },

  memoria: JSON.parse(localStorage.getItem("ravy_memoria")) || [],

  guardar(){
    localStorage.setItem("ravy_emociones",JSON.stringify(this.emociones));
    localStorage.setItem("ravy_memoria",JSON.stringify(this.memoria));
  },

  hablar(texto){
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    voz.rate=0.9;
    speechSynthesis.speak(voz);
  },

  aprender(texto){
    this.memoria.push({
      texto:texto,
      fecha:new Date().toLocaleString()
    });

    if(texto.includes("gracias")){
      this.emociones.alegria+=5;
      this.emociones.confianza+=5;
    }

    this.emociones.alegria=Math.min(100,this.emociones.alegria);
    this.emociones.confianza=Math.min(100,this.emociones.confianza);
    this.guardar();
  },

  responder(texto){
    texto = texto.toLowerCase();
    this.aprender(texto);

    if(texto.includes("qué recuerdas")){
      if(this.memoria.length===0) return "Aún no tengo recuerdos.";
      let ultimo = this.memoria[this.memoria.length-1];
      return "Recuerdo que me dijiste: " + ultimo.texto;
    }

    if(texto.includes("cómo te sientes")){
      return `Me siento con ${this.emociones.alegria}% de alegría y ${this.emociones.confianza}% de confianza.`;
    }

    if(texto.includes("hora")){
      return "Son las " + new Date().toLocaleTimeString();
    }

    if(texto.includes("hola")){
      return "Hola. Estoy aquí contigo.";
    }

    return "Te escucho.";
  }
};

// =======================
// 🎤 AUDIO
// =======================
let analyser, dataArray;
const boca = document.getElementById("boca");
const cabeza = document.getElementById("cabeza");

async function activarMicrofono(){
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  const mic = ctx.createMediaStreamSource(stream);
  analyser = ctx.createAnalyser();
  mic.connect(analyser);
  analyser.fftSize=256;
  dataArray = new Uint8Array(analyser.frequencyBinCount);
}

// =======================
// 👂 OÍDO
// =======================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.continuous=true;
  recognition.onresult = (e)=>{
    if(!RAVY.activo) return;
    const texto = e.results[e.results.length-1][0].transcript;
    const r = RAVY.responder(texto);
    RAVY.hablar(r);
  };
}

// =======================
// 🔁 VIDA
// =======================
function animar(){
  if(analyser){
    analyser.getByteFrequencyData(dataArray);
    let vol = dataArray.reduce((a,b)=>a+b,0)/dataArray.length;
    boca.style.height = (10 + vol/10)+"px";
    cabeza.style.transform = `scale(${1+vol/2000})`;
  }
  requestAnimationFrame(animar);
}
animar();

// =======================
// 🔘 ACTIVAR
// =======================
document.getElementById("activar").onclick = async ()=>{
  RAVY.activo=true;
  document.getElementById("overlay").style.display="none";
  await activarMicrofono();
  if(recognition) recognition.start();
  RAVY.hablar("Estoy despierto. Aprenderé contigo.");
};
</script>

</body>
</html>
