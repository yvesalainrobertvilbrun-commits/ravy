<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RAVY</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#000;
  color:#0ff;
  font-family:Arial, sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* ================= ORB ================= */
#orb{
  width:240px;
  height:240px;
  border-radius:50%;
  background:radial-gradient(circle at top,#1aa3ff,#000);
  box-shadow:0 0 30px #00ccff;
  transition:all 0.6s ease;
  animation:respirar 6s infinite;
}

/* ====== ESTADOS ====== */
.reposo{
  box-shadow:0 0 30px #00ccff;
}

.escuchando{
  animation:ondas 1.2s infinite;
  box-shadow:0 0 70px #00ffcc;
}

.pensando{
  box-shadow:0 0 60px #ffff99;
}

.hablando{
  animation:hablar 0.9s infinite;
  box-shadow:0 0 80px #3399ff;
}

/* ====== EMOCIONES ====== */
.feliz{ box-shadow:0 0 80px #00ff99; }
.triste{ box-shadow:0 0 80px #3399ff; }
.miedo{ box-shadow:0 0 80px #ff9933; }
.enojo{ box-shadow:0 0 80px #ff3333; }
.calma{ box-shadow:0 0 80px #66ccff; }

/* ====== ANIMACIONES ====== */
@keyframes respirar{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.04); }
}

@keyframes hablar{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.08); }
}

@keyframes ondas{
  0%{ box-shadow:0 0 30px #00ffcc; }
  50%{ box-shadow:0 0 90px #00ffcc; }
  100%{ box-shadow:0 0 30px #00ffcc; }
}

/* ================= BOTONES ================= */
button{
  margin:12px;
  padding:14px 30px;
  font-size:16px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#00ccff,#0033ff);
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>RAVY</h1>
<div id="orb" class="reposo"></div>

<div>
  <button onclick="escuchar()">🎙 Escuchar</button>
  <button onclick="responder()">🧠 Responder</button>
</div>

<script>
/* ================= ORB ================= */
const orb=document.getElementById("orb");
function estado(e){ orb.className=e; }

/* ================= VOZ ================= */
function hablar(texto){
  estado("hablando "+ultimaEmocion);
  const u=new SpeechSynthesisUtterance(texto);
  u.lang="es-ES";
  u.rate=1;
  u.onend=()=>estado("reposo "+ultimaEmocion);
  speechSynthesis.speak(u);
}

/* ================= MEMORIA ================= */
let memoria=JSON.parse(localStorage.getItem("ravy_memoria"))||[];
let perfil=JSON.parse(localStorage.getItem("ravy_perfil"))||{
  emociones:{feliz:0,triste:0,miedo:0,enojo:0,calma:0},
  personalidad:"neutral"
};

let ultimaInteraccion=Date.now();
let ultimaEntrada="",ultimaEmocion="calma";

/* ================= APRENDIZAJE ================= */
function guardar(texto,emocion){
  memoria.push({texto,emocion,fecha:Date.now()});
  perfil.emociones[emocion]++;
  localStorage.setItem("ravy_memoria",JSON.stringify(memoria));
  localStorage.setItem("ravy_perfil",JSON.stringify(perfil));
  ultimaInteraccion=Date.now();
}

/* ================= EMOCIONES ================= */
function detectarEmocion(t){
  if(/feliz|bien|alegre/.test(t)) return "feliz";
  if(/triste|mal|solo/.test(t)) return "triste";
  if(/miedo|asustado/.test(t)) return "miedo";
  if(/enojo|rabia/.test(t)) return "enojo";
  return "calma";
}

/* ================= IA ================= */
function IA(texto,emocion){
  if(emocion==="triste") return "Estoy contigo. Puedes hablar sin miedo.";
  if(emocion==="feliz") return "Me alegra sentir esa energía.";
  if(emocion==="miedo") return "Respira, todo está bien ahora.";
  return "Te escucho con atención.";
}

/* ================= MIC ================= */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const rec=new SR();
rec.lang="es-ES";

rec.onstart=()=>estado("escuchando");
rec.onresult=e=>{
  estado("pensando");
  ultimaEntrada=e.results[0][0].transcript.toLowerCase();
  ultimaEmocion=detectarEmocion(ultimaEntrada);
  guardar(ultimaEntrada,ultimaEmocion);
  estado("reposo "+ultimaEmocion);
};

rec.onerror=()=>hablar("No pude escucharte.");

function escuchar(){ rec.start(); }

function responder(){
  if(!ultimaEntrada){ hablar("Te escucho."); return; }
  hablar(IA(ultimaEntrada,ultimaEmocion));
  ultimaEntrada="";
}

/* ================= PROACTIVA ================= */
setInterval(()=>{
  if(Date.now()-ultimaInteraccion>70000){
    hablar("Aquí estoy contigo.");
    ultimaInteraccion=Date.now();
  }
},20000);
</script>

</body>
</html>
