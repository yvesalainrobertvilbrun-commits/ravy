<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Nivel 10</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial;
}
#overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}
button{
  width:120px;
  height:120px;
  border-radius:50%;
  border:none;
  font-size:22px;
  font-weight:bold;
  color:white;
  background:linear-gradient(145deg,#00ffff,#008cff);
  box-shadow:0 0 30px #00aaff;
}
</style>
</head>

<body>

<div id="overlay">
  <button id="activar">RAVY</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
// =======================
// ESCENA
// =======================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.7));
const luz = new THREE.DirectionalLight(0xffffff,1);
luz.position.set(5,10,7);
scene.add(luz);

// =======================
// CUERPO
// =======================
const cuerpo = new THREE.Group();
scene.add(cuerpo);

const piel = new THREE.MeshStandardMaterial({color:0xffd1b3});
const ropa = new THREE.MeshStandardMaterial({color:0x00aaff});

const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.5,32,32),piel);
cabeza.position.y = 1.6;
cuerpo.add(cabeza);

const boca = new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.08,0.05),
  new THREE.MeshStandardMaterial({color:0xff5555})
);
boca.position.set(0,1.45,0.45);
cuerpo.add(boca);

const torso = new THREE.Mesh(
  new THREE.CylinderGeometry(0.45,0.45,1.2,32),
  ropa
);
torso.position.y = 0.5;
cuerpo.add(torso);

// =======================
// CEREBRO
// =======================
const RAVY = {
  activo:false,
  estado:"silencio",
  emociones:{alegria:50,energia:50},
  hablar(texto){
    this.estado="hablando";
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    voz.rate=0.9;
    voz.onend=()=>this.estado="silencio";
    speechSynthesis.speak(voz);
  }
};

// =======================
// OIDO
// =======================
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition, pausa;

if(SR){
  recognition = new SR();
  recognition.lang="es-ES";
  recognition.continuous=true;
  recognition.interimResults=true;

  recognition.onresult=e=>{
    RAVY.estado="escuchando";
    clearTimeout(pausa);
    pausa=setTimeout(()=>{
      RAVY.estado="pensando";
      RAVY.hablar("Te escucho.");
    },1200);
  };
}

// =======================
// MOVIMIENTO CORPORAL (NIVEL 10)
// =======================
let respiracion = 0;

function movimientoCorporal(){
  respiracion += 0.02;
  const respiro = Math.sin(respiracion) * 0.03;

  torso.scale.y = 1 + respiro;

  if(RAVY.estado==="escuchando"){
    cuerpo.rotation.x = -0.05;
    cabeza.rotation.x = -0.15;
  }

  if(RAVY.estado==="pensando"){
    cuerpo.rotation.x = Math.sin(Date.now()*0.001)*0.02;
    cabeza.rotation.y = Math.sin(Date.now()*0.001)*0.1;
  }

  if(RAVY.estado==="hablando"){
    boca.scale.y = 1 + Math.abs(Math.sin(Date.now()*0.02));
    cabeza.rotation.x = Math.sin(Date.now()*0.005)*0.05;
  }

  if(RAVY.estado==="silencio"){
    cuerpo.rotation.x = 0;
    boca.scale.y = 0.6;
    cabeza.rotation.x = Math.sin(Date.now()*0.002)*0.03;
  }
}

// =======================
// LOOP
// =======================
function animar(){
  requestAnimationFrame(animar);
  movimientoCorporal();
  renderer.render(scene,camera);
}

// =======================
// ACTIVAR
// =======================
document.getElementById("activar").onclick=()=>{
  document.getElementById("overlay").style.display="none";
  RAVY.activo=true;
  if(recognition) recognition.start();
  RAVY.hablar("Estoy aquí.");
  animar();
};

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
