<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Nivel 9A</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

#overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}

button{
  width:120px;
  height:120px;
  border-radius:50%;
  border:none;
  font-size:22px;
  font-weight:bold;
  color:white;
  background:linear-gradient(145deg,#00ffff,#008cff);
  box-shadow:0 0 30px #00aaff;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="overlay">
  <button id="activar">RAVY</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
// =======================
// 🌌 ESCENA 3D
// =======================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// Luces
scene.add(new THREE.AmbientLight(0xffffff,0.7));
const luz = new THREE.DirectionalLight(0xffffff,1);
luz.position.set(5,10,7);
scene.add(luz);

// =======================
// 🧍 CUERPO DE RAVY
// =======================
const cuerpo = new THREE.Group();
scene.add(cuerpo);

const piel = new THREE.MeshStandardMaterial({color:0xffd1b3});
const ropa = new THREE.MeshStandardMaterial({color:0x00aaff});

const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.5,32,32),piel);
cabeza.position.y = 1.6;
cuerpo.add(cabeza);

const boca = new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.08,0.05),
  new THREE.MeshStandardMaterial({color:0xff5555})
);
boca.position.set(0,1.45,0.45);
cuerpo.add(boca);

const torso = new THREE.Mesh(
  new THREE.CylinderGeometry(0.45,0.45,1.2,32),
  ropa
);
torso.position.y = 0.5;
cuerpo.add(torso);

const brazoGeo = new THREE.CylinderGeometry(0.1,0.1,0.9,16);
const brazoIzq = new THREE.Mesh(brazoGeo,ropa);
const brazoDer = new THREE.Mesh(brazoGeo,ropa);

brazoIzq.position.set(-0.6,0.8,0);
brazoDer.position.set(0.6,0.8,0);
cuerpo.add(brazoIzq,brazoDer);

// =======================
// 🧠 CEREBRO
// =======================
const RAVY = {
  activo:false,
  emociones:{energia:50},
  hablar(texto){
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    speechSynthesis.speak(voz);
  }
};

// =======================
// 👂 AUDIO (VOZ REAL)
// =======================
let audioContext, analyser, dataArray;

async function activarMicrofono(){
  audioContext = new (window.AudioContext||window.webkitAudioContext)();
  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  const mic = audioContext.createMediaStreamSource(stream);
  analyser = audioContext.createAnalyser();
  analyser.fftSize = 256;
  dataArray = new Uint8Array(analyser.frequencyBinCount);
  mic.connect(analyser);
}

// =======================
// 🎭 MOVIMIENTO POR VOZ
// =======================
function animar(){
  requestAnimationFrame(animar);

  let volumen = 0;

  if(analyser){
    analyser.getByteFrequencyData(dataArray);
    volumen = dataArray.reduce((a,b)=>a+b,0)/dataArray.length;
  }

  // Boca
  boca.scale.y = 1 + volumen/120;

  // Brazos
  brazoIzq.rotation.z = 0.2 + volumen/300;
  brazoDer.rotation.z = -0.2 - volumen/300;

  // Respiración
  torso.scale.y = 1 + Math.sin(Date.now()/600)/40;

  renderer.render(scene,camera);
}

// =======================
// 🔘 ACTIVADOR
// =======================
document.getElementById("activar").onclick = async ()=>{
  document.getElementById("overlay").style.display="none";
  RAVY.activo = true;
  await activarMicrofono();
  RAVY.hablar("Estoy activo. Te escucho.");
  animar();
};

// Ajuste pantalla
addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
