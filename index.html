<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Asistente Personal</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

/* BOTÓN INICIAL */
#overlay{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10;
}
#startBtn{
  width:140px;
  height:140px;
  border-radius:50%;
  border:none;
  font-size:24px;
  font-weight:bold;
  color:white;
  background:linear-gradient(145deg,#00ffff,#008cff);
  box-shadow:0 0 40px #00aaff;
  cursor:pointer;
}

/* BOTONES INTERNOS */
#controls{
  position:absolute;
  bottom:30px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:20px;
  z-index:5;
  display:none;
}
.ctrl{
  padding:14px 22px;
  border:none;
  border-radius:30px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  background:#0077ff;
  box-shadow:0 0 20px #0077ff;
}
.ctrl:hover{transform:scale(1.05);}
</style>
</head>

<body>

<div id="overlay">
  <button id="startBtn">RAVY</button>
</div>

<div id="controls">
  <button class="ctrl" id="listenBtn">🎤 Escuchar</button>
  <button class="ctrl" id="replyBtn">💬 Responder</button>
  <button class="ctrl" id="restBtn">💤 Reposo</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
// =======================
// 🌌 ESCENA 3D
// =======================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.7));
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,7);
scene.add(light);

// =======================
// 🧍 CUERPO
// =======================
const cuerpo = new THREE.Group();
scene.add(cuerpo);

const piel = new THREE.MeshStandardMaterial({color:0xffd1b3});
const ropa = new THREE.MeshStandardMaterial({color:0x00aaff});

const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.5,32,32),piel);
cabeza.position.y = 1.6;
cuerpo.add(cabeza);

// Ojos
const ojoL = new THREE.Mesh(new THREE.SphereGeometry(0.08,16,16), new THREE.MeshStandardMaterial({color:0xffffff}));
const irisL = new THREE.Mesh(new THREE.SphereGeometry(0.04,16,16), new THREE.MeshStandardMaterial({color:0x000000}));
ojoL.position.set(-0.15,1.65,0.45);
irisL.position.set(-0.15,1.65,0.52);

const ojoR = ojoL.clone();
const irisR = irisL.clone();
ojoR.position.x = 0.15;
irisR.position.x = 0.15;

cuerpo.add(ojoL, irisL, ojoR, irisR);

// Boca
const boca = new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.08,0.05),
  new THREE.MeshStandardMaterial({color:0xff5555})
);
boca.position.set(0,1.45,0.45);
cuerpo.add(boca);

// Torso
const torso = new THREE.Mesh(
  new THREE.CylinderGeometry(0.45,0.45,1.2,32),
  ropa
);
torso.position.y = 0.5;
cuerpo.add(torso);

// =======================
// 🧠 CEREBRO RAVY
// =======================
const RAVY = {
  activo:false,
  escuchando:false,

  memoria: JSON.parse(localStorage.getItem("ravy_memoria")) || [],
  emociones:{ alegria:50, energia:50 },

  guardar(){
    localStorage.setItem("ravy_memoria",JSON.stringify(this.memoria));
  },

  recordar(texto){
    this.memoria.push({texto,fecha:Date.now()});
    if(this.memoria.length>120) this.memoria.shift();
    this.guardar();
  },

  hablar(texto){
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    voz.rate=0.9;
    speechSynthesis.speak(voz);
  },

  procesar(texto){
    texto=texto.toLowerCase();
    this.recordar(texto);

    if(texto.includes("buenos dias")) return "Buenos días. Aquí está RAVY, tu asistente personal.";
    if(texto.includes("buenas tardes")) return "Buenas tardes. Te escucho.";
    if(texto.includes("buenas noches")) return "Buenas noches. Estoy contigo.";
    if(texto.includes("hola")) return "Hola. Aquí está RAVY.";

    return "Te escucho.";
  }
};

// =======================
// 👂 OÍDO
// =======================
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

if(SR){
  recognition = new SR();
  recognition.lang="es-ES";
  recognition.continuous=true;

  recognition.onresult = e=>{
    if(!RAVY.escuchando) return;
    const texto = e.results[e.results.length-1][0].transcript;
    const r = RAVY.procesar(texto);
    RAVY.hablar(r);
    recognition.stop();
    recognition.start();
  };
}

// =======================
// 🎭 EXPRESIONES + RESPIRACIÓN
// =======================
let t=0;
function animar(){
  requestAnimationFrame(animar);
  t+=0.02;
  torso.position.y = 0.5 + Math.sin(t)*0.03;
  boca.scale.y = 0.8 + Math.abs(Math.sin(t))*0.3;
  renderer.render(scene,camera);
}

// =======================
// 🔘 BOTONES
// =======================
startBtn.onclick=()=>{
  overlay.style.display="none";
  controls.style.display="flex";
  RAVY.activo=true;
  animar();
  RAVY.hablar("Aquí está RAVY, tu asistente personal.");
};

listenBtn.onclick=()=>{
  RAVY.escuchando=true;
  if(recognition) recognition.start();
};

replyBtn.onclick=()=>{
  RAVY.hablar("Te escucho.");
};

restBtn.onclick=()=>{
  location.reload();
};

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
