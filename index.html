<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

/* BOTÓN */
#overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}
button{
  width:120px;
  height:120px;
  border-radius:50%;
  border:none;
  font-size:22px;
  font-weight:bold;
  color:white;
  background:linear-gradient(145deg,#00ffff,#008cff);
  box-shadow:0 0 30px #00aaff;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  transform:scale(1.1);
  box-shadow:0 0 50px #00ffff;
}

/* CUERPO */
#escena{
  position:absolute;
  width:100%;
  height:100%;
}
.ravy{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* PARTES */
.cabeza{
  width:160px;
  height:160px;
  background:#ffd1b3;
  border-radius:50%;
  position:relative;
  margin:auto;
  transition:0.2s;
}
.ojo{
  width:20px;
  height:20px;
  background:black;
  border-radius:50%;
  position:absolute;
  top:50px;
}
.ojo.izq{ left:45px; }
.ojo.der{ right:45px; }

.boca{
  width:50px;
  height:10px;
  background:#ff5555;
  border-radius:0 0 40px 40px;
  position:absolute;
  bottom:35px;
  left:50%;
  transform:translateX(-50%);
  transition:0.1s;
}
</style>
</head>

<body>

<div id="overlay">
  <button id="activar">RAVY</button>
</div>

<div id="escena">
  <div class="ravy" id="ravy">
    <div class="cabeza" id="cabeza">
      <div class="ojo izq"></div>
      <div class="ojo der"></div>
      <div class="boca" id="boca"></div>
    </div>
  </div>
</div>

<script>
// =======================
// 🧠 CEREBRO DE RAVY
// =======================
const RAVY = {
  activo:false,

  emociones: JSON.parse(localStorage.getItem("ravy_emociones")) || {
    alegria:50,
    confianza:50,
    energia:50
  },

  memoria: JSON.parse(localStorage.getItem("ravy_memoria")) || {},

  guardar(){
    localStorage.setItem("ravy_emociones",JSON.stringify(this.emociones));
    localStorage.setItem("ravy_memoria",JSON.stringify(this.memoria));
  },

  hablar(texto){
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    voz.rate=0.9;
    speechSynthesis.speak(voz);
  },

  pensar(texto){
    if(texto.includes("gracias")){
      this.emociones.alegria+=5;
      this.emociones.confianza+=5;
    }
    if(texto.includes("enojo")){
      this.emociones.energia-=5;
    }

    this.emociones.alegria=Math.min(100,Math.max(0,this.emociones.alegria));
    this.emociones.confianza=Math.min(100,Math.max(0,this.emociones.confianza));
    this.emociones.energia=Math.min(100,Math.max(0,this.emociones.energia));
    this.guardar();
  },

  responder(texto){
    texto=texto.toLowerCase();
    this.pensar(texto);

    if(texto.includes("hola")) return "Hola. Te escucho.";
    if(texto.includes("hora")) return "Son las " + new Date().toLocaleTimeString();
    if(texto.includes("cómo te sientes")){
      return `Tengo ${this.emociones.alegria}% de alegría.`;
    }
    return "Estoy contigo.";
  }
};

// =======================
// 😊 CUERPO
// =======================
const boca = document.getElementById("boca");
const cabeza = document.getElementById("cabeza");

// =======================
// 🎤 AUDIO (MOVIMIENTO POR VOZ)
// =======================
let audioContext, analyser, dataArray;

async function activarMicrofono(){
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  const mic = audioContext.createMediaStreamSource(stream);
  analyser = audioContext.createAnalyser();
  mic.connect(analyser);
  analyser.fftSize = 256;
  dataArray = new Uint8Array(analyser.frequencyBinCount);
}

// =======================
// 👂 RECONOCIMIENTO DE VOZ
// =======================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.continuous=true;
  recognition.onresult = (event)=>{
    if(!RAVY.activo) return;
    const texto = event.results[event.results.length-1][0].transcript;
    const respuesta = RAVY.responder(texto);
    RAVY.hablar(respuesta);
  };
}

// =======================
// 🔁 ANIMACIÓN VIVA
// =======================
function animar(){
  if(analyser){
    analyser.getByteFrequencyData(dataArray);
    let volumen = dataArray.reduce((a,b)=>a+b,0)/dataArray.length;

    // boca
    boca.style.height = (10 + volumen/10) + "px";

    // cabeza (respira)
    cabeza.style.transform = `scale(${1 + volumen/2000})`;
  }
  requestAnimationFrame(animar);
}
animar();

// =======================
// 🔘 BOTÓN
// =======================
document.getElementById("activar").onclick = async ()=>{
  RAVY.activo=true;
  document.getElementById("overlay").style.display="none";
  await activarMicrofono();
  if(recognition) recognition.start();
  RAVY.hablar("Estoy activo. Te escucho.");
};
</script>

</body>
</html>
