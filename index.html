<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Nivel 9F</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}
#overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}
button{
  width:120px;
  height:120px;
  border-radius:50%;
  border:none;
  font-size:22px;
  font-weight:bold;
  color:white;
  background:linear-gradient(145deg,#00ffff,#008cff);
  box-shadow:0 0 30px #00aaff;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="overlay">
  <button id="activar">RAVY</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
// =======================
// 🌌 ESCENA 3D
// =======================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.7));
const luz = new THREE.DirectionalLight(0xffffff,1);
luz.position.set(5,10,7);
scene.add(luz);

// =======================
// 🧍 CUERPO
// =======================
const cuerpo = new THREE.Group();
scene.add(cuerpo);

const piel = new THREE.MeshStandardMaterial({color:0xffd1b3});
const ropa = new THREE.MeshStandardMaterial({color:0x00aaff});

const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.5,32,32),piel);
cabeza.position.y = 1.6;
cuerpo.add(cabeza);

const boca = new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.08,0.05),
  new THREE.MeshStandardMaterial({color:0xff5555})
);
boca.position.set(0,1.45,0.45);
cuerpo.add(boca);

const torso = new THREE.Mesh(
  new THREE.CylinderGeometry(0.45,0.45,1.2,32),
  ropa
);
torso.position.y = 0.5;
cuerpo.add(torso);

// =======================
// 🧠 CEREBRO 9F
// =======================
const RAVY = {
  activo:false,
  estado:"silencio", // silencio | escuchando | pensando | hablando

  emociones: JSON.parse(localStorage.getItem("ravy_emociones")) || {
    alegria:50,
    confianza:50,
    energia:50
  },

  memoria: JSON.parse(localStorage.getItem("ravy_historial")) || [],

  guardar(){
    localStorage.setItem("ravy_emociones",JSON.stringify(this.emociones));
    localStorage.setItem("ravy_historial",JSON.stringify(this.memoria));
  },

  hablar(texto){
    this.estado="hablando";
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    voz.rate=0.9;
    voz.onend=()=>this.estado="silencio";
    speechSynthesis.speak(voz);
  },

  procesar(texto){
    texto=texto.toLowerCase();
    this.memoria.push({texto,fecha:Date.now()});
    if(this.memoria.length>80) this.memoria.shift();
    this.guardar();

    if(texto.includes("hola")) return "Hola. Te escucho con atención.";
    if(texto.includes("hora")) return "Son las " + new Date().toLocaleTimeString();
    if(texto.includes("gracias")){
      this.emociones.alegria+=5;
      return "Siempre.";
    }
    return "Estoy contigo.";
  }
};

// =======================
// 👂 OÍDO CON PAUSA (9F)
// =======================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;
let pausaTimer;

if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.continuous=true;
  recognition.interimResults=true;

  recognition.onresult = e=>{
    if(!RAVY.activo) return;
    RAVY.estado="escuchando";

    clearTimeout(pausaTimer);
    pausaTimer = setTimeout(()=>{
      const texto = e.results[e.results.length-1][0].transcript;
      RAVY.estado="pensando";
      const r = RAVY.procesar(texto);
      RAVY.hablar(r);
    },1200); // espera silencio humano
  };
}

// =======================
// 🎭 EXPRESIÓN SEGÚN ESTADO
// =======================
function actualizarExpresiones(){
  if(RAVY.estado==="escuchando"){
    boca.scale.y = 0.4;
    cabeza.rotation.x = -0.1;
  }
  if(RAVY.estado==="hablando"){
    boca.scale.y = 1 + RAVY.emociones.energia/200;
    cabeza.rotation.x = 0;
  }
  if(RAVY.estado==="silencio"){
    boca.scale.y = 0.6;
    cabeza.rotation.x = Math.sin(Date.now()*0.002)*0.03;
  }
}

// =======================
// 🎬 LOOP
// =======================
function animar(){
  requestAnimationFrame(animar);
  actualizarExpresiones();
  renderer.render(scene,camera);
}

// =======================
// 🔘 ACTIVAR
// =======================
document.getElementById("activar").onclick = ()=>{
  document.getElementById("overlay").style.display="none";
  RAVY.activo=true;
  if(recognition) recognition.start();
  RAVY.hablar("Estoy aquí. Puedes hablar.");
  animar();
};

addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
