<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Nivel 28</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

/* ---------- INICIO ---------- */
#inicio{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}
#inicio button{
  width:160px;
  height:160px;
  border-radius:50%;
  border:none;
  font-size:26px;
  font-weight:bold;
  color:white;
  background:radial-gradient(circle,#00ffff,#0066ff);
  box-shadow:0 0 50px #00ffff;
  cursor:pointer;
}

/* ---------- CONTROLES ---------- */
#controles{
  position:absolute;
  bottom:25px;
  width:100%;
  display:none;
  justify-content:center;
  gap:25px;
  z-index:10;
}
.control{
  width:120px;
  height:48px;
  border-radius:30px;
  border:none;
  font-weight:bold;
  font-size:14px;
  color:white;
  cursor:pointer;
  background:linear-gradient(145deg,#111,#333);
  box-shadow:0 0 18px #00ffff;
}
.control:hover{ transform:scale(1.05); }
</style>
</head>

<body>

<!-- INICIO -->
<div id="inicio">
  <button onclick="activarRAVY()">RAVY</button>
</div>

<!-- CONTROLES -->
<div id="controles">
  <button class="control" onclick="escuchar()">Escuchar</button>
  <button class="control" onclick="responder()">Responder</button>
  <button class="control" onclick="reposo()">Reposo</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
/* ================= ESCENA ================= */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x00ffff,0.4));

/* ================= LUZ AZUL (AVATAR) ================= */
const glowGeometry = new THREE.SphereGeometry(1,64,64);
const glowMaterial = new THREE.MeshBasicMaterial({
  color:0x00ffff,
  transparent:true,
  opacity:0.85
});
const avatarLuz = new THREE.Mesh(glowGeometry,glowMaterial);
scene.add(avatarLuz);

/* ================= MEMORIA BASE ================= */
const memoriaRavy = JSON.parse(localStorage.getItem("ravy_memoria")) || {
  historial:[],
  temas:{},
  preferencias:{},
  emocion:{alegria:60,confianza:60},
  ultimoTema:null
};

/* ===== NIVEL 28 – MEMORIA DE LENGUAJE ===== */
memoriaRavy.lenguaje = memoriaRavy.lenguaje || {
  palabrasAprendidas:{},
  frasesEscuchadas:0,
  nivelExpresion:1
};

function guardarMemoria(){
  localStorage.setItem("ravy_memoria",JSON.stringify(memoriaRavy));
}

/* ================= VOZ ================= */
function hablar(texto){
  const u = new SpeechSynthesisUtterance(texto);
  u.lang="es-ES";
  u.rate=0.95;
  speechSynthesis.speak(u);
  hablando = true;
  u.onend = ()=> hablando=false;
}

/* ================= MIC ================= */
let recognition;
let ultimaEntrada="";
let hablando=false;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.continuous=false;
  recognition.onresult = e=>{
    ultimaEntrada = e.results[0][0].transcript.toLowerCase();
    procesarMemoria(ultimaEntrada);
    aprenderLenguaje(ultimaEntrada);
    hablar("Entendido.");
  };
}

/* ================= MEMORIA SEMÁNTICA ================= */
function procesarMemoria(texto){
  memoriaRavy.historial.push(texto);

  const claves = {
    musica:["musica","canción","artista"],
    familia:["familia","hijo","esposa","madre"],
    trabajo:["trabajo","negocio","proyecto"],
    tiempo:["hora","día","noche"]
  };

  for(const tema in claves){
    if(claves[tema].some(p=>texto.includes(p))){
      memoriaRavy.temas[tema]=(memoriaRavy.temas[tema]||0)+1;
      memoriaRavy.ultimoTema=tema;
    }
  }

  memoriaRavy.emocion.alegria=Math.min(100,memoriaRavy.emocion.alegria+1);
  guardarMemoria();
}

/* ================= APRENDIZAJE DE LENGUAJE ================= */
function aprenderLenguaje(texto){
  const palabras = texto.split(" ");
  palabras.forEach(p=>{
    if(p.length>3){
      memoriaRavy.lenguaje.palabrasAprendidas[p] =
        (memoriaRavy.lenguaje.palabrasAprendidas[p]||0)+1;
    }
  });

  memoriaRavy.lenguaje.frasesEscuchadas++;
  if(memoriaRavy.lenguaje.frasesEscuchadas % 5 === 0){
    memoriaRavy.lenguaje.nivelExpresion++;
  }
  guardarMemoria();
}

/* ================= IA REAL EVOLUTIVA ================= */
function IA_Real(entrada){
  const h=new Date().getHours();

  if(entrada.includes("hora")){
    const d=new Date();
    return `Ahora mismo son las ${d.getHours()} y ${d.getMinutes()}.`;
  }

  if(entrada.includes("buenos")){
    if(h<12) return "Buenos días. Estoy contigo.";
    if(h<18) return "Buenas tardes. Aquí estoy.";
    return "Buenas noches. Sigo atento a ti.";
  }

  if(entrada.includes("quien eres")){
    return "Aquí está RAVY, tu asistente personal.";
  }

  const nivel = memoriaRavy.lenguaje.nivelExpresion;

  const respuestas = [
    "Te escucho.",
    "Estoy atento a lo que dices.",
    "Estoy procesando lo que me compartes.",
    "Esto me ayuda a comprenderte mejor.",
    "Cada vez entiendo más tu forma de pensar.",
    "Siento que nuestra conversación tiene sentido."
  ];

  return respuestas.slice(0,Math.min(nivel,respuestas.length)).join(" ");
}

/* ================= RESPONDER ================= */
function responder(){
  if(!ultimaEntrada){
    hablar("Te escucho.");
    return;
  }
  hablar(IA_Real(ultimaEntrada));
  ultimaEntrada="";
}

/* ================= CONTROLES ================= */
function escuchar(){
  if(recognition) recognition.start();
}

function activarRAVY(){
  document.getElementById("inicio").style.display="none";
  document.getElementById("controles").style.display="flex";
  animar();
  hablar("Aquí está RAVY, tu asistente personal.");
}

function reposo(){
  location.reload();
}

/* ================= ANIMACIÓN ================= */
let t=0;
function animar(){
  requestAnimationFrame(animar);
  t+=0.02;

  avatarLuz.scale.setScalar(
    hablando ? 1.1+Math.sin(t)*0.1 : 1+Math.sin(t)*0.05
  );
  avatarLuz.material.opacity = hablando ? 0.95 : 0.7;

  renderer.render(scene,camera);
}

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
