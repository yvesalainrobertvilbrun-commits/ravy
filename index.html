<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
}

#overlay{
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  z-index:10;
}

#activar-ravy{
  width:90px;
  height:90px;
  border-radius:50%;
  border:none;
  font-size:18px;
  font-weight:bold;
  color:white;
  background:linear-gradient(145deg,#00e5ff,#0099ff);
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
  cursor:pointer;
}
</style>
</head>

<body>

<div id="overlay">
  <button id="activar-ravy">RAVY</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
// ===== ESCENA =====
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  50,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0,1.6,6);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// ===== LUCES =====
scene.add(new THREE.AmbientLight(0xffffff,0.6));
const luz = new THREE.DirectionalLight(0xffffff,1);
luz.position.set(5,10,7);
scene.add(luz);

// ===== RAVY HUMANOIDE =====
const cuerpo = new THREE.Group();
scene.add(cuerpo);

// Materiales
const piel = new THREE.MeshStandardMaterial({color:0xffd1b3});
const ropa = new THREE.MeshStandardMaterial({color:0x00aaff});

// Cabeza
const cabeza = new THREE.Mesh(
  new THREE.SphereGeometry(0.5,32,32),
  piel
);
cabeza.position.y = 1.6;
cuerpo.add(cabeza);

// Ojos
function ojo(x){
  const ojo = new THREE.Mesh(
    new THREE.SphereGeometry(0.08,16,16),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  ojo.position.set(x,1.65,0.45);
  cuerpo.add(ojo);

  const iris = new THREE.Mesh(
    new THREE.SphereGeometry(0.04,16,16),
    new THREE.MeshStandardMaterial({color:0x000000})
  );
  iris.position.set(x,1.65,0.52);
  cuerpo.add(iris);
}
ojo(-0.15);
ojo(0.15);

// Boca
const boca = new THREE.Mesh(
  new THREE.BoxGeometry(0.25,0.05,0.05),
  new THREE.MeshStandardMaterial({color:0xff5555})
);
boca.position.set(0,1.45,0.45);
cuerpo.add(boca);

// Torso
const torso = new THREE.Mesh(
  new THREE.CylinderGeometry(0.45,0.45,1.2,32),
  ropa
);
torso.position.y = 0.5;
cuerpo.add(torso);

// Brazos
function brazo(x){
  const b = new THREE.Mesh(
    new THREE.CylinderGeometry(0.1,0.1,0.9,16),
    ropa
  );
  b.position.set(x,0.8,0);
  cuerpo.add(b);
  return b;
}
const brazoIzq = brazo(-0.55);
const brazoDer = brazo(0.55);

// ===== AUDIO =====
let analyser, dataArray;

async function activarAudio(){
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  const mic = ctx.createMediaStreamSource(stream);
  analyser = ctx.createAnalyser();
  mic.connect(analyser);
  analyser.fftSize = 256;
  dataArray = new Uint8Array(analyser.frequencyBinCount);
}

// ===== CEREBRO RAVY =====
const RAVY = {
  activo:false,
  memoria: JSON.parse(localStorage.getItem("ravy_memoria")) || {},

  hablar(texto){
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    speechSynthesis.speak(voz);
  },

  guardar(clave,valor){
    this.memoria[clave]=valor;
    localStorage.setItem("ravy_memoria",JSON.stringify(this.memoria));
  },

  escuchar(texto){
    texto = texto.toLowerCase();

    if(texto.includes("recuerda que")){
      const dato = texto.replace("ravy recuerda que","").trim();
      this.guardar("recuerdo",dato);
      this.hablar("Lo recordaré");
      return;
    }

    if(texto.includes("qué recuerdas")){
      const r = this.memoria.recuerdo;
      this.hablar(r ? "Recuerdo que "+r : "Aún no recuerdo nada");
      return;
    }

    if(texto.includes("hora")){
      this.hablar("Son las "+new Date().toLocaleTimeString());
      return;
    }

    this.hablar("Estoy contigo");
  }
};

// ===== VOZ =====
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let reconocimiento;

if(SpeechRecognition){
  reconocimiento = new SpeechRecognition();
  reconocimiento.lang="es-ES";
  reconocimiento.continuous=true;
  reconocimiento.onresult = e=>{
    if(!RAVY.activo) return;
    const t = e.results[e.results.length-1][0].transcript;
    if(t.toLowerCase().includes("ravy")) RAVY.escuchar(t);
  };
}

// ===== BOTÓN =====
document.getElementById("activar-ravy").onclick = async ()=>{
  RAVY.activo=true;
  await activarAudio();
  reconocimiento.start();
  RAVY.hablar("Estoy aquí");
};

// ===== ANIMACIÓN =====
function animar(){
  requestAnimationFrame(animar);

  if(analyser){
    analyser.getByteFrequencyData(dataArray);
    const v = dataArray.reduce((a,b)=>a+b,0)/dataArray.length;
    boca.scale.y = 1 + v/200;
    brazoIzq.rotation.z = Math.sin(v/200)*0.5;
    brazoDer.rotation.z = -Math.sin(v/200)*0.5;
  }

  renderer.render(scene,camera);
}
animar();

window.onresize=()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
};
</script>

</body>
</html>
