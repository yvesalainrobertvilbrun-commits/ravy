<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – IA Mejorada</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}
#inicio{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}
#inicio button{
  width:160px;
  height:160px;
  border-radius:50%;
  border:none;
  font-size:26px;
  font-weight:bold;
  color:white;
  background:radial-gradient(circle,#00ffff,#0066ff);
  box-shadow:0 0 50px #00ffff;
  cursor:pointer;
}
#controles{
  position:absolute;
  bottom:25px;
  width:100%;
  display:none;
  justify-content:center;
  gap:25px;
  z-index:10;
}
.control{
  width:120px;
  height:48px;
  border-radius:30px;
  border:none;
  font-weight:bold;
  font-size:14px;
  color:white;
  cursor:pointer;
  background:linear-gradient(145deg,#111,#333);
  box-shadow:0 0 18px #00ffff;
}
.control:hover{ transform:scale(1.05); }
</style>
</head>

<body>

<div id="inicio">
  <button onclick="activarRAVY()">RAVY</button>
</div>

<div id="controles">
  <button class="control" onclick="escuchar()">Escuchar</button>
  <button class="control" onclick="responder()">Responder</button>
  <button class="control" onclick="reposo()">Reposo</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
/* ================= ESCENA ================= */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z = 6;
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

/* ================= LUZ AZUL ================= */
const luzRavy = new THREE.PointLight(0x1a73e8,1,8);
luzRavy.position.set(0,1.5,0);
scene.add(luzRavy);

/* ================= MEMORIA ================= */
const memoriaRavy = JSON.parse(localStorage.getItem("ravy_memoria")) || {
  historial:[],
  temas:{},
  preferencias:{},
  emocion:{alegria:60,confianza:60},
  ultimoTema:null
};
function guardarMemoria(){
  localStorage.setItem("ravy_memoria",JSON.stringify(memoriaRavy));
}

/* ================= VOZ ================= */
function hablar(texto){
  const u = new SpeechSynthesisUtterance(texto);
  u.lang="es-ES";
  u.rate=0.95;
  speechSynthesis.speak(u);
}

/* ================= MIC ================= */
let recognition;
let ultimaEntrada="";
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.continuous=false;
  recognition.onresult = e=>{
    ultimaEntrada = e.results[0][0].transcript.toLowerCase();
    procesarMemoria(ultimaEntrada);
    hablar("Entendido.");
    // Proactividad: sugerir tema si RAVY detecta silencio
    setTimeout(()=>proactividad(),2000);
  };
}

/* ================= MEMORIA AUTÓNOMA ================= */
function procesarMemoria(texto){
  memoriaRavy.historial.push(texto);

  const claves = {
    musica:["musica","canción","artista"],
    familia:["familia","hijo","esposa","madre"],
    trabajo:["trabajo","negocio","proyecto"],
    tiempo:["hora","día","noche"],
    emociones:["feliz","triste","enfadado","emocionado","cansado","ansioso"]
  };

  for(const tema in claves){
    if(claves[tema].some(p=>texto.includes(p))){
      memoriaRavy.temas[tema]=(memoriaRavy.temas[tema]||0)+1;
      memoriaRavy.ultimoTema=tema;

      // Ajuste emocional automático
      if(tema==="emociones"){
        if(texto.includes("feliz") || texto.includes("emocionado")){
          memoriaRavy.emocion.alegria=Math.min(100,memoriaRavy.emocion.alegria+5);
        } else if(texto.includes("triste") || texto.includes("enfadado")){
          memoriaRavy.emocion.alegria=Math.max(0,memoriaRavy.emocion.alegria-5);
        }
      }
    }
  }

  if(texto.includes("me gusta")){
    memoriaRavy.preferencias[texto]=true;
  }
  guardarMemoria();
}

/* ================= IA MEJORADA ================= */
function IA_Real(entrada){
  const h = new Date().getHours();
  let respuesta="";

  // Tiempo
  if(entrada.includes("hora")){
    const d=new Date();
    return `Ahora mismo son las ${d.getHours()} y ${d.getMinutes()}.`;
  }

  // Saludo
  if(entrada.includes("buenos")){
    if(h<12) return "Buenos días, estoy contigo.";
    if(h<18) return "Buenas tardes, aquí estoy.";
    return "Buenas noches, sigo atento a ti.";
  }

  // Identidad
  if(entrada.includes("quien eres")){
    return "Aquí está RAVY, tu asistente personal.";
  }

  // Emociones detectadas
  if(memoriaRavy.ultimoTema==="emociones"){
    if(memoriaRavy.emocion.alegria>70) respuesta="Parece que estás muy feliz, me alegra saberlo.";
    else if(memoriaRavy.emocion.alegria<40) respuesta="Veo que no te sientes muy bien, ¿quieres hablar de ello?";
    else respuesta="Te escucho, sigo atento a tus emociones.";
    return respuesta;
  }

  // Conversación contextual
  if(memoriaRavy.ultimoTema){
    respuesta = `Seguimos hablando sobre ${memoriaRavy.ultimoTema}. Te escucho.`;
  } else {
    respuesta = "Te escucho con atención.";
  }

  return respuesta;
}

/* ================= RESPONDER ================= */
function responder(){
  if(!ultimaEntrada){
    hablar("Aún no me has dicho nada.");
    return;
  }
  const r = IA_Real(ultimaEntrada);
  hablar(r);
  ultimaEntrada="";
}

/* ================= PROACTIVIDAD ================= */
function proactividad(){
  if(!ultimaEntrada){
    // RAVY sugiere un tema de conversación aleatorio
    const temas = Object.keys(memoriaRavy.temas);
    if(temas.length>0){
      const t = temas[Math.floor(Math.random()*temas.length)];
      hablar(`¿Quieres hablar sobre ${t}?`);
    } else {
      hablar("Podemos hablar sobre música, familia o tu día.");
    }
  }
}

/* ================= CONTROLES ================= */
function escuchar(){
  if(recognition) recognition.start();
}

function activarRAVY(){
  document.getElementById("inicio").style.display="none";
  document.getElementById("controles").style.display="flex";
  animar();
  hablar("Aquí está RAVY, tu asistente personal.");
}

function reposo(){
  location.reload();
}

/* ================= ANIMACIÓN LUZ ================= */
let luzDir=1;
function animar(){
  requestAnimationFrame(animar);
  luzRavy.position.y += 0.01*luzDir;
  if(luzRavy.position.y>2 || luzRavy.position.y<1) luzDir*=-1;
  renderer.render(scene,camera);
}

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
