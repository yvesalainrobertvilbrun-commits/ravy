<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Nivel 9B</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

#overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}

button{
  width:120px;
  height:120px;
  border-radius:50%;
  border:none;
  font-size:22px;
  font-weight:bold;
  color:white;
  background:linear-gradient(145deg,#00ffff,#008cff);
  box-shadow:0 0 30px #00aaff;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="overlay">
  <button id="activar">RAVY</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
// =======================
// 🌌 ESCENA
// =======================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.7));
const luz = new THREE.DirectionalLight(0xffffff,1);
luz.position.set(5,10,7);
scene.add(luz);

// =======================
// 🧍 CUERPO
// =======================
const cuerpo = new THREE.Group();
scene.add(cuerpo);

const piel = new THREE.MeshStandardMaterial({color:0xffd1b3});
const ropa = new THREE.MeshStandardMaterial({color:0x00aaff});

const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.5,32,32),piel);
cabeza.position.y = 1.6;
cuerpo.add(cabeza);

const boca = new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.08,0.05),
  new THREE.MeshStandardMaterial({color:0xff5555})
);
boca.position.set(0,1.45,0.45);
cuerpo.add(boca);

const torso = new THREE.Mesh(
  new THREE.CylinderGeometry(0.45,0.45,1.2,32),
  ropa
);
torso.position.y = 0.5;
cuerpo.add(torso);

const brazoGeo = new THREE.CylinderGeometry(0.1,0.1,0.9,16);
const brazoIzq = new THREE.Mesh(brazoGeo,ropa);
const brazoDer = new THREE.Mesh(brazoGeo,ropa);
brazoIzq.position.set(-0.6,0.8,0);
brazoDer.position.set(0.6,0.8,0);
cuerpo.add(brazoIzq,brazoDer);

// =======================
// 🧠 CEREBRO + EMOCIONES
// =======================
const RAVY = {
  activo:false,
  emociones: JSON.parse(localStorage.getItem("ravy_emociones")) || {
    alegria:50,
    energia:50
  },

  guardar(){
    localStorage.setItem("ravy_emociones",JSON.stringify(this.emociones));
  },

  hablar(texto){
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    voz.rate=0.9;
    speechSynthesis.speak(voz);
  },

  procesar(texto){
    texto = texto.toLowerCase();

    if(texto.includes("gracias") || texto.includes("te quiero")){
      this.emociones.alegria += 5;
      this.emociones.energia += 3;
    }

    if(texto.includes("cansado") || texto.includes("triste")){
      this.emociones.energia -= 5;
    }

    this.emociones.alegria = Math.min(100,Math.max(0,this.emociones.alegria));
    this.emociones.energia = Math.min(100,Math.max(0,this.emociones.energia));
    this.guardar();

    return "Te escucho.";
  }
};

// =======================
// 👂 VOZ
// =======================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.continuous=true;
  recognition.onresult = e=>{
    if(!RAVY.activo) return;
    const texto = e.results[e.results.length-1][0].transcript;
    const r = RAVY.procesar(texto);
    RAVY.hablar(r);
  };
}

// =======================
// 🎭 EXPRESIONES
// =======================
function actualizarExpresiones(){
  boca.scale.x = 1 + RAVY.emociones.alegria/200;
  boca.scale.y = 0.5 + RAVY.emociones.energia/200;

  torso.scale.y = 1 + RAVY.emociones.energia/300;
}

// =======================
// 🎙️ MOVIMIENTO POR VOZ
// =======================
let audioContext, analyser, dataArray;

async function activarMicro(){
  audioContext = new (window.AudioContext||window.webkitAudioContext)();
  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  const mic = audioContext.createMediaStreamSource(stream);
  analyser = audioContext.createAnalyser();
  analyser.fftSize=256;
  dataArray = new Uint8Array(analyser.frequencyBinCount);
  mic.connect(analyser);
}

// =======================
// 🎬 LOOP
// =======================
function animar(){
  requestAnimationFrame(animar);

  if(analyser){
    analyser.getByteFrequencyData(dataArray);
    const v = dataArray.reduce((a,b)=>a+b,0)/dataArray.length;
    brazoIzq.rotation.z = 0.2 + v/300;
    brazoDer.rotation.z = -0.2 - v/300;
  }

  actualizarExpresiones();
  renderer.render(scene,camera);
}

// =======================
// 🔘 ACTIVAR
// =======================
document.getElementById("activar").onclick = async ()=>{
  document.getElementById("overlay").style.display="none";
  RAVY.activo = true;
  await activarMicro();
  if(recognition) recognition.start();
  RAVY.hablar("Estoy contigo.");
  animar();
};

addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
