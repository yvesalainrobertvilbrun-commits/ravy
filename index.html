<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RAVY</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0f14;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* PANTALLA PRINCIPAL */
#inicio{
  display:flex;
  flex-direction:column;
  align-items:center;
}

#btnInicio{
  padding:25px 60px;
  font-size:26px;
  border:none;
  border-radius:40px;
  background:linear-gradient(135deg,#00f2ff,#0066ff);
  color:black;
  cursor:pointer;
}

/* CUERPO DE RAVY */
#ravy{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

#estado{
  font-size:18px;
  opacity:.85;
}

/* BOTONES */
.controles{
  display:flex;
  justify-content:space-between;
  width:320px;
}

.btn{
  padding:14px 22px;
  font-size:16px;
  border:none;
  border-radius:25px;
  cursor:pointer;
}

.escuchar{ background:#00ff9d; }
.responder{ background:#00b3ff; }
.reposo{
  background:#ff3b3b;
  margin-top:10px;
  width:180px;
}
</style>
</head>

<body>

<div id="inicio">
  <button id="btnInicio">RAVY</button>
</div>

<div id="ravy">
  <div id="estado">Modo reposo</div>

  <div class="controles">
    <button class="btn escuchar" onclick="escuchar()">Escuchar</button>
    <button class="btn responder" onclick="responder()">Responder</button>
  </div>

  <button class="btn reposo" onclick="reposo()">Reposo</button>
</div>

<script>
/* ===============================
   MEMORIA BASE (NO SE BORRA)
================================ */

let memoriaRavy = JSON.parse(localStorage.getItem("memoriaRavy")) || {
  usuario:{ nombre:"" },
  historial:[],
  emocion:"neutral"
};

/* ===============================
   NUEVO – CONTEXTO DE CONVERSACIÓN
================================ */

let contextoConversacion = [];
let ultimoTema = "";
let modoConversacion = true;

/* ===============================
   GUARDAR MEMORIA
================================ */

function guardarMemoria(){
  localStorage.setItem("memoriaRavy", JSON.stringify(memoriaRavy));
}

/* ===============================
   VOZ
================================ */

function hablar(texto){
  const voz = new SpeechSynthesisUtterance(texto);
  voz.lang = "es-ES";
  speechSynthesis.speak(voz);
}

/* ===============================
   RECONOCIMIENTO DE VOZ
================================ */

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = "es-ES";
recognition.continuous = false;

let ultimaPregunta = "";

recognition.onresult = e=>{
  ultimaPregunta = e.results[0][0].transcript.toLowerCase();

  detectarEmocion(ultimaPregunta);
  detectarTema(ultimaPregunta);

  contextoConversacion.push(ultimaPregunta);
  if(contextoConversacion.length > 5){
    contextoConversacion.shift();
  }

  memoriaRavy.historial.push({
    texto: ultimaPregunta,
    emocion: memoriaRavy.emocion,
    fecha: Date.now()
  });

  guardarMemoria();
  estado.textContent = "Te escuché. Continúa o responde.";
};

/* ===============================
   EMOCIONES
================================ */

function detectarEmocion(texto){
  if(texto.includes("triste") || texto.includes("mal")){
    memoriaRavy.emocion = "triste";
  }else if(texto.includes("feliz") || texto.includes("bien")){
    memoriaRavy.emocion = "feliz";
  }else if(texto.includes("cansado")){
    memoriaRavy.emocion = "cansado";
  }else{
    memoriaRavy.emocion = "neutral";
  }
}

/* ===============================
   TEMA DE CONVERSACIÓN
================================ */

function detectarTema(texto){
  if(texto.includes("hora")) ultimoTema = "hora";
  if(texto.includes("nombre")) ultimoTema = "nombre";
  if(texto.includes("como estas")) ultimoTema = "estado";
}

/* ===============================
   RESPUESTA CONTINUA
================================ */

function responder(){
  if(!ultimaPregunta){
    hablar("Te escucho, dime algo.");
    return;
  }

  let respuesta = "";

  // CONTEXTO
  if(ultimaPregunta.includes("y tú")){
    respuesta = "Estoy aquí contigo, atento a ti.";
  }

  else if(ultimoTema === "hora"){
    const ahora = new Date();
    respuesta = `Son las ${ahora.getHours()} y ${ahora.getMinutes()}.`;
  }

  else if(ultimoTema === "nombre"){
    if(memoriaRavy.usuario.nombre){
      respuesta = `Tu nombre es ${memoriaRavy.usuario.nombre}.`;
    }else{
      respuesta = "Aún no me has dicho tu nombre.";
    }
  }

  else if(ultimaPregunta.includes("mi nombre es")){
    memoriaRavy.usuario.nombre =
      ultimaPregunta.split("mi nombre es")[1].trim();
    guardarMemoria();
    respuesta = "Perfecto, lo recordaré.";
  }

  else if(ultimaPregunta.includes("hola") || ultimaPregunta.includes("buenos")){
    respuesta = memoriaRavy.usuario.nombre
      ? `Hola ${memoriaRavy.usuario.nombre}, aquí está RAVY.`
      : "Aquí está RAVY, tu asistente personal.";
  }

  else{
    // RESPUESTA EMOCIONAL
    switch(memoriaRavy.emocion){
      case "triste":
        respuesta = "Estoy contigo. Puedes seguir hablando.";
        break;
      case "feliz":
        respuesta = "Se siente bien escucharte así.";
        break;
      case "cansado":
        respuesta = "Tómate tu tiempo, aquí estoy.";
        break;
      default:
        respuesta = "Te escucho. Continúa.";
    }
  }

  hablar(respuesta);
  ultimaPregunta = "";
}

/* ===============================
   CONTROLES
================================ */

function escuchar(){
  estado.textContent = "Escuchando...";
  recognition.start();
}

function reposo(){
  ultimaPregunta = "";
  contextoConversacion = [];
  ultimoTema = "";
  estado.textContent = "Modo reposo";
  document.getElementById("ravy").style.display="none";
  document.getElementById("inicio").style.display="flex";
}

/* ===============================
   INICIO
================================ */

btnInicio.onclick = ()=>{
  document.getElementById("inicio").style.display="none";
  document.getElementById("ravy").style.display="flex";
  estado.textContent = "Aquí está RAVY, tu asistente personal.";
  hablar("Aquí está RAVY, tu asistente personal.");
};
</script>

</body>
</html>
