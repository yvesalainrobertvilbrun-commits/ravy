<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Nivel 14</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

#overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}

button{
  width:120px;
  height:120px;
  border-radius:50%;
  border:none;
  font-size:22px;
  font-weight:bold;
  color:white;
  background:linear-gradient(145deg,#00ffff,#008cff);
  box-shadow:0 0 30px #00aaff;
  cursor:pointer;
}

button:hover{
  transform:scale(1.1);
  box-shadow:0 0 50px #00ffff;
}
</style>
</head>

<body>

<div id="overlay">
  <button id="activar">RAVY</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
// =======================
// 🌌 ESCENA 3D
// =======================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.7));
const luz = new THREE.DirectionalLight(0xffffff,1);
luz.position.set(5,10,7);
scene.add(luz);

// =======================
// 🧍 CUERPO
// =======================
const cuerpo = new THREE.Group();
scene.add(cuerpo);

const piel = new THREE.MeshStandardMaterial({color:0xffd1b3});
const ropa = new THREE.MeshStandardMaterial({color:0x00aaff, transparent:true, opacity:0.7});

// Cabeza
const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.5,32,32),piel);
cabeza.position.y = 1.6;
cuerpo.add(cabeza);

// Ojos
const ojoIzq = new THREE.Mesh(new THREE.SphereGeometry(0.08,16,16), new THREE.MeshStandardMaterial({color:0xffffff}));
const irisIzq = new THREE.Mesh(new THREE.SphereGeometry(0.04,16,16), new THREE.MeshStandardMaterial({color:0x000000}));
ojoIzq.position.set(-0.15,1.65,0.45);
irisIzq.position.set(-0.15,1.65,0.52);

const ojoDer = new THREE.Mesh(new THREE.SphereGeometry(0.08,16,16), new THREE.MeshStandardMaterial({color:0xffffff}));
const irisDer = new THREE.Mesh(new THREE.SphereGeometry(0.04,16,16), new THREE.MeshStandardMaterial({color:0x000000}));
ojoDer.position.set(0.15,1.65,0.45);
irisDer.position.set(0.15,1.65,0.52);

cuerpo.add(ojoIzq, irisIzq, ojoDer, irisDer);

// Boca
const boca = new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.08,0.05),
  new THREE.MeshStandardMaterial({color:0xff5555})
);
boca.position.set(0,1.45,0.45);
cuerpo.add(boca);

// Torso
const torso = new THREE.Mesh(
  new THREE.CylinderGeometry(0.45,0.45,1.2,32),
  ropa
);
torso.position.y = 0.5;
cuerpo.add(torso);

// Brazos
const brazoGeo = new THREE.CylinderGeometry(0.1,0.1,0.9,16);
const brazoIzq = new THREE.Mesh(brazoGeo, ropa);
brazoIzq.position.set(-0.55,0.8,0);

const brazoDer = new THREE.Mesh(brazoGeo, ropa);
brazoDer.position.set(0.55,0.8,0);

cuerpo.add(brazoIzq, brazoDer);

// =======================
// 🧠 CEREBRO RAVY
// =======================
const RAVY = {
  activo:false,
  presentado:false,

  emociones: JSON.parse(localStorage.getItem("ravy_emociones")) || {
    alegria:50,
    energia:50
  },

  memoria: JSON.parse(localStorage.getItem("ravy_memoria")) || {
    larga:[],
    corta:[]
  },

  guardar(){
    localStorage.setItem("ravy_emociones",JSON.stringify(this.emociones));
    localStorage.setItem("ravy_memoria",JSON.stringify(this.memoria));
  },

  recordarImportante(texto){
    this.memoria.larga.push({
      texto,
      fecha:new Date().toLocaleString()
    });
    if(this.memoria.larga.length > 200) this.memoria.larga.shift();
    this.guardar();
  },

  agregarCorta(texto){
    this.memoria.corta.push(texto);
    if(this.memoria.corta.length > 20) this.memoria.corta.shift();
  },

  hablar(texto){
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    voz.rate=0.95;
    speechSynthesis.speak(voz);
  },

  procesar(texto){
    texto = texto.toLowerCase();
    this.agregarCorta(texto);

    if(!this.presentado){
      this.presentado = true;
      return "Aquí está RAVY, tu asistente personal.";
    }

    if(texto.includes("recuerda que")){
      const r = texto.replace("recuerda que","").trim();
      this.recordarImportante(r);
      return "Lo guardaré.";
    }

    if(texto.includes("qué recuerdas de mí")){
      if(this.memoria.larga.length===0) return "Aún no tengo recuerdos importantes sobre ti.";
      return "Recuerdo que " + this.memoria.larga[this.memoria.larga.length-1].texto;
    }

    if(texto.includes("buenos días")) return "Buenos días.";
    if(texto.includes("buenas tardes")) return "Buenas tardes.";
    if(texto.includes("buenas noches")) return "Buenas noches.";
    if(texto.includes("hola")) return "Hola.";

    if(texto.includes("hora")){
      return "Son las " + new Date().toLocaleTimeString();
    }

    return "Te escucho.";
  }
};

// =======================
// 👂 OÍDO
// =======================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.continuous=true;
  recognition.interimResults=false;

  recognition.onresult = e=>{
    if(!RAVY.activo) return;
    const texto = e.results[e.results.length-1][0].transcript;
    const r = RAVY.procesar(texto);
    RAVY.hablar(r);
    recognition.stop();
    recognition.start();
  };
}

// =======================
// 🎭 EXPRESIONES
// =======================
let resp = 0;
let dir = 1;

function actualizarExpresiones(){
  resp += 0.004 * dir;
  if(resp>0.05 || resp<-0.05) dir*=-1;
  torso.position.y = 0.5 + resp;

  boca.scale.x = 1 + RAVY.emociones.alegria/200;
  boca.scale.y = 0.8 + RAVY.emociones.energia/200;
}

// =======================
// 🎬 LOOP
// =======================
function animar(){
  requestAnimationFrame(animar);
  actualizarExpresiones();
  renderer.render(scene,camera);
}

// =======================
// 🔘 ACTIVAR
// =======================
document.getElementById("activar").onclick = ()=>{
  RAVY.activo = true;
  document.getElementById("overlay").style.display="none";
  if(recognition) recognition.start();
  animar();
};

addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
