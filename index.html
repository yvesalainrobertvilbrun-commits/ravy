<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RAVY</title>

<style>
body{
  margin:0;
  height:100vh;
  background:radial-gradient(circle at top,#0f2027,#000);
  font-family:system-ui, Arial;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
}
#inicio{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}
#btnInicio{
  padding:28px 90px;
  font-size:30px;
  font-weight:600;
  border:none;
  border-radius:60px;
  background:linear-gradient(135deg,#00f2ff,#007bff);
  cursor:pointer;
  box-shadow:0 0 40px #00f2ff88;
  transition:.3s;
}
#btnInicio:hover{ transform:scale(1.08); }

#ravy{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

#avatar{
  width:160px;
  height:160px;
  border-radius:50%;
  background:radial-gradient(circle at top,#00f2ff,#004d66);
  box-shadow:0 0 45px #00f2ff88;
  animation:respirar 4s ease-in-out infinite;
  transition:all .6s ease;
}
.hablando{ animation:hablar .35s infinite alternate; }

@keyframes respirar{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.05); }
}
@keyframes hablar{
  from{ transform:scale(1.02); }
  to{ transform:scale(1.1); }
}

#estado{ font-size:15px; opacity:.85; }

.panel{ display:flex; gap:18px; }

.btn{
  min-width:140px;
  padding:15px 22px;
  border:none;
  border-radius:18px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:.25s;
}
.btn:active{ transform:scale(0.95); }

.listen{ background:linear-gradient(135deg,#00ffb3,#00b37a); }
.think{ background:linear-gradient(135deg,#00aaff,#0066cc); }
.sleep{
  background:linear-gradient(135deg,#ff4d4d,#b30000);
  width:240px;
}
</style>
</head>

<body>

<div id="inicio">
  <button id="btnInicio">RAVY</button>
</div>

<div id="ravy">
  <div id="avatar"></div>
  <div id="estado">Modo reposo</div>

  <div class="panel">
    <button class="btn listen" onclick="escuchar()">🎤 Escuchar</button>
    <button class="btn think" onclick="responder()">🧠 Responder</button>
  </div>

  <button class="btn sleep" onclick="reposo()">💤 Reposo</button>
</div>

<script>
/* ================= MEMORIA ================= */
let memoriaRavy = JSON.parse(localStorage.getItem("memoriaRavy")) || {
  usuario:{ nombre:"" },
  corto:[],
  largo:[],
  resumen:"",
  trato:"neutral",
  emocion:{ alegria:60, respeto:100, confianza:50 }
};

function guardar(){
  localStorage.setItem("memoriaRavy",JSON.stringify(memoriaRavy));
}

/* ================= NIVEL 23 ================= */
function actualizarAvatarEmocional(){
  const a = memoriaRavy.emocion.alegria;
  const c = memoriaRavy.emocion.confianza;

  let color1="#00f2ff", color2="#004d66", glow="#00f2ff88", speed="4s";

  if(c>70 && a>70){
    color1="#ffd700"; color2="#b8860b"; glow="#ffd700aa"; speed="2.5s";
  }else if(a>65){
    color1="#00ff88"; color2="#007a44"; glow="#00ff88aa"; speed="3s";
  }else if(c<40){
    color1="#ff4d4d"; color2="#660000"; glow="#ff4d4daa"; speed="5s";
  }

  avatar.style.background=`radial-gradient(circle at top,${color1},${color2})`;
  avatar.style.boxShadow=`0 0 50px ${glow}`;
  avatar.style.animationDuration=speed;
}

/* ================= VOZ ================= */
function hablar(texto){
  const voz = new SpeechSynthesisUtterance(texto);
  voz.lang="es-ES";
  voz.rate = memoriaRavy.emocion.confianza>60?0.9:1;
  voz.pitch = memoriaRavy.emocion.alegria>60?1.05:0.95;

  speechSynthesis.cancel();
  avatar.classList.add("hablando");
  speechSynthesis.speak(voz);
  voz.onend=()=>avatar.classList.remove("hablando");
}

/* ================= OÍDO ================= */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SR();
recognition.lang="es-ES";
recognition.continuous=false;

let ultimaEntrada="";

recognition.onresult=e=>{
  ultimaEntrada=e.results[0][0].transcript.toLowerCase();
  estado.textContent="Escuchado. Pulsa responder.";

  analizarEmocion(ultimaEntrada);
  actualizarAvatarEmocional();

  memoriaRavy.corto.push(ultimaEntrada);
  if(memoriaRavy.corto.length>5){
    memoriaRavy.resumen =
      "Hemos hablado de: " + memoriaRavy.corto.slice(-3).join(", ");
    memoriaRavy.corto=[];
  }
  guardar();
};

/* ================= EMOCIÓN ================= */
function analizarEmocion(t){
  if(t.includes("gracias")||t.includes("por favor")){
    memoriaRavy.emocion.confianza+=5;
    memoriaRavy.emocion.alegria+=3;
  }
  memoriaRavy.emocion.confianza=Math.max(0,Math.min(100,memoriaRavy.emocion.confianza));
  memoriaRavy.emocion.alegria=Math.max(0,Math.min(100,memoriaRavy.emocion.alegria));
}

/* ================= RESPUESTA ================= */
function responder(){
  if(!ultimaEntrada){ hablar("Te escucho."); return; }

  let r="";

  if(ultimaEntrada.includes("hola")||ultimaEntrada.includes("buenos")){
    r = memoriaRavy.emocion.confianza>60
      ? "Hola, me alegra escucharte."
      : "Hola. Aquí estoy.";
  }else if(ultimaEntrada.includes("hora")){
    const d=new Date();
    r=`Son las ${d.getHours()} y ${d.getMinutes()}.`;
  }else{
    r="Te escucho.";
  }

  hablar(r);
  actualizarAvatarEmocional();
  ultimaEntrada="";
}

/* ================= CONTROLES ================= */
function escuchar(){
  estado.textContent="Escuchando...";
  recognition.start();
}
function reposo(){
  ultimaEntrada="";
  document.getElementById("ravy").style.display="none";
  document.getElementById("inicio").style.display="flex";
}

/* ================= INICIO ================= */
btnInicio.onclick=()=>{
  inicio.style.display="none";
  ravy.style.display="flex";
  estado.textContent="Aquí está RAVY, tu asistente personal.";
  actualizarAvatarEmocional();
  hablar("Aquí está RAVY, tu asistente personal.");
};
</script>

</body>
</html>
