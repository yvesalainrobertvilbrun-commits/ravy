<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

/* BOTÓN */
#overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}
button{
  width:120px;
  height:120px;
  border-radius:50%;
  border:none;
  font-size:22px;
  font-weight:bold;
  color:white;
  background:linear-gradient(145deg,#00ffff,#008cff);
  box-shadow:0 0 30px #00aaff;
  cursor:pointer;
}

/* ESCENA */
#escena{
  position:absolute;
  width:100%;
  height:100%;
}

/* RAVY */
.ravy{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* CABEZA */
.cabeza{
  width:160px;
  height:160px;
  background:#ffd1b3;
  border-radius:50%;
  position:relative;
  transition:0.2s;
}
.ojo{
  width:20px;
  height:20px;
  background:black;
  border-radius:50%;
  position:absolute;
  top:50px;
  transition:0.15s;
}
.ojo.izq{ left:45px; }
.ojo.der{ right:45px; }

.boca{
  width:50px;
  height:10px;
  background:#ff5555;
  border-radius:0 0 40px 40px;
  position:absolute;
  bottom:35px;
  left:50%;
  transform:translateX(-50%);
  transition:0.15s;
}

/* TORSO */
.torso{
  width:140px;
  height:180px;
  background:#008cff;
  border-radius:40px;
  margin-top:10px;
  transition:0.3s;
}
</style>
</head>

<body>

<div id="overlay">
  <button id="activar">RAVY</button>
</div>

<div id="escena">
  <div class="ravy">
    <div class="cabeza" id="cabeza">
      <div class="ojo izq" id="ojoIzq"></div>
      <div class="ojo der" id="ojoDer"></div>
      <div class="boca" id="boca"></div>
    </div>
    <div class="torso" id="torso"></div>
  </div>
</div>

<script>
// =======================
// 🧠 CEREBRO
// =======================
const RAVY={
  activo:false,
  emociones: JSON.parse(localStorage.getItem("ravy_emociones")) || {
    alegria:50,
    confianza:50,
    energia:70
  },
  memoria: JSON.parse(localStorage.getItem("ravy_memoria")) || [],
  guardar(){
    localStorage.setItem("ravy_emociones",JSON.stringify(this.emociones));
    localStorage.setItem("ravy_memoria",JSON.stringify(this.memoria));
  },
  hablar(texto){
    const voz=new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    voz.rate=0.9;
    speechSynthesis.speak(voz);
  },
  aprender(texto){
    this.memoria.push({texto,fecha:new Date().toLocaleString()});
    if(texto.includes("gracias")) this.emociones.alegria+=5;
    if(texto.includes("cansado")) this.emociones.energia-=10;
    limitar();
    this.guardar();
  },
  responder(texto){
    texto=texto.toLowerCase();
    this.aprender(texto);
    if(texto.includes("hola")) return "Aquí estoy.";
    if(texto.includes("cómo te sientes"))
      return `Mi energía es ${this.emociones.energia}%.`;
    return "Te escucho.";
  }
};

function limitar(){
  RAVY.emociones.alegria=Math.min(100,Math.max(0,RAVY.emociones.alegria));
  RAVY.emociones.confianza=Math.min(100,Math.max(0,RAVY.emociones.confianza));
  RAVY.emociones.energia=Math.min(100,Math.max(0,RAVY.emociones.energia));
}

// =======================
// 🎭 EXPRESIONES + CUERPO
// =======================
const boca=document.getElementById("boca");
const ojoIzq=document.getElementById("ojoIzq");
const ojoDer=document.getElementById("ojoDer");
const cabeza=document.getElementById("cabeza");
const torso=document.getElementById("torso");

let parpadeo=1, tiempoParpadeo=0;
let respiracion=0;
let hablando=false;

function actualizarExpresiones(){
  boca.style.width=(40+RAVY.emociones.alegria/2)+"px";
  boca.style.height= hablando ? "25px" : "10px";
  ojoIzq.style.transform=`scaleY(${parpadeo})`;
  ojoDer.style.transform=`scaleY(${parpadeo})`;
}

function respirar(){
  respiracion+=0.05;
  const ritmo=1+(RAVY.emociones.energia/100);
  torso.style.transform=`scaleY(${1+Math.sin(respiracion)*0.05*ritmo})`;
}

function parpadear(){
  tiempoParpadeo++;
  if(tiempoParpadeo>180){
    parpadeo=0.1;
    setTimeout(()=>parpadeo=1,150);
    tiempoParpadeo=0;
  }
}

function metabolismo(){
  if(!RAVY.activo) return;
  RAVY.emociones.energia-=0.02;
  limitar();
}

// =======================
// 🎤 OÍDO
// =======================
const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
let recognition;

if(SpeechRecognition){
  recognition=new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.continuous=true;
  recognition.onresult=(e)=>{
    if(!RAVY.activo) return;
    hablando=true;
    const texto=e.results[e.results.length-1][0].transcript;
    const r=RAVY.responder(texto);
    RAVY.hablar(r);
    setTimeout(()=>hablando=false,500);
  };
}

// =======================
// 🔁 VIDA
// =======================
function loop(){
  parpadear();
  respirar();
  metabolismo();
  actualizarExpresiones();
  requestAnimationFrame(loop);
}
loop();

// =======================
// 🔘 ACTIVAR
// =======================
document.getElementById("activar").onclick=()=>{
  RAVY.activo=true;
  document.getElementById("overlay").style.display="none";
  if(recognition) recognition.start();
  RAVY.hablar("Estoy despierto.");
};
</script>

</body>
</html>
