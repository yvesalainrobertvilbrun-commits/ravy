<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RAVY</title>

<style>
body{
  margin:0;
  background:#0b0b0f;
  color:#fff;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#inicio{
  font-size:32px;
  padding:30px 60px;
  border-radius:50px;
  border:none;
  background:#6a00ff;
  color:white;
  cursor:pointer;
}

#ravy-container{
  display:none;
  flex-direction:column;
  align-items:center;
}

#cara{
  width:220px;
  height:220px;
  background:#111;
  border-radius:50%;
  position:relative;
  animation: respirar 4s infinite ease-in-out;
}

.ojo{
  width:30px;
  height:30px;
  background:white;
  border-radius:50%;
  position:absolute;
  top:70px;
}

.ojo.izq{ left:60px; }
.ojo.der{ right:60px; }

.boca{
  width:60px;
  height:20px;
  background:#ff4d6d;
  border-radius:0 0 40px 40px;
  position:absolute;
  bottom:60px;
  left:50%;
  transform:translateX(-50%);
}

@keyframes respirar{
  0%{ transform:scale(1); }
  50%{ transform:scale(1.03); }
  100%{ transform:scale(1); }
}

#botones{
  margin-top:30px;
  display:flex;
  gap:15px;
}

.btn{
  padding:12px 20px;
  border-radius:30px;
  border:none;
  cursor:pointer;
  font-size:14px;
}

.listen{ background:#00c2ff; }
.talk{ background:#00ff99; }
.rest{ background:#ff4444; color:white; }

#texto{
  margin-top:20px;
  min-height:40px;
  text-align:center;
  max-width:300px;
}
</style>
</head>

<body>

<button id="inicio">RAVY</button>

<div id="ravy-container">
  <div id="cara">
    <div class="ojo izq"></div>
    <div class="ojo der"></div>
    <div class="boca" id="boca"></div>
  </div>

  <div id="botones">
    <button class="btn listen" onclick="escuchar()">Escuchar</button>
    <button class="btn talk" onclick="responder()">Responder</button>
    <button class="btn rest" onclick="reposo()">Reposo</button>
  </div>

  <div id="texto"></div>
</div>

<script>
// ================== RAVY NÚCLEO ==================
const RAVY = {
  emociones:{
    alegria:50,
    energia:50
  },
  memoria: JSON.parse(localStorage.getItem("ravy_memoria")) || [],
  despierto:false,
  presentacion:false
};

const boca = document.getElementById("boca");
const texto = document.getElementById("texto");

// ================== EXPRESIONES ==================
function actualizarExpresiones(){
  boca.style.transform = 
    `translateX(-50%) scaleX(${1 + RAVY.emociones.alegria/200})
     scaleY(${0.5 + RAVY.emociones.energia/200})`;
}

// ================== INICIO ==================
document.getElementById("inicio").onclick = ()=>{
  document.getElementById("inicio").style.display="none";
  document.getElementById("ravy-container").style.display="flex";
  RAVY.despierto=true;

  if(!RAVY.presentacion){
    hablar("Aquí está RAVY, tu asistente personal.");
    RAVY.presentacion=true;
  }
};

// ================== ESCUCHAR ==================
function escuchar(){
  hablar("Te escucho.");
  guardarMemoria("Usuario activó modo escuchar");
}

// ================== RESPONDER ==================
function responder(){
  let respuesta = generarRespuesta();
  hablar(respuesta);
  guardarMemoria(respuesta);
}

// ================== REPOSO ==================
function reposo(){
  RAVY.despierto=false;
  document.getElementById("ravy-container").style.display="none";
  document.getElementById("inicio").style.display="block";
}

// ================== HABLAR ==================
function hablar(mensaje){
  texto.innerText = mensaje;
  RAVY.emociones.alegria = 70;
  RAVY.emociones.energia = 70;
  actualizarExpresiones();
}

// ================== MEMORIA ==================
function guardarMemoria(dato){
  RAVY.memoria.push({
    texto:dato,
    tiempo:new Date().toLocaleString()
  });
  localStorage.setItem("ravy_memoria", JSON.stringify(RAVY.memoria));
}

// ================== CEREBRO ==================
function generarRespuesta(){
  const saludos = ["hola","buenos dias","buenas tardes","buenas noches"];
  let ultima = RAVY.memoria[RAVY.memoria.length-1]?.texto || "";

  if(saludos.some(s => ultima.toLowerCase().includes(s))){
    return "Hola, estoy aquí contigo.";
  }

  return "Estoy atento, dime.";
}

// ================== LOOP ==================
setInterval(actualizarExpresiones,1000);
</script>

</body>
</html>
