<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY Vivo y Reactivo</title>
<style>
body { margin:0; overflow:hidden; background:black;}
#overlay { 
  position:absolute; top:50%; left:50%; 
  transform:translate(-50%,-50%); 
  z-index:10; text-align:center; 
}
button { 
  background:#00aaff; color:black; border:none; 
  width:100px; height:100px;
  font-size:24px; border-radius:50%; 
  cursor:pointer; box-shadow:0 4px 15px rgba(0,0,0,0.3);
}
</style>
</head>
<body>
<div id="overlay">
  <button id="activar-ravy">💙</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection"></script>

<script>

// ===== ESCENA, CÁMARA, RENDERER =====
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 5;
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// ===== LUCES =====
let dirLight = new THREE.DirectionalLight(0x00aaff, 1);
dirLight.position.set(5,10,7); dirLight.castShadow = true; scene.add(dirLight);
let ambientLight = new THREE.AmbientLight(0x404040, 0.7); scene.add(ambientLight);

// ===== SUELO =====
let floorGeo = new THREE.PlaneGeometry(50,50);
let floorMat = new THREE.ShadowMaterial({opacity:0.3});
let floor = new THREE.Mesh(floorGeo,floorMat);
floor.rotation.x = -Math.PI/2; floor.position.y = -0.1; floor.receiveShadow=true; scene.add(floor);

// ===== RAVY HUMANOIDE =====
let cuerpo = new THREE.Group(); scene.add(cuerpo);
let cabezaMat = new THREE.MeshStandardMaterial({color:0x00aaff, transparent:true, opacity:0.7});
let torsoMat = new THREE.MeshStandardMaterial({color:0x00aaff, transparent:true, opacity:0.6});

// Cabeza
let cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.5,32,32), cabezaMat);
cabeza.position.y=1.5; cabeza.castShadow=true; cuerpo.add(cabeza);

// Ojos
let ojoIzq = new THREE.Mesh(new THREE.SphereGeometry(0.08,16,16), new THREE.MeshBasicMaterial({color:0xffffff}));
let ojoDer = new THREE.Mesh(new THREE.SphereGeometry(0.08,16,16), new THREE.MeshBasicMaterial({color:0xffffff}));
ojoIzq.position.set(-0.15,1.55,0.45); ojoDer.position.set(0.15,1.55,0.45);
cuerpo.add(ojoIzq); cuerpo.add(ojoDer);

// Boca con expresión dinámica
let boca = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.05,0.05), new THREE.MeshBasicMaterial({color:0xffffff}));
boca.position.set(0,1.35,0.45); cuerpo.add(boca);

// Torso
let torso = new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,1.2,32), torsoMat);
torso.position.y=0.5; torso.castShadow=true; cuerpo.add(torso);

// Brazos
let brazoGeo = new THREE.CylinderGeometry(0.1,0.1,0.9,16);
let brazoIzq = new THREE.Mesh(brazoGeo,torsoMat);
let brazoDer = new THREE.Mesh(brazoGeo,torsoMat);
brazoIzq.position.set(-0.55,0.8,0); brazoDer.position.set(0.55,0.8,0);
brazoIzq.castShadow=true; brazoDer.castShadow=true; cuerpo.add(brazoIzq); cuerpo.add(brazoDer);

// ===== ANIMACIÓN, EVOLUCIÓN, REACCIÓN =====
let analyser, audioContext, microphone, dataArray;
let evolucionTiempo=0;
let model, video, videoReady=false;

// Inicializar cámara y modelo facial
async function initFace(){
  video=document.createElement("video"); video.autoplay=true; video.width=640; video.height=480;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:true});
    video.srcObject=stream; await video.play(); videoReady=true;
  }catch(e){console.log(e);}
  model = await faceLandmarksDetection.load(faceLandmarksDetection.SupportedPackages.mediapipeFacemesh);
}

async function animar(){
  requestAnimationFrame(animar);
  let t = Date.now()*0.0003;

  // Evolución color
  evolucionTiempo +=0.01;
  cabezaMat.color.setHSL((Math.sin(evolucionTiempo)+1)/2,0.7,0.5);
  torsoMat.color.setHSL((Math.cos(evolucionTiempo)+1)/2,0.7,0.5);
  brazoIzq.material.color.copy(torsoMat.color);
  brazoDer.material.color.copy(torsoMat.color);

  // Audio
  if(analyser){
    analyser.getByteFrequencyData(dataArray);
    let volumen=dataArray.reduce((a,b)=>a+b,0)/dataArray.length;
    boca.scale.y=1+volumen/150;
    brazoIzq.rotation.z=0.2+Math.sin(volumen/200)*0.5;
    brazoDer.rotation.z=-0.2+Math.sin(volumen/200)*0.5;
  }

  // Seguimiento de rostro
  if(videoReady && model){
    const faces = await model.estimateFaces({input:video});
    if(faces.length>0){
      let face = faces[0];
      let dx=(face.scaledMesh[168][0]-320)/320;
      let dy=(face.scaledMesh[168][1]-240)/240;
      cabeza.rotation.y = dx*0.5;
      cabeza.rotation.x = dy*0.3;
      ojoIzq.rotation.y = cabeza.rotation.y;
      ojoDer.rotation.y = cabeza.rotation.y;
    }
  }

  renderer.render(scene,camera);
}

// ===== VOZ =====
const RAVY={nombre:"RAVY",idioma:"es-ES",activo:false, ejecutarOrden(texto){ return []; }};

// ===== RECONOCIMIENTO DE VOZ =====
const SpeechRecognition=window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;
if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.interimResults=false;
  recognition.continuous=true;
  recognition.onresult=function(event){
    if(!RAVY.activo) return;
    const texto = event.results[event.results.length-1][0].transcript;
    const frases = RAVY.ejecutarOrden(texto);
    frases.forEach(f=>{
      let voz=new SpeechSynthesisUtterance(f); voz.lang=RAVY.idioma; speechSynthesis.speak(voz);
    });
  }
}

// ===== BOTÓN ACTIVAR =====
document.getElementById("activar-ravy").addEventListener("click", async ()=>{
  RAVY.activo=true;
  document.getElementById("overlay").style.display="none";
  await initFace();

  // Audio
  audioContext=new (window.AudioContext||window.webkitAudioContext)();
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    microphone = audioContext.createMediaStreamSource(stream);
    analyser=audioContext.createAnalyser();
    microphone.connect(analyser);
    analyser.fftSize=256;
    dataArray=new Uint8Array(analyser.frequencyBinCount);
  }catch(e){console.log(e);}

  if(recognition) recognition.start();
  animar();
});

// ===== AJUSTES DE PANTALLA =====
window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>
</body>
</html>
