<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RAVY</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#000;
  color:#0ff;
  font-family:Arial, sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

#orb{
  width:230px;
  height:230px;
  border-radius:50%;
  background:radial-gradient(circle at top,#0066aa,#000);
  box-shadow:0 0 30px #00ccff;
  transition:all 0.4s ease;
}

.reposo{ box-shadow:0 0 30px #00ccff; }
.escuchando{ box-shadow:0 0 55px #00ff99; }
.pensando{ box-shadow:0 0 55px #ffff88; }
.hablando{ box-shadow:0 0 65px #3399ff; }

button{
  margin:10px;
  padding:14px 26px;
  font-size:16px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#00ccff,#0044ff);
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>RAVY</h1>
<div id="orb" class="reposo"></div>

<div>
  <button onclick="escuchar()">🎙 Escuchar</button>
  <button onclick="responder()">🧠 Responder</button>
</div>

<script>
/* ================= ESTADO VISUAL ================= */
const orb=document.getElementById("orb");
function estado(e){ orb.className=e; }

/* ================= VOZ ================= */
function hablar(texto){
  estado("hablando");
  const u=new SpeechSynthesisUtterance(texto);
  u.lang="es-ES";
  u.rate=1;
  u.onend=()=>estado("reposo");
  speechSynthesis.speak(u);
}

/* ================= MEMORIA AVANZADA ================= */
let memoria=JSON.parse(localStorage.getItem("ravy_memoria"))||[];
let perfil=JSON.parse(localStorage.getItem("ravy_perfil"))||{
  emociones:{feliz:0,triste:0,miedo:0,enojo:0,calma:0},
  personalidad:"neutral"
};

let ultimaInteraccion=Date.now();

function guardar(texto,emocion){
  memoria.push({texto,emocion,fecha:Date.now()});
  perfil.emociones[emocion]++;
  ajustarPersonalidad();
  localStorage.setItem("ravy_memoria",JSON.stringify(memoria));
  localStorage.setItem("ravy_perfil",JSON.stringify(perfil));
  ultimaInteraccion=Date.now();
}

/* ================= PERSONALIDAD ================= */
function ajustarPersonalidad(){
  const e=perfil.emociones;
  if(e.triste>e.feliz && e.triste>e.calma) perfil.personalidad="protectora";
  else if(e.feliz>e.triste) perfil.personalidad="entusiasta";
  else perfil.personalidad="calma";
}

/* ================= EMOCIONES ================= */
function detectarEmocion(t){
  if(/feliz|bien|alegre|contento/.test(t)) return "feliz";
  if(/triste|mal|solo|llorar/.test(t)) return "triste";
  if(/miedo|asustado|nervioso/.test(t)) return "miedo";
  if(/enojo|rabia|molesto/.test(t)) return "enojo";
  return "calma";
}

/* ================= IA EVOLUTIVA ================= */
function IA(texto,emocion){
  const p=perfil.personalidad;

  if(p==="protectora")
    return emocion==="triste"
      ?"Estoy aquí contigo. No tienes que cargar esto solo."
      :"Cuéntame, quiero entenderte mejor.";

  if(p==="entusiasta")
    return emocion==="feliz"
      ?"Esa energía tuya es contagiosa. ¿Qué sigue?"
      :"Hablemos, siempre hay algo bueno adelante.";

  return "Te escucho con atención. Puedes hablar con confianza.";
}

/* ================= RESUMEN AUTÓNOMO ================= */
function resumenMemoria(){
  if(memoria.length<5) return null;
  const ultimos=memoria.slice(-5).map(m=>m.emocion);
  const dominante=ultimos.sort((a,b)=>
    ultimos.filter(v=>v===a).length-
    ultimos.filter(v=>v===b).length
  ).pop();
  return `He notado que últimamente te has sentido más ${dominante}.`;
}

/* ================= PROACTIVA ================= */
function iniciar(){
  const resumen=resumenMemoria();
  if(resumen) hablar(resumen+" ¿Quieres hablar de eso?");
  else hablar("Aquí estoy. ¿En qué piensas ahora?");
}

/* ================= MIC ================= */
let ultimaEntrada="",ultimaEmocion="";
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const rec=new SR();
rec.lang="es-ES";

rec.onstart=()=>estado("escuchando");
rec.onresult=e=>{
  estado("pensando");
  ultimaEntrada=e.results[0][0].transcript.toLowerCase();
  ultimaEmocion=detectarEmocion(ultimaEntrada);
  guardar(ultimaEntrada,ultimaEmocion);
};

rec.onerror=()=>hablar("No pude escucharte.");

function escuchar(){ rec.start(); }

function responder(){
  if(!ultimaEntrada){ hablar("Te escucho."); return; }
  hablar(IA(ultimaEntrada,ultimaEmocion));
  ultimaEntrada="";
}

/* ================= AUTONOMÍA ================= */
setInterval(()=>{
  if(Date.now()-ultimaInteraccion>60000){
    iniciar();
    ultimaInteraccion=Date.now();
  }
},15000);
</script>

</body>
</html>
