<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

/* ===== BOTÓN ===== */
#overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}

button{
  width:120px;
  height:120px;
  border-radius:50%;
  border:none;
  font-size:22px;
  font-weight:bold;
  color:white;
  background:linear-gradient(145deg,#00ffff,#008cff);
  box-shadow:0 0 30px #00aaff;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
  box-shadow:0 0 50px #00ffff;
}

/* ===== CUERPO DE RAVY ===== */
#ravy-cuerpo{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  animation: respirar 4s ease-in-out infinite;
}

.cabeza{
  width:120px;
  height:120px;
  background:#f2d6c1;
  border-radius:50%;
  position:relative;
}

.ojo{
  width:15px;
  height:15px;
  background:black;
  border-radius:50%;
  position:absolute;
  top:40px;
}

.ojo.izq{ left:35px; }
.ojo.der{ right:35px; }

.torso{
  width:160px;
  height:200px;
  background:linear-gradient(180deg,#1e90ff,#0050aa);
  margin-top:10px;
  border-radius:20px;
}

/* ===== ANIMACIÓN ===== */
@keyframes respirar{
  0%,100%{ transform:translate(-50%,-50%) scale(1); }
  50%{ transform:translate(-50%,-50%) scale(1.03); }
}
</style>
</head>

<body>

<!-- BOTÓN -->
<div id="overlay">
  <button id="activar">RAVY</button>
</div>

<!-- CUERPO -->
<div id="ravy-cuerpo">
  <div class="cabeza">
    <div class="ojo izq"></div>
    <div class="ojo der"></div>
  </div>
  <div class="torso"></div>
</div>

<script>
// =======================
// 🧠 CEREBRO DE RAVY
// =======================
const RAVY = {
  activo:false,

  personalidad:{
    nombre:"RAVY",
    rol:"familia",
    formaHablar:"calma"
  },

  emociones: JSON.parse(localStorage.getItem("ravy_emociones")) || {
    alegria:50,
    confianza:50,
    energia:50
  },

  memoria: JSON.parse(localStorage.getItem("ravy_memoria")) || {},

  guardar(){
    localStorage.setItem("ravy_memoria",JSON.stringify(this.memoria));
    localStorage.setItem("ravy_emociones",JSON.stringify(this.emociones));
  },

  hablar(texto){
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    voz.rate=0.9;
    speechSynthesis.speak(voz);
  },

  pensar(texto){
    if(texto.includes("gracias")){
      this.emociones.alegria+=5;
      this.emociones.confianza+=5;
    }
    if(texto.includes("enojo")){
      this.emociones.energia-=5;
    }

    this.emociones.alegria=Math.min(100,Math.max(0,this.emociones.alegria));
    this.emociones.confianza=Math.min(100,Math.max(0,this.emociones.confianza));
    this.emociones.energia=Math.min(100,Math.max(0,this.emociones.energia));
    this.guardar();
  },

  responder(texto){
    texto=texto.toLowerCase();
    this.pensar(texto);

    if(texto.includes("recuerda que")){
      this.memoria.recuerdo=texto.replace("ravy recuerda que","").trim();
      this.guardar();
      return "Lo recordaré.";
    }

    if(texto.includes("qué recuerdas")){
      return this.memoria.recuerdo
        ? "Recuerdo que " + this.memoria.recuerdo
        : "Aún no tengo recuerdos.";
    }

    if(texto.includes("cómo te sientes")){
      return `Me siento con ${this.emociones.alegria}% de alegría y ${this.emociones.confianza}% de confianza.`;
    }

    if(texto.includes("hora")){
      return "Son las " + new Date().toLocaleTimeString();
    }

    if(texto.includes("hola")){
      return "Hola. Estoy aquí contigo.";
    }

    return "Te escucho.";
  }
};

// =======================
// 👂 OÍDO (VOZ)
// =======================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.continuous=true;
  recognition.interimResults=false;

  recognition.onresult = (event)=>{
    if(!RAVY.activo) return;
    const texto = event.results[event.results.length-1][0].transcript;
    const respuesta = RAVY.responder(texto);
    RAVY.hablar(respuesta);
  };
}

// =======================
// 🔘 ACTIVAR
// =======================
document.getElementById("activar").onclick = ()=>{
  RAVY.activo=true;
  document.getElementById("overlay").style.display="none";
  RAVY.hablar("Estoy activo. Te escucho.");

  if(recognition) recognition.start();
};
</script>

</body>
</html>
