<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY IA</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial, sans-serif;
}

#overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  z-index: 10;
}

button {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  border: none;
  font-size: 22px;
  font-weight: bold;
  color: white;
  background: linear-gradient(145deg,#00e5ff,#008cff);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  cursor: pointer;
}
button:hover { transform: scale(1.1); }
</style>
</head>

<body>

<div id="overlay">
  <button id="activar">RAVY</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
// ================= ESCENA =================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ================= LUCES =================
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);

// ================= RAVY CUERPO =================
const ravy = new THREE.Group();
scene.add(ravy);

const piel = new THREE.MeshStandardMaterial({color:0xffd1b3});
const ropa = new THREE.MeshStandardMaterial({color:0x00aaff});

// Cabeza
const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.5,32,32), piel);
cabeza.position.y = 1.6;
ravy.add(cabeza);

// Ojos
function ojo(x){
  const blanco = new THREE.Mesh(
    new THREE.SphereGeometry(0.08,16,16),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  blanco.position.set(x,1.65,0.45);
  const iris = new THREE.Mesh(
    new THREE.SphereGeometry(0.04,16,16),
    new THREE.MeshStandardMaterial({color:0x000000})
  );
  iris.position.set(x,1.65,0.52);
  ravy.add(blanco, iris);
}
ojo(-0.15); ojo(0.15);

// Boca
const boca = new THREE.Mesh(
  new THREE.BoxGeometry(0.25,0.05,0.05),
  new THREE.MeshStandardMaterial({color:0xff5555})
);
boca.position.set(0,1.45,0.45);
ravy.add(boca);

// Torso
const torso = new THREE.Mesh(
  new THREE.CylinderGeometry(0.45,0.45,1.2,32),
  ropa
);
torso.position.y = 0.5;
ravy.add(torso);

// ================= CEREBRO RAVY =================
const RAVY = {
  activo: false,

  escuchar(texto){
    texto = texto.toLowerCase();
    if (!texto.startsWith("ravy")) return;

    if (texto.includes("hora")){
      this.hablar("Son las " + new Date().toLocaleTimeString());
      return;
    }

    if (texto.includes("google")){
      window.open("https://google.com","_blank");
      this.hablar("Abriendo Google");
      return;
    }

    if (texto.includes("silencio")){
      this.hablar("Entrando en silencio");
      this.activo = false;
      return;
    }

    this.hablar("Orden no permitida");
  },

  hablar(texto){
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang = "es-ES";
    speechSynthesis.speak(voz);
  }
};

// ================= VOZ =================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const rec = new SpeechRecognition();
rec.lang = "es-ES";
rec.continuous = true;
rec.onresult = e => {
  const texto = e.results[e.results.length-1][0].transcript;
  RAVY.escuchar(texto);
};

// ================= BOTÓN =================
document.getElementById("activar").onclick = async () => {
  document.getElementById("overlay").style.display = "none";
  RAVY.activo = true;
  rec.start();
  animar();
};

// ================= ANIMACIÓN =================
function animar(){
  requestAnimationFrame(animar);
  boca.scale.y = 1 + Math.sin(Date.now()*0.005)*0.3;
  renderer.render(scene,camera);
}

window.onresize = () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
};
</script>

</body>
</html>
