<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY Humanoide</title>
<style>
body { margin:0; overflow:hidden; background:black;}
#overlay { 
  position:absolute; top:50%; left:50%; 
  transform:translate(-50%,-50%); 
  z-index:10; text-align:center; 
}
button { 
  background:#00aaff; color:black; border:none; 
  width:100px; height:100px;
  font-size:24px; border-radius:50%; 
  cursor:pointer; box-shadow:0 4px 15px rgba(0,0,0,0.3);
}
</style>
</head>
<body>
<div id="overlay">
  <button id="activar-ravy">💙</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
// ===== ESCENA, CÁMARA, RENDERER =====
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 6;
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// ===== LUCES =====
let dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(5,10,7); dirLight.castShadow = true; scene.add(dirLight);
let ambientLight = new THREE.AmbientLight(0x404040, 0.8); scene.add(ambientLight);

// ===== SUELO =====
let floorGeo = new THREE.PlaneGeometry(50,50);
let floorMat = new THREE.ShadowMaterial({opacity:0.3});
let floor = new THREE.Mesh(floorGeo,floorMat);
floor.rotation.x=-Math.PI/2; floor.position.y=-0.1; floor.receiveShadow=true; scene.add(floor);

// ===== RAVY HUMANOIDE REALISTA =====
let cuerpo = new THREE.Group(); scene.add(cuerpo);

// Materiales
let pielMat = new THREE.MeshStandardMaterial({color:0xffccaa});
let ropaMat = new THREE.MeshStandardMaterial({color:0x00aaff, transparent:true, opacity:0.7});

// Cabeza
let cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.5,32,32), pielMat);
cabeza.position.y=1.6; cabeza.castShadow=true; cuerpo.add(cabeza);

// Ojos
let ojoIzq = new THREE.Mesh(new THREE.SphereGeometry(0.08,16,16), new THREE.MeshStandardMaterial({color:0xffffff}));
let irisIzq = new THREE.Mesh(new THREE.SphereGeometry(0.04,16,16), new THREE.MeshStandardMaterial({color:0x000000}));
let ojoDer = new THREE.Mesh(new THREE.SphereGeometry(0.08,16,16), new THREE.MeshStandardMaterial({color:0xffffff}));
let irisDer = new THREE.Mesh(new THREE.SphereGeometry(0.04,16,16), new THREE.MeshStandardMaterial({color:0x000000}));

ojoIzq.position.set(-0.15,1.65,0.45); irisIzq.position.set(-0.15,1.65,0.52);
ojoDer.position.set(0.15,1.65,0.45); irisDer.position.set(0.15,1.65,0.52);
cuerpo.add(ojoIzq, irisIzq, ojoDer, irisDer);

// Nariz
let nariz = new THREE.Mesh(new THREE.ConeGeometry(0.05,0.2,16), pielMat);
nariz.position.set(0,1.55,0.5); nariz.rotation.x=Math.PI/2; cuerpo.add(nariz);

// Boca
let boca = new THREE.Mesh(new THREE.BoxGeometry(0.25,0.05,0.05), new THREE.MeshStandardMaterial({color:0xff5555}));
boca.position.set(0,1.45,0.45); cuerpo.add(boca);

// Torso
let torso = new THREE.Mesh(new THREE.CylinderGeometry(0.45,0.45,1.2,32), ropaMat);
torso.position.y=0.5; torso.castShadow=true; cuerpo.add(torso);

// Brazos
let brazoGeo = new THREE.CylinderGeometry(0.1,0.1,0.9,16);
let brazoIzq = new THREE.Mesh(brazoGeo, ropaMat); brazoIzq.position.set(-0.55,0.8,0); brazoIzq.castShadow=true;
let brazoDer = new THREE.Mesh(brazoGeo, ropaMat); brazoDer.position.set(0.55,0.8,0); brazoDer.castShadow=true;
cuerpo.add(brazoIzq, brazoDer);

// ===== ANIMACIÓN Y EVOLUCIÓN =====
let analyser, audioContext, microphone, dataArray;
let evolucionTiempo=0;

function animar(){
  requestAnimationFrame(animar);
  evolucionTiempo +=0.01;

  // Cambiar colores suavemente
  ropaMat.color.setHSL((Math.sin(evolucionTiempo)+1)/2,0.7,0.5);

  // Reacción al sonido
  if(analyser){
    analyser.getByteFrequencyData(dataArray);
    let volumen=dataArray.reduce((a,b)=>a+b,0)/dataArray.length;

    boca.scale.y=1+volumen/150;
    brazoIzq.rotation.z=0.2+Math.sin(volumen/200)*0.5;
    brazoDer.rotation.z=-0.2+Math.sin(volumen/200)*0.5;
    torso.rotation.y=Math.sin(volumen/300)*0.1;
  }

  renderer.render(scene,camera);
}

// ===== VOZ =====
const RAVY={nombre:"RAVY",idioma:"es-ES",activo:false, ejecutarOrden(texto){ return []; }};

// ===== RECONOCIMIENTO DE VOZ =====
const SpeechRecognition=window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;
if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.interimResults=false;
  recognition.continuous=true;
  recognition.onresult=function(event){
    if(!RAVY.activo) return;
    const texto = event.results[event.results.length-1][0].transcript;
    const frases = RAVY.ejecutarOrden(texto);
    frases.forEach(f=>{
      let voz=new SpeechSynthesisUtterance(f); voz.lang=RAVY.idioma; speechSynthesis.speak(voz);
    });
  }
}

// ===== BOTÓN ACTIVAR =====
document.getElementById("activar-ravy").addEventListener("click", async ()=>{
  RAVY.activo=true;
  document.getElementById("overlay").style.display="none";

  // Audio
  audioContext=new (window.AudioContext||window.webkitAudioContext)();
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    microphone = audioContext.createMediaStreamSource(stream);
    analyser=audioContext.createAnalyser();
    microphone.connect(analyser);
    analyser.fftSize=256;
    dataArray=new Uint8Array(analyser.frequencyBinCount);
  }catch(e){console.log(e);}

  // Reconocimiento de voz
  if(recognition) recognition.start();

  // Animación
  animar();
});

// ===== AJUSTES DE PANTALLA =====
window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
