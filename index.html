<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY Humanoide</title>
<style>
body { margin:0; overflow:hidden; background:black;}
#overlay { 
  position:absolute; top:50%; left:50%; 
  transform:translate(-50%,-50%); 
  z-index:10; text-align:center; 
}
button { 
  background:#00aaff; color:black; border:none; 
  width:120px; height:50px;
  font-size:20px; border-radius:10px; 
  cursor:pointer; box-shadow:0 4px 15px rgba(0,0,0,0.3);
}
</style>
</head>
<body>
<div id="overlay">
  <button id="activar-ravy">RAVY</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/examples/js/loaders/GLTFLoader.js"></script>

<script>
// ===== ESCENA, CÁMARA, RENDERER =====
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,1.6,6);

let renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// ===== LUCES =====
let dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(5,10,7); dirLight.castShadow = true; scene.add(dirLight);
let ambientLight = new THREE.AmbientLight(0x404040, 0.8); scene.add(ambientLight);

// ===== SUELO =====
let floorGeo = new THREE.PlaneGeometry(50,50);
let floorMat = new THREE.ShadowMaterial({opacity:0.3});
let floor = new THREE.Mesh(floorGeo,floorMat);
floor.rotation.x=-Math.PI/2; floor.position.y=-0.1; floor.receiveShadow=true; scene.add(floor);

// ===== CARGAR MODELO 3D HUMANOIDE ESTABLE =====
let cuerpo;
const loader = new THREE.GLTFLoader();
loader.load('https://rawcdn.githack.com/mrdoob/three.js/dev/examples/models/gltf/RobotExpressive/RobotExpressive.glb',
function(gltf){
  cuerpo = gltf.scene;
  cuerpo.scale.set(1.5,1.5,1.5);
  cuerpo.position.y=0;
  cuerpo.traverse(node=>{
    if(node.isMesh){
      node.castShadow=true;
      node.receiveShadow=true;
    }
  });
  scene.add(cuerpo);
  console.log("Humanoide RAVY cargado");
}, undefined, function(error){ console.error(error); });

// ===== ANIMACIÓN Y REACCIÓN =====
let analyser, audioContext, microphone, dataArray;
let evolucionTiempo=0;

function animar(){
  requestAnimationFrame(animar);
  evolucionTiempo+=0.01;

  if(cuerpo){
    cuerpo.rotation.y = Math.sin(evolucionTiempo)/5; // giro suave
  }

  if(analyser && cuerpo){
    analyser.getByteFrequencyData(dataArray);
    let volumen=dataArray.reduce((a,b)=>a+b,0)/dataArray.length;
    cuerpo.rotation.x=Math.sin(volumen/2000)*0.05; // movimiento cabeza
  }

  renderer.render(scene,camera);
}

// ===== VOZ Y ÓRDENES =====
const RAVY={
  nombre:"RAVY",
  idioma:"es-ES",
  activo:false,
  ejecutarOrden(texto){
    let respuestas=[];
    texto = texto.toLowerCase();
    if(texto.includes("hora")){
      respuestas.push("La hora actual es " + new Date().toLocaleTimeString());
    }
    if(texto.includes("google")){
      window.open("https://www.google.com","_blank");
      respuestas.push("Abriendo Google");
    }
    if(texto.includes("luz")){
      respuestas.push("Simulación de luz encendida");
    }
    if(respuestas.length===0) respuestas.push("No entiendo la orden");
    return respuestas;
  }
};

// ===== RECONOCIMIENTO DE VOZ =====
const SpeechRecognition=window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;
if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.interimResults=false;
  recognition.continuous=true;
  recognition.onresult=function(event){
    if(!RAVY.activo) return;
    const texto = event.results[event.results.length-1][0].transcript;
    const frases = RAVY.ejecutarOrden(texto);
    frases.forEach(f=>{
      let voz=new SpeechSynthesisUtterance(f); voz.lang=RAVY.idioma; speechSynthesis.speak(voz);
    });
  }
}

// ===== BOTÓN ACTIVAR =====
document.getElementById("activar-ravy").addEventListener("click", async ()=>{
  RAVY.activo=true;
  document.getElementById("overlay").style.display="none";

  // Audio
  audioContext=new (window.AudioContext||window.webkitAudioContext)();
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    microphone = audioContext.createMediaStreamSource(stream);
    analyser=audioContext.createAnalyser();
    microphone.connect(analyser);
    analyser.fftSize=256;
    dataArray=new Uint8Array(analyser.frequencyBinCount);
  }catch(e){console.log(e);}

  // Reconocimiento de voz
  if(recognition) recognition.start();

  // Animación
  animar();
});

// ===== AJUSTES DE PANTALLA =====
window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
