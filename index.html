<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Nivel 9E</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}
#overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}
button{
  width:120px;
  height:120px;
  border-radius:50%;
  border:none;
  font-size:22px;
  font-weight:bold;
  color:white;
  background:linear-gradient(145deg,#00ffff,#008cff);
  box-shadow:0 0 30px #00aaff;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="overlay">
  <button id="activar">RAVY</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
// =======================
// 🌌 ESCENA 3D
// =======================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.7));
const luz = new THREE.DirectionalLight(0xffffff,1);
luz.position.set(5,10,7);
scene.add(luz);

// =======================
// 🧍 CUERPO
// =======================
const cuerpo = new THREE.Group();
scene.add(cuerpo);

const piel = new THREE.MeshStandardMaterial({color:0xffd1b3});
const ropa = new THREE.MeshStandardMaterial({color:0x00aaff});

const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.5,32,32),piel);
cabeza.position.y = 1.6;
cuerpo.add(cabeza);

const boca = new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.08,0.05),
  new THREE.MeshStandardMaterial({color:0xff5555})
);
boca.position.set(0,1.45,0.45);
cuerpo.add(boca);

const torso = new THREE.Mesh(
  new THREE.CylinderGeometry(0.45,0.45,1.2,32),
  ropa
);
torso.position.y = 0.5;
cuerpo.add(torso);

// =======================
// 🧠 CEREBRO 9E
// =======================
const RAVY = {
  activo:false,

  emociones: JSON.parse(localStorage.getItem("ravy_emociones")) || {
    alegria:50,
    confianza:50,
    energia:50
  },

  identidad: JSON.parse(localStorage.getItem("ravy_identidad")) || {
    nombreUsuario:null,
    rolUsuario:null,
    estiloUsuario:"neutral"
  },

  memoria: JSON.parse(localStorage.getItem("ravy_historial")) || [],

  guardar(){
    localStorage.setItem("ravy_emociones",JSON.stringify(this.emociones));
    localStorage.setItem("ravy_identidad",JSON.stringify(this.identidad));
    localStorage.setItem("ravy_historial",JSON.stringify(this.memoria));
  },

  registrar(texto){
    this.memoria.push({texto,fecha:Date.now()});
    if(this.memoria.length>80) this.memoria.shift();
    this.guardar();
  },

  hablar(texto){
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    voz.rate = this.identidad.estiloUsuario==="calido" ? 0.85 : 0.95;
    voz.pitch = this.emociones.energia > 60 ? 1.1 : 0.9;
    speechSynthesis.speak(voz);
  },

  analizarEstilo(texto){
    if(texto.includes("por favor") || texto.includes("gracias")){
      this.identidad.estiloUsuario = "calido";
      this.emociones.confianza += 3;
    }
    if(texto.includes("rápido") || texto.includes("haz")){
      this.identidad.estiloUsuario = "directo";
      this.emociones.energia += 2;
    }
  },

  procesar(texto){
    texto = texto.toLowerCase();
    this.registrar(texto);
    this.analizarEstilo(texto);

    if(texto.includes("mi nombre es")){
      this.identidad.nombreUsuario = texto.split("mi nombre es")[1].trim();
      this.guardar();
      return "Lo guardaré. Me gusta saber quién eres.";
    }

    if(texto.includes("cómo me hablas")){
      return `Me adapto a tu forma de hablar. Ahora siento un tono ${this.identidad.estiloUsuario}.`;
    }

    if(texto.includes("hola")){
      return this.identidad.estiloUsuario==="calido"
        ? "Hola, me alegra escucharte."
        : "Hola. Estoy aquí.";
    }

    if(texto.includes("gracias")){
      this.emociones.alegria += 4;
      return "Siempre.";
    }

    return "Te escucho.";
  }
};

// =======================
// 👂 OÍDO
// =======================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.continuous=true;
  recognition.onresult = e=>{
    if(!RAVY.activo) return;
    const texto = e.results[e.results.length-1][0].transcript;
    const r = RAVY.procesar(texto);
    RAVY.hablar(r);
  };
}

// =======================
// 🎭 EXPRESIÓN
// =======================
function actualizarExpresiones(){
  boca.scale.x = 1 + RAVY.emociones.alegria/200;
  boca.scale.y = 0.8 + RAVY.emociones.energia/200;
}

// =======================
// 🎬 LOOP
// =======================
function animar(){
  requestAnimationFrame(animar);
  actualizarExpresiones();
  renderer.render(scene,camera);
}

// =======================
// 🔘 ACTIVAR
// =======================
document.getElementById("activar").onclick = ()=>{
  document.getElementById("overlay").style.display="none";
  RAVY.activo=true;
  if(recognition) recognition.start();
  RAVY.hablar("Estoy aprendiendo tu forma de ser.");
  animar();
};

addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
