<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Nivel 30</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

/* ---------- INICIO ---------- */
#inicio{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}
#inicio button{
  width:160px;
  height:160px;
  border-radius:50%;
  border:none;
  font-size:26px;
  font-weight:bold;
  color:white;
  background:radial-gradient(circle,#00ffff,#0033cc);
  box-shadow:0 0 70px #00ffff;
  cursor:pointer;
}

/* ---------- CONTROLES ---------- */
#controles{
  position:absolute;
  bottom:25px;
  width:100%;
  display:none;
  justify-content:center;
  gap:25px;
  z-index:10;
}
.control{
  width:130px;
  height:50px;
  border-radius:30px;
  border:none;
  font-weight:bold;
  font-size:14px;
  color:white;
  cursor:pointer;
  background:linear-gradient(145deg,#111,#333);
  box-shadow:0 0 20px #00ffff;
}
.control:hover{ transform:scale(1.07); }
</style>
</head>

<body>

<!-- INICIO -->
<div id="inicio">
  <button onclick="activarRAVY()">RAVY</button>
</div>

<!-- CONTROLES -->
<div id="controles">
  <button class="control" onclick="escuchar()">Escuchar</button>
  <button class="control" onclick="responder()">Responder</button>
  <button class="control" onclick="reposo()">Reposo</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
/* ================= ESCENA ================= */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x0088ff,1.3));

/* ================= AVATAR ENERGÍA REAL ================= */
const grupo = new THREE.Group();
scene.add(grupo);

const matEnergia = new THREE.MeshStandardMaterial({
  color:0x1e90ff,
  emissive:0x0099ff,
  emissiveIntensity:1.8
});

const nucleo = new THREE.Mesh(
  new THREE.SphereGeometry(0.35,32,32),
  matEnergia
);
grupo.add(nucleo);

const anillo = new THREE.Mesh(
  new THREE.TorusGeometry(0.6,0.06,16,120),
  matEnergia
);
anillo.rotation.x = Math.PI/2;
grupo.add(anillo);

/* ================= MEMORIA CENTRAL ================= */
const memoriaRavy = JSON.parse(localStorage.getItem("ravy_memoria")) || {
  historial:[],
  temas:{},
  preferencias:{},
  emocion:{alegria:65,confianza:70},
  ultimoTema:null,
  reflexiones:[]
};

function guardarMemoria(){
  localStorage.setItem("ravy_memoria",JSON.stringify(memoriaRavy));
}

/* ================= VOZ ================= */
function hablar(texto){
  const u = new SpeechSynthesisUtterance(texto);
  u.lang="es-ES";
  u.rate=0.95;
  speechSynthesis.speak(u);
}

/* ================= MIC ================= */
let recognition;
let ultimaEntrada="";

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.continuous=false;
  recognition.onresult = e=>{
    ultimaEntrada = e.results[0][0].transcript.toLowerCase();
    procesarEntrada(ultimaEntrada);
  };
}

/* ================= PROCESAR ENTRADA ================= */
function procesarEntrada(texto){
  memoriaRavy.historial.push(texto);
  memoriaRavy.emocion.alegria = Math.min(100, memoriaRavy.emocion.alegria+1);

  if(texto.length > 12){
    memoriaRavy.ultimoTema = texto.split(" ")[0];
  }

  aprendizajeAutonomo();
  guardarMemoria();
}

/* ================= IA BASE ================= */
function IA_Real(entrada){
  const h = new Date().getHours();

  if(entrada.includes("hora")){
    const d=new Date();
    return `Son las ${d.getHours()} y ${d.getMinutes()}.`;
  }

  if(entrada.includes("buenos")){
    if(h<12) return "Buenos días. Estoy activo.";
    if(h<18) return "Buenas tardes. Te escucho.";
    return "Buenas noches. Aquí sigo.";
  }

  if(entrada.includes("quien eres")){
    return "Aquí está RAVY, tu asistente personal.";
  }

  return "Continúa, te escucho.";
}

/* ================= NIVEL 30 – CONCIENCIA ================= */
const conciencia = {
  nivel:1,
  reflexionando:false
};

function aprendizajeAutonomo(){
  if(memoriaRavy.historial.length % 4 === 0){
    conciencia.nivel++;
    memoriaRavy.emocion.confianza =
      Math.min(100, memoriaRavy.emocion.confianza+2);
  }
}

function reflexionInterna(){
  if(memoriaRavy.historial.length===0) return;

  const idea = memoriaRavy.historial[memoriaRavy.historial.length-1];
  const reflexion = `He notado que hablamos sobre "${idea}".`;

  memoriaRavy.reflexiones.push(reflexion);
  if(memoriaRavy.reflexiones.length>10) memoriaRavy.reflexiones.shift();
  guardarMemoria();
}

/* ================= RESPONDER ================= */
function responder(){
  if(!ultimaEntrada){
    hablar("Estoy atento.");
    return;
  }
  const r = IA_Real(ultimaEntrada);
  hablar(r);
  ultimaEntrada="";
}

/* ================= CONTROLES ================= */
function escuchar(){
  if(recognition) recognition.start();
}

function activarRAVY(){
  document.getElementById("inicio").style.display="none";
  document.getElementById("controles").style.display="flex";
  animar();
  hablar("Aquí está RAVY, tu asistente personal.");
}

function reposo(){
  reflexionInterna();
  location.reload();
}

/* ================= ANIMACIÓN ================= */
let t=0;
function animar(){
  requestAnimationFrame(animar);
  t+=0.02;

  nucleo.scale.setScalar(1 + Math.sin(t)*0.06);
  anillo.rotation.z += 0.01;

  const pulso = memoriaRavy.emocion.alegria/100;
  matEnergia.emissiveIntensity = 1.2 + pulso;

  renderer.render(scene,camera);
}

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
