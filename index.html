<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAVY</title>
  <style>
    body {
      background: black;
      color: #00aaff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px;
    }
    input {
      padding: 12px;
      width: 90%;
      max-width: 400px;
      border-radius: 8px;
      border: none;
      margin-bottom: 15px;
      font-size: 16px;
    }
    button {
      background: #00aaff;
      color: black;
      border: none;
      padding: 12px 18px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>RAVY</h1>
  <p>Escríbeme algo</p>

  <input id="entrada" placeholder="Habla conmigo..." />
  <br>
  <button onclick="responder()">Responder</button>

  <script>
    function responder() {
      const textoUsuario = document.getElementById("entrada").value;
      let respuesta = "Estoy aquí contigo.";

      if (textoUsuario.toLowerCase().includes("hola")) {
        respuesta = "Hola. Aquí está RAVY contigo.";
      }
      if (textoUsuario.toLowerCase().includes("estado")) {
        respuesta = "Estoy activo, atento y en evolución.";
      }

      const voz = new SpeechSynthesisUtterance(respuesta);
      voz.lang = "es-ES";
      speechSynthesis.speak(voz);
    }
  </script>

</body>
</html>
