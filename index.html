<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY</title>

<style>
body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.vista{ display:none; text-align:center; }
.vista.activa{ display:block; }

#btnInicio{
  width:140px;height:140px;border-radius:50%;
  border:none;font-size:22px;font-weight:bold;
  color:white;
  background:linear-gradient(145deg,#00ffff,#0077ff);
  box-shadow:0 0 40px #00ffff;
}

#cara{
  width:180px;height:180px;background:#0a0a0a;
  border-radius:50%;box-shadow:0 0 40px #00ffff;
  margin:auto;position:relative;
}

.ojo{width:16px;height:16px;background:white;border-radius:50%;position:absolute;top:60px;}
#ojo1{left:55px;} #ojo2{right:55px;}

#boca{
  width:50px;height:12px;background:#ff5a6e;
  border-radius:20px;position:absolute;
  bottom:50px;left:50%;transform:translateX(-50%);
}

.botones{margin-top:25px;}
button{padding:12px 20px;border:none;border-radius:20px;font-size:15px;color:white;margin:5px;}
#escuchar{background:#00aaff;}
#responder{background:#00ff99;color:black;}
#reposo{background:#ff4444;}
#estado{margin-top:15px;opacity:0.8;}
</style>
</head>

<body>

<div id="inicio" class="vista activa">
  <button id="btnInicio">RAVY</button>
</div>

<div id="ravyApp" class="vista">
  <div id="cara">
    <div class="ojo" id="ojo1"></div>
    <div class="ojo" id="ojo2"></div>
    <div id="boca"></div>
  </div>

  <div class="botones">
    <button id="escuchar">Escuchar</button>
    <button id="responder">Responder</button>
    <button id="reposo">Reposo</button>
  </div>

  <div id="estado">Aquí está RAVY, tu asistente personal.</div>
</div>

<script>
/* =====================
   🧠 MEMORIA RAVY
===================== */
const memoriaRavy = JSON.parse(localStorage.getItem("ravy_memoria")) || {
  historial: [],
  usuario: {
    nombre: null,
    trato: "neutral"
  }
};

function guardarMemoria(){
  localStorage.setItem("ravy_memoria", JSON.stringify(memoriaRavy));
}

/* =====================
   🔊 HABLAR
===================== */
function hablar(texto){
  const voz = new SpeechSynthesisUtterance(texto);
  voz.lang = "es-ES";
  voz.rate = 0.95;
  speechSynthesis.speak(voz);
}

/* =====================
   🎤 ESCUCHAR
===================== */
let ultimaPregunta = "";

const SpeechRecognition =
  window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang = "es-ES";
  recognition.onresult = e=>{
    ultimaPregunta = e.results[0][0].transcript.toLowerCase();

    memoriaRavy.historial.push({
      texto: ultimaPregunta,
      fecha: Date.now()
    });

    if(memoriaRavy.historial.length > 100){
      memoriaRavy.historial.shift();
    }

    guardarMemoria();
    estado.textContent = "Escuché.";
  };
}

/* =====================
   🧠 RESPONDER
===================== */
function responder(){
  if(!ultimaPregunta){
    hablar("Aún no me has dicho nada.");
    return;
  }

  let r = "Te escucho.";

  if(ultimaPregunta.includes("mi nombre es")){
    memoriaRavy.usuario.nombre =
      ultimaPregunta.split("mi nombre es")[1].trim();
    guardarMemoria();
    r = `Encantado de conocerte, ${memoriaRavy.usuario.nombre}.`;
  }
  else if(ultimaPregunta.includes("hora")){
    const d = new Date();
    r = `Son las ${d.getHours()} con ${d.getMinutes()} minutos.`;
  }
  else if(ultimaPregunta.includes("hola")){
    r = memoriaRavy.usuario.nombre
      ? `Hola ${memoriaRavy.usuario.nombre}, aquí estoy.`
      : "Hola, aquí estoy contigo.";
  }

  hablar(r);
}

/* =====================
   🔁 VISTAS
===================== */
const inicio = document.getElementById("inicio");
const ravyApp = document.getElementById("ravyApp");
const estado = document.getElementById("estado");

function mostrarInicio(){
  inicio.classList.add("activa");
  ravyApp.classList.remove("activa");
}

function mostrarRavy(){
  inicio.classList.remove("activa");
  ravyApp.classList.add("activa");
}

/* =====================
   🔘 BOTONES
===================== */
btnInicio.onclick = ()=>{
  mostrarRavy();
  hablar("Aquí está RAVY, tu asistente personal.");
};

escuchar.onclick = ()=>{
  ultimaPregunta = "";
  estado.textContent = "Escuchando...";
  recognition && recognition.start();
};

responder.onclick = ()=>{
  responder();
};

reposo.onclick = ()=>{
  speechSynthesis.cancel();
  ultimaPregunta = "";
  mostrarInicio();
};
</script>

</body>
</html>
