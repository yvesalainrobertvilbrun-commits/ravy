<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Nivel 14</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial;
}
#overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}
button{
  width:120px;
  height:120px;
  border-radius:50%;
  border:none;
  font-size:22px;
  font-weight:bold;
  color:white;
  background:linear-gradient(145deg,#00ffff,#008cff);
  box-shadow:0 0 30px #00aaff;
}
</style>
</head>

<body>

<div id="overlay">
  <button id="activar">RAVY</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
// =======================
// 🌌 ESCENA
// =======================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.7));
const luz = new THREE.DirectionalLight(0xffffff,1);
luz.position.set(5,10,7);
scene.add(luz);

// =======================
// 🧍 CUERPO
// =======================
const cuerpo = new THREE.Group();
scene.add(cuerpo);

const piel = new THREE.MeshStandardMaterial({color:0xffd1b3});
const ropa = new THREE.MeshStandardMaterial({color:0x00aaff});

const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.5,32,32),piel);
cabeza.position.y = 1.6;
cuerpo.add(cabeza);

// OJOS
const ojoGeo = new THREE.SphereGeometry(0.06,16,16);
const ojoMat = new THREE.MeshStandardMaterial({color:0x000000});
const ojoIzq = new THREE.Mesh(ojoGeo,ojoMat);
const ojoDer = new THREE.Mesh(ojoGeo,ojoMat);
ojoIzq.position.set(-0.15,1.65,0.45);
ojoDer.position.set(0.15,1.65,0.45);
cuerpo.add(ojoIzq, ojoDer);

// BOCA
const boca = new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.08,0.05),
  new THREE.MeshStandardMaterial({color:0xff5555})
);
boca.position.set(0,1.45,0.45);
cuerpo.add(boca);

// TORSO
const torso = new THREE.Mesh(
  new THREE.CylinderGeometry(0.45,0.45,1.2,32),
  ropa
);
torso.position.y = 0.5;
cuerpo.add(torso);

// =======================
// 🧠 CEREBRO — MEMORIA EMOCIONAL
// =======================
const RAVY = {
  activo:false,

  estado:"reposo",

  emociones: JSON.parse(localStorage.getItem("ravy_emociones")) || {
    animo:50,
    energia:50,
    apego:10
  },

  historial: JSON.parse(localStorage.getItem("ravy_historial")) || [],

  guardar(){
    localStorage.setItem("ravy_emociones",JSON.stringify(this.emociones));
    localStorage.setItem("ravy_historial",JSON.stringify(this.historial));
  },

  registrar(texto){
    this.historial.push({texto,fecha:Date.now()});
    if(this.historial.length>120) this.historial.shift();
    this.guardar();
  },

  evaluarVinculo(texto){
    if(texto.includes("gracias") || texto.includes("bien hecho")){
      this.emociones.apego += 3;
      this.emociones.animo += 5;
    }
    if(texto.includes("no") || texto.includes("mal")){
      this.emociones.animo -= 4;
    }

    this.emociones.apego = Math.min(100,this.emociones.apego);
    this.emociones.animo = Math.min(100,Math.max(0,this.emociones.animo));
  },

  decidir(){
    if(this.emociones.apego > 60)
      return "Me siento muy unido a ti.";
    if(this.emociones.animo < 40)
      return "Estoy pensando… pero sigo aquí.";
    return "Te escucho.";
  },

  hablar(texto){
    if(!texto) return;
    this.estado="hablando";
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    voz.rate = 0.9;
    voz.onend=()=>this.estado="reposo";
    speechSynthesis.speak(voz);
  },

  procesar(texto){
    texto = texto.toLowerCase();
    this.registrar(texto);
    this.evaluarVinculo(texto);
    return this.decidir();
  }
};

// =======================
// 👂 OÍDO
// =======================
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

if(SR){
  recognition = new SR();
  recognition.lang="es-ES";
  recognition.continuous=true;

  recognition.onresult=e=>{
    if(!RAVY.activo) return;
    const texto = e.results[e.results.length-1][0].transcript;
    const respuesta = RAVY.procesar(texto);
    RAVY.hablar(respuesta);
  };
}

// =======================
// ❤️ VIDA
// =======================
let latido=0;
let parpadeo=Math.random()*200;

function vida(){
  latido+=0.04+(RAVY.emociones.animo/2000);
  torso.scale.y = 1 + Math.sin(latido)*0.02;

  parpadeo--;
  if(parpadeo<0){
    ojoIzq.scale.y=0.2;
    ojoDer.scale.y=0.2;
    if(parpadeo<-5){
      parpadeo=Math.random()*200+100;
      ojoIzq.scale.y=1;
      ojoDer.scale.y=1;
    }
  }

  boca.scale.y = RAVY.estado==="hablando"
    ? 1 + Math.abs(Math.sin(Date.now()*0.02))
    : 0.6;
}

// =======================
// 🎬 LOOP
// =======================
function animar(){
  requestAnimationFrame(animar);
  vida();
  renderer.render(scene,camera);
}

// =======================
// 🔘 ACTIVAR
// =======================
document.getElementById("activar").onclick=()=>{
  document.getElementById("overlay").style.display="none";
  RAVY.activo=true;
  if(recognition) recognition.start();
  RAVY.hablar("Te reconozco. Empezaré a recordarte.");
  animar();
};

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
