<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
  color:white;
}

/* ===== BOTÓN ===== */
#overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}

#activar{
  width:120px;
  height:120px;
  border-radius:50%;
  border:none;
  font-size:22px;
  font-weight:bold;
  color:white;
  background:linear-gradient(145deg,#00ffff,#008cff);
  box-shadow:0 0 30px #00aaff;
  cursor:pointer;
  transition:0.3s;
}
#activar:hover{
  transform:scale(1.1);
  box-shadow:0 0 50px #00ffff;
}

/* ===== CUERPO RAVY ===== */
#ravy{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
}

#cara{
  width:160px;
  height:160px;
  border-radius:50%;
  background:#ffd1b3;
  position:relative;
  box-shadow:0 0 20px rgba(255,255,255,0.2);
}

/* OJOS */
.ojo{
  width:20px;
  height:20px;
  background:black;
  border-radius:50%;
  position:absolute;
  top:55px;
}
#ojo-izq{ left:45px; }
#ojo-der{ right:45px; }

/* BOCA */
#boca{
  width:50px;
  height:8px;
  background:#c0392b;
  border-radius:10px;
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  transition:0.2s;
}

/* ESTADOS */
.hablando #boca{
  height:25px;
}
.feliz .ojo{
  transform:scale(1.2);
}
.triste .ojo{
  transform:scaleY(0.6);
}
.pensando{
  box-shadow:0 0 40px #00ffff;
}

#estado{
  margin-top:10px;
  font-size:14px;
  opacity:0.8;
}
</style>
</head>

<body>

<div id="overlay">
  <button id="activar">RAVY</button>
</div>

<div id="ravy">
  <div id="cara">
    <div class="ojo" id="ojo-izq"></div>
    <div class="ojo" id="ojo-der"></div>
    <div id="boca"></div>
  </div>
  <div id="estado">Inactivo</div>
</div>

<script>
// =======================
// 🧠 CEREBRO DE RAVY
// =======================
const RAVY = {
  activo:false,

  emociones: JSON.parse(localStorage.getItem("ravy_emociones")) || {
    alegria:50,
    confianza:50,
    energia:50
  },

  memoria: JSON.parse(localStorage.getItem("ravy_memoria")) || [],

  guardar(){
    localStorage.setItem("ravy_emociones",JSON.stringify(this.emociones));
    localStorage.setItem("ravy_memoria",JSON.stringify(this.memoria));
  },

  estado(texto){
    document.getElementById("estado").innerText = texto;
  },

  expresion(){
    const cara = document.getElementById("cara");
    cara.className = "";
    if(this.emociones.alegria > 70) cara.classList.add("feliz");
    if(this.emociones.energia < 30) cara.classList.add("triste");
  },

  hablar(texto){
    const boca = document.getElementById("cara");
    boca.classList.add("hablando");
    this.estado("Hablando");

    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    voz.rate=0.9;
    voz.onend = ()=>{
      boca.classList.remove("hablando");
      this.estado("Escuchando");
    };
    speechSynthesis.speak(voz);
  },

  pensar(texto){
    this.estado("Pensando");
    if(texto.includes("gracias")){
      this.emociones.alegria += 5;
      this.emociones.confianza += 5;
    }
    if(texto.includes("triste")){
      this.emociones.energia -= 5;
    }
    this.emociones.alegria=Math.min(100,Math.max(0,this.emociones.alegria));
    this.emociones.energia=Math.min(100,Math.max(0,this.emociones.energia));
    this.guardar();
    this.expresion();
  },

  responder(texto){
    texto = texto.toLowerCase();
    this.pensar(texto);

    if(texto.includes("recuerda")){
      this.memoria.push(texto);
      this.guardar();
      return "Lo he guardado en mi memoria.";
    }

    if(texto.includes("qué recuerdas")){
      return this.memoria.length
        ? "Recuerdo " + this.memoria.slice(-1)[0]
        : "Aún no tengo recuerdos.";
    }

    if(texto.includes("cómo te sientes")){
      return `Me siento con ${this.emociones.alegria}% de alegría.`;
    }

    if(texto.includes("hola")){
      return "Hola. Estoy aquí contigo.";
    }

    return "Te escucho.";
  }
};

// =======================
// 👂 OÍDO
// =======================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.continuous=true;
  recognition.onresult = e=>{
    if(!RAVY.activo) return;
    const texto = e.results[e.results.length-1][0].transcript;
    const respuesta = RAVY.responder(texto);
    RAVY.hablar(respuesta);
  };
}

// =======================
// 🔘 ACTIVAR
// =======================
document.getElementById("activar").onclick = ()=>{
  RAVY.activo=true;
  document.getElementById("overlay").style.display="none";
  RAVY.estado("Escuchando");
  if(recognition) recognition.start();
  RAVY.hablar("Estoy activo. Te escucho.");
};
</script>

</body>
</html>
