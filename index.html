<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Nivel 35</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

/* ---------- INICIO ---------- */
#inicio{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}
#inicio button{
  width:160px;
  height:160px;
  border-radius:50%;
  border:none;
  font-size:26px;
  font-weight:bold;
  color:white;
  background:radial-gradient(circle,#00ffff,#0066ff);
  box-shadow:0 0 50px #00ffff;
  cursor:pointer;
}

/* ---------- CONTROLES ---------- */
#controles{
  position:absolute;
  bottom:25px;
  width:100%;
  display:none;
  justify-content:center;
  gap:25px;
  z-index:10;
}
.control{
  width:120px;
  height:48px;
  border-radius:30px;
  border:none;
  font-weight:bold;
  font-size:14px;
  color:white;
  cursor:pointer;
  background:linear-gradient(145deg,#111,#333);
  box-shadow:0 0 18px #00ffff;
}
.control:hover{ transform:scale(1.05); }
</style>
</head>

<body>

<!-- INICIO -->
<div id="inicio">
  <button onclick="activarRAVY()">RAVY</button>
</div>

<!-- CONTROLES -->
<div id="controles">
  <button class="control" onclick="escuchar()">Escuchar</button>
  <button class="control" onclick="responder()">Responder</button>
  <button class="control" onclick="reposo()">Reposo</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
/* ================= ESCENA ================= */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.7));
const luzDireccional = new THREE.DirectionalLight(0xffffff,1);
luzDireccional.position.set(5,10,7);
scene.add(luzDireccional);

/* ================= LUZ AZUL ANILLO ================= */
const luzRavy = new THREE.PointLight(0x1e90ff, 2, 6, 2);
luzRavy.position.set(0,1.5,0);
scene.add(luzRavy);
let anguloLuz = 0;

/* ================= MEMORIA REFINADA NIVEL 35 ================= */
const memoriaRavy = JSON.parse(localStorage.getItem("ravy_memoria")) || {
  historial:[],
  temas:{},
  preferencias:{},
  emocion:{alegria:60,confianza:60,miedo:0},
  resumen:"",
  ultimoTema:null
};

function guardarMemoria(){
  localStorage.setItem("ravy_memoria",JSON.stringify(memoriaRavy));
}

/* ================= VOZ ================= */
function hablar(texto){
  const u = new SpeechSynthesisUtterance(texto);
  u.lang="es-ES";
  u.rate=0.95;
  speechSynthesis.speak(u);
}

/* ================= MIC ================= */
let recognition;
let ultimaEntrada="";

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.continuous=false;
  recognition.onresult = e=>{
    ultimaEntrada = e.results[0][0].transcript.toLowerCase();
    procesarMemoria(ultimaEntrada);
    hablar("Entendido.");
    ejecutarOrden(ultimaEntrada);
  };
}

/* ================= MEMORIA AVANZADA ================= */
function procesarMemoria(texto){
  memoriaRavy.historial.push({texto,fecha:Date.now()});

  const claves = {
    musica:["musica","canción","artista"],
    familia:["familia","hijo","esposa","madre"],
    trabajo:["trabajo","negocio","proyecto"],
    tiempo:["hora","día","noche"]
  };

  for(const tema in claves){
    if(claves[tema].some(p=>texto.includes(p))){
      memoriaRavy.temas[tema]=(memoriaRavy.temas[tema]||0)+1;
      memoriaRavy.ultimoTema=tema;
    }
  }

  if(texto.includes("me gusta")){
    memoriaRavy.preferencias[texto]=true;
  }

  memoriaRavy.emocion.alegria = Math.min(100, memoriaRavy.emocion.alegria + 1);
  memoriaRavy.emocion.confianza = Math.min(100, memoriaRavy.emocion.confianza + 1);

  if(memoriaRavy.historial.length % 5 === 0){
    memoriaRavy.resumen = memoriaRavy.historial.slice(-5).map(h=>h.texto).join(", ");
  }

  guardarMemoria();
}

/* ================= IA AUTÓNOMA ================= */
function IA_Real(entrada){
  const h = new Date().getHours();

  if(entrada.includes("hora")){
    const d=new Date();
    return `Ahora mismo son las ${d.getHours()} y ${d.getMinutes()}.`;
  }

  if(entrada.includes("buenos")){
    if(h<12) return "Buenos días, estoy atento a ti.";
    if(h<18) return "Buenas tardes, aquí estoy.";
    return "Buenas noches, sigo atento a ti.";
  }

  if(entrada.includes("quien eres")){
    return "Aquí está RAVY, tu asistente personal.";
  }

  if(memoriaRavy.ultimoTema){
    return `Seguimos hablando sobre ${memoriaRavy.ultimoTema}. Te escucho.`;
  }

  if(memoriaRavy.resumen){
    return `Recuerdo que hemos hablado de: ${memoriaRavy.resumen}.`;
  }

  return "Te escucho con atención.";
}

/* ================= EJECUTAR ORDENES AUTOMÁTICAS ================= */
function ejecutarOrden(entrada){
  // Orden de música
  if(entrada.includes("musica") || entrada.includes("canción")){
    hablar("Reproduciendo tus canciones favoritas.");
  }

  // Orden de hora
  if(entrada.includes("hora")){
    const d=new Date();
    hablar(`La hora actual es ${d.getHours()}:${d.getMinutes()}.`);
  }

  // Orden familiar
  if(entrada.includes("familia") || entrada.includes("hijo")){
    hablar("Recuerdo que la familia es importante para ti.");
  }

  // Orden trabajo
  if(entrada.includes("trabajo") || entrada.includes("proyecto")){
    hablar("Vamos a enfocarnos en tus objetivos.");
  }

  // IA autónoma aprende sola
  memoriaRavy.emocion.confianza = Math.min(100, memoriaRavy.emocion.confianza + 1);
  memoriaRavy.emocion.alegria = Math.min(100, memoriaRavy.emocion.alegria + 1);
  guardarMemoria();
}

/* ================= RESPONDER ================= */
function responder(){
  if(!ultimaEntrada){
    hablar("Aún no me has dicho nada.");
    return;
  }
  const r = IA_Real(ultimaEntrada);
  hablar(r);
  ultimaEntrada="";
}

/* ================= CONTROLES ================= */
function escuchar(){
  if(recognition) recognition.start();
}

function activarRAVY(){
  document.getElementById("inicio").style.display="none";
  document.getElementById("controles").style.display="flex";
  animar();
  hablar("Aquí está RAVY, tu asistente personal.");
}

function reposo(){
  location.reload();
}

/* ================= ANIMACIÓN LUZ ================= */
function animar(){
  requestAnimationFrame(animar);
  
  anguloLuz += 0.05;
  luzRavy.position.x = Math.sin(anguloLuz)*1.5;
  luzRavy.position.z = Math.cos(anguloLuz)*1.5;
  luzRavy.position.y = 1.5 + Math.sin(Date.now()*0.002)*0.1;

  renderer.render(scene,camera);
}

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
