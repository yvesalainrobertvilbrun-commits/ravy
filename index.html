<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Nivel 25</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

/* ---------- PANTALLA PRINCIPAL ---------- */
#inicio{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}
#inicio button{
  width:160px;
  height:160px;
  border-radius:50%;
  border:none;
  font-size:26px;
  font-weight:bold;
  color:white;
  background:radial-gradient(circle,#00ffff,#0066ff);
  box-shadow:0 0 50px #00ffff;
  cursor:pointer;
}

/* ---------- CONTROLES ---------- */
#controles{
  position:absolute;
  bottom:30px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:25px;
  z-index:10;
  display:none;
}
.control{
  width:110px;
  height:45px;
  border-radius:30px;
  border:none;
  font-weight:bold;
  font-size:14px;
  color:white;
  cursor:pointer;
  background:linear-gradient(145deg,#222,#444);
  box-shadow:0 0 15px #00ffff;
}
.control:hover{ transform:scale(1.05); }
</style>
</head>

<body>

<!-- 🔘 INICIO -->
<div id="inicio">
  <button onclick="activarRAVY()">RAVY</button>
</div>

<!-- 🔘 CONTROLES -->
<div id="controles">
  <button class="control" onclick="escuchar()">Escuchar</button>
  <button class="control" onclick="responder()">Responder</button>
  <button class="control" onclick="reposo()">Reposo</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
/* ================= ESCENA ================= */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.7));
const luz = new THREE.DirectionalLight(0xffffff,1);
luz.position.set(5,10,7);
scene.add(luz);

/* ================= AVATAR ================= */
const cuerpo = new THREE.Group();
scene.add(cuerpo);

const piel = new THREE.MeshStandardMaterial({color:0xffd1b3});
const ropa = new THREE.MeshStandardMaterial({color:0x00aaff,transparent:true,opacity:0.7});

const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.5,32,32),piel);
cabeza.position.y = 1.6;
cuerpo.add(cabeza);

const boca = new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.08,0.05),
  new THREE.MeshStandardMaterial({color:0xff5555})
);
boca.position.set(0,1.45,0.45);
cuerpo.add(boca);

const ojoMat = new THREE.MeshStandardMaterial({color:0xffffff});
const irisMat = new THREE.MeshStandardMaterial({color:0x000000});

function crearOjo(x){
  const ojo = new THREE.Mesh(new THREE.SphereGeometry(0.08,16,16),ojoMat);
  const iris = new THREE.Mesh(new THREE.SphereGeometry(0.04,16,16),irisMat);
  ojo.position.set(x,1.65,0.45);
  iris.position.set(x,1.65,0.52);
  cuerpo.add(ojo,iris);
  return {ojo,iris};
}
const ojoI = crearOjo(-0.15);
const ojoD = crearOjo(0.15);

const torso = new THREE.Mesh(
  new THREE.CylinderGeometry(0.45,0.45,1.2,32),
  ropa
);
torso.position.y = 0.5;
cuerpo.add(torso);

/* ================= MEMORIA ================= */
const memoriaRavy = JSON.parse(localStorage.getItem("ravy_memoria")) || {
  historial:[],
  emocion:{alegria:60,confianza:60},
  resumen:""
};

function guardarMemoria(){
  localStorage.setItem("ravy_memoria",JSON.stringify(memoriaRavy));
}

/* ================= VOZ ================= */
function hablar(texto){
  const u = new SpeechSynthesisUtterance(texto);
  u.lang="es-ES";
  u.rate=0.95;
  speechSynthesis.speak(u);
}

/* ================= MIC ================= */
let recognition;
let ultimaEntrada="";

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.continuous=false;
  recognition.onresult = e=>{
    ultimaEntrada = e.results[0][0].transcript.toLowerCase();
    memoriaRavy.historial.push(ultimaEntrada);
    memoriaRavy.resumen = ultimaEntrada;
    guardarMemoria();
    hablar("Entendido.");
  };
}

/* ================= IA REAL (24) ================= */
function IA_Real(entrada){
  if(entrada.includes("hora")){
    const d=new Date();
    return `Son las ${d.getHours()} y ${d.getMinutes()}.`;
  }
  if(entrada.includes("quien eres")){
    return "Aquí está RAVY, tu asistente personal.";
  }
  if(entrada.includes("buenos")){
    return "Buenos días, estoy contigo.";
  }
  return "Te escucho con atención.";
}

/* ================= NIVEL 25 ================= */
function responder(){
  if(!ultimaEntrada){
    hablar("No me has dicho nada aún.");
    return;
  }
  const r = IA_Real(ultimaEntrada);
  hablar(r);
  ultimaEntrada="";
}

/* ================= CONTROLES ================= */
function escuchar(){
  if(recognition) recognition.start();
}

function activarRAVY(){
  document.getElementById("inicio").style.display="none";
  document.getElementById("controles").style.display="flex";
  animar();
  hablar("Aquí está RAVY, tu asistente personal.");
}

function reposo(){
  location.reload();
}

/* ================= ANIMACIÓN ================= */
let resp=0,dir=1;
function animar(){
  requestAnimationFrame(animar);
  resp+=0.005*dir;
  if(Math.abs(resp)>0.05) dir*=-1;
  torso.position.y=0.5+resp;
  boca.scale.y=0.8+memoriaRavy.emocion.alegria/200;
  renderer.render(scene,camera);
}

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
