<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RAVY</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0f14;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* PANTALLA PRINCIPAL */
#inicio{
  display:flex;
  flex-direction:column;
  align-items:center;
}

#btnInicio{
  padding:25px 60px;
  font-size:26px;
  border:none;
  border-radius:40px;
  background:linear-gradient(135deg,#00f2ff,#0066ff);
  color:black;
  cursor:pointer;
}

/* CUERPO DE RAVY */
#ravy{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

#estado{
  font-size:18px;
  opacity:.8;
}

/* BOTONES INTERNOS */
.controles{
  display:flex;
  justify-content:space-between;
  width:300px;
}

.btn{
  padding:14px 20px;
  font-size:16px;
  border:none;
  border-radius:25px;
  cursor:pointer;
}

.escuchar{ background:#00ff9d; }
.responder{ background:#00b3ff; }
.reposo{
  background:#ff3b3b;
  margin-top:10px;
  width:160px;
}
</style>
</head>

<body>

<!-- PANTALLA INICIAL -->
<div id="inicio">
  <button id="btnInicio">RAVY</button>
</div>

<!-- CUERPO DE RAVY -->
<div id="ravy">
  <div id="estado">Modo reposo</div>

  <div class="controles">
    <button class="btn escuchar" onclick="escuchar()">Escuchar</button>
    <button class="btn responder" onclick="responder()">Responder</button>
  </div>

  <button class="btn reposo" onclick="reposo()">Reposo</button>
</div>

<script>
/* ===============================
   MEMORIA DE RAVY
================================ */

let memoriaRavy = JSON.parse(localStorage.getItem("memoriaRavy")) || {
  usuario:{ nombre:"" },
  historial:[],
  emocion:"neutral"
};

function guardarMemoria(){
  localStorage.setItem("memoriaRavy", JSON.stringify(memoriaRavy));
}

/* ===============================
   VARIABLES DE CONTEXTO
================================ */

let ultimaPregunta = "";
let ultimaIntencion = "";
let ultimaRespuesta = "";

/* ===============================
   RECONOCIMIENTO DE VOZ
================================ */

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = "es-ES";
recognition.continuous = false;

recognition.onresult = e=>{
  ultimaPregunta = e.results[0][0].transcript.toLowerCase();
  ultimaIntencion = ultimaPregunta;

  detectarEmocion(ultimaPregunta);

  memoriaRavy.historial.push({
    texto: ultimaPregunta,
    emocion: memoriaRavy.emocion,
    fecha: Date.now()
  });

  if(memoriaRavy.historial.length > 100){
    memoriaRavy.historial.shift();
  }

  guardarMemoria();
  estado.textContent = "Escuché. Presiona responder.";
};

/* ===============================
   EMOCIONES
================================ */

function detectarEmocion(texto){
  if(texto.includes("triste") || texto.includes("mal") || texto.includes("deprimido")){
    memoriaRavy.emocion = "triste";
  }
  else if(texto.includes("feliz") || texto.includes("contento") || texto.includes("bien")){
    memoriaRavy.emocion = "feliz";
  }
  else if(texto.includes("cansado") || texto.includes("agotado")){
    memoriaRavy.emocion = "cansado";
  }
  else if(texto.includes("molesto") || texto.includes("enojado")){
    memoriaRavy.emocion = "molesto";
  }
  else{
    memoriaRavy.emocion = "neutral";
  }
}

/* ===============================
   SÍNTESIS DE VOZ
================================ */

function hablar(texto){
  const voz = new SpeechSynthesisUtterance(texto);
  voz.lang = "es-ES";
  speechSynthesis.speak(voz);
}

/* ===============================
   RESPUESTA INTELIGENTE
================================ */

function responder(){
  if(!ultimaIntencion){
    hablar("Aún no me has dicho nada.");
    return;
  }

  let respuesta = "";

  if(ultimaIntencion.includes("mi nombre es")){
    memoriaRavy.usuario.nombre =
      ultimaIntencion.split("mi nombre es")[1].trim();
    guardarMemoria();
    respuesta = "Perfecto, recordaré tu nombre.";
  }
  else if(ultimaIntencion.includes("hola")){
    respuesta = memoriaRavy.usuario.nombre
      ? `Hola ${memoriaRavy.usuario.nombre}, aquí estoy.`
      : "Hola, aquí está RAVY.";
  }
  else{
    // RESPUESTA SEGÚN EMOCIÓN
    switch(memoriaRavy.emocion){
      case "triste":
        respuesta = "Noto que estás triste. Estoy contigo, no estás solo.";
        break;
      case "feliz":
        respuesta = "Me alegra sentir tu felicidad.";
        break;
      case "cansado":
        respuesta = "Tal vez necesitas descansar un poco.";
        break;
      case "molesto":
        respuesta = "Entiendo tu molestia. Respiremos un momento.";
        break;
      default:
        respuesta = "Te escucho, continúa.";
    }
  }

  ultimaRespuesta = respuesta;
  hablar(respuesta);
}

/* ===============================
   CONTROLES
================================ */

function escuchar(){
  estado.textContent = "Escuchando...";
  recognition.start();
}

function reposo(){
  ultimaPregunta = "";
  ultimaIntencion = "";
  estado.textContent = "Modo reposo";
  document.getElementById("ravy").style.display="none";
  document.getElementById("inicio").style.display="flex";
}

/* ===============================
   NAVEGACIÓN
================================ */

btnInicio.onclick = ()=>{
  document.getElementById("inicio").style.display="none";
  document.getElementById("ravy").style.display="flex";
  estado.textContent = "RAVY activo. Te escucho.";
};
</script>

</body>
</html>
