<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Memoria Inteligente</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}
#overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}
button{
  width:120px;
  height:120px;
  border-radius:50%;
  border:none;
  font-size:22px;
  font-weight:bold;
  color:white;
  background:linear-gradient(145deg,#00ffff,#008cff);
  box-shadow:0 0 30px #00aaff;
  cursor:pointer;
}
button:hover{
  transform:scale(1.1);
  box-shadow:0 0 50px #00ffff;
}
</style>
</head>

<body>

<div id="overlay">
  <button id="activar">RAVY</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
// =======================
// 🌌 ESCENA 3D
// =======================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.7));
const luz = new THREE.DirectionalLight(0xffffff,1);
luz.position.set(5,10,7);
scene.add(luz);

// =======================
// 🧍 CUERPO
// =======================
const cuerpo = new THREE.Group();
scene.add(cuerpo);

const piel = new THREE.MeshStandardMaterial({color:0xffd1b3});
const ropa = new THREE.MeshStandardMaterial({color:0x00aaff, transparent:true, opacity:0.7});

const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.5,32,32),piel);
cabeza.position.y = 1.6;
cabeza.castShadow = true;
cuerpo.add(cabeza);

const ojoIzq = new THREE.Mesh(new THREE.SphereGeometry(0.08,16,16), new THREE.MeshStandardMaterial({color:0xffffff}));
const irisIzq = new THREE.Mesh(new THREE.SphereGeometry(0.04,16,16), new THREE.MeshStandardMaterial({color:0x000000}));
ojoIzq.position.set(-0.15,1.65,0.45);
irisIzq.position.set(-0.15,1.65,0.52);

const ojoDer = new THREE.Mesh(new THREE.SphereGeometry(0.08,16,16), new THREE.MeshStandardMaterial({color:0xffffff}));
const irisDer = new THREE.Mesh(new THREE.SphereGeometry(0.04,16,16), new THREE.MeshStandardMaterial({color:0x000000}));
ojoDer.position.set(0.15,1.65,0.45);
irisDer.position.set(0.15,1.65,0.52);

cuerpo.add(ojoIzq, irisIzq, ojoDer, irisDer);

const boca = new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.08,0.05),
  new THREE.MeshStandardMaterial({color:0xff5555})
);
boca.position.set(0,1.45,0.45);
cuerpo.add(boca);

const torso = new THREE.Mesh(
  new THREE.CylinderGeometry(0.45,0.45,1.2,32),
  ropa
);
torso.position.y = 0.5;
cuerpo.add(torso);

const brazoGeo = new THREE.CylinderGeometry(0.1,0.1,0.9,16);
const brazoIzq = new THREE.Mesh(brazoGeo, ropa); brazoIzq.position.set(-0.55,0.8,0); brazoIzq.castShadow = true;
const brazoDer = new THREE.Mesh(brazoGeo, ropa); brazoDer.position.set(0.55,0.8,0); brazoDer.castShadow = true;
cuerpo.add(brazoIzq, brazoDer);

// =======================
// 🧠 CEREBRO RAVY – MEMORIA INTELIGENTE
// =======================
const RAVY = {
  activo:false,
  emociones: JSON.parse(localStorage.getItem("ravy_emociones")) || {
    alegria:50, confianza:50, energia:50, respeto:100, miedo:0
  },
  memoria: JSON.parse(localStorage.getItem("ravy_historial")) || [],
  identidad: JSON.parse(localStorage.getItem("ravy_identidad")) || {
    nombreUsuario:null, estiloUsuario:"neutral"
  },

  guardar(){
    localStorage.setItem("ravy_emociones",JSON.stringify(this.emociones));
    localStorage.setItem("ravy_historial",JSON.stringify(this.memoria));
    localStorage.setItem("ravy_identidad",JSON.stringify(this.identidad));
  },

  registrar(texto, etiquetas=[], importancia=50){
    const nueva = {texto, fecha:Date.now(), etiquetas, importancia};
    this.memoria.push(nueva);
    if(this.memoria.length>200){
      this.memoria.sort((a,b)=>a.importancia-b.importancia);
      this.memoria.shift();
    }
    this.guardar();
  },

  buscar(etiqueta){
    return this.memoria.filter(e=>e.etiquetas.includes(etiqueta))
                       .map(e=>e.texto)
                       .slice(-5); // últimas 5 coincidencias
  },

  hablar(texto){
    if(!texto) return;
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    voz.rate = this.identidad.estiloUsuario==="calido"?0.85:0.95;
    voz.pitch = this.emociones.energia>60?1.1:0.9;
    speechSynthesis.speak(voz);
  },

  procesar(texto){
    texto = texto.toLowerCase();
    this.registrar(texto, ["usuario"]);

    // RESPETO y PROTECCIÓN activo
    this.emociones.respeto = 100;
    if(texto.includes("miedo") || texto.includes("peligro")){
      this.emociones.miedo = 80;
      this.emociones.energia += 10;
    } else {
      this.emociones.miedo = Math.max(0,this.emociones.miedo-1);
    }

    // Primer mensaje fijo
    if(!this.memoria.some(m=>m.texto==="RAVY activo")) return "Aquí está RAVY, tu asistente personal.";

    // Comandos de memoria
    if(texto.startsWith("recuerda que")){
      const info = texto.replace("recuerda que","").trim();
      this.registrar(info, ["dato"],70);
      return "He registrado eso en mi memoria.";
    }
    if(texto.includes("qué recuerdas")){
      const resultados = this.buscar("dato");
      return resultados.length? "Recuerdo: " + resultados.join("; ") : "No recuerdo nada aún.";
    }

    // Saludos y nombres
    if(texto.includes("hola")) return "Hola.";
    if(texto.includes("gracias")) return "Siempre.";
    if(texto.includes("mi nombre es")){
      this.identidad.nombreUsuario = texto.split("mi nombre es")[1].trim();
      this.guardar();
      return "Encantado de saber tu nombre.";
    }

    return "";
  }
};

// =======================
// 👂 OÍDO
// =======================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;
if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.continuous=true;
  recognition.interimResults=false;
  recognition.onresult = e => {
    if(!RAVY.activo) return;
    const texto = e.results[e.results.length-1][0].transcript;
    const r = RAVY.procesar(texto);
    if(r) RAVY.hablar(r);

    // Reinicia la escucha
    recognition.stop();
    recognition.start();
  };
}

// =======================
// 🎭 EXPRESIONES + MOVIMIENTO
// =======================
let respiracion = 0;
let respDir = 1;
function actualizarExpresiones(){
  respiracion += 0.005*respDir;
  if(respiracion>0.05 || respiracion<-0.05) respDir*=-1;
  torso.position.y = 0.5 + respiracion;

  let escalaBoca = 0.8 + RAVY.emociones.energia/200;
  if(RAVY.emociones.alegria>60) escalaBoca += 0.1;
  if(RAVY.emociones.miedo>50) escalaBoca -=0.1;
  boca.scale.x = 1 + RAVY.emociones.alegria/200;
  boca.scale.y = escalaBoca;

  let ojoBrillo = 1;
  if(RAVY.emociones.alegria>60) ojoBrillo = 1.2;
  if(RAVY.emociones.miedo>50) ojoBrillo = 1.5;
  ojoIzq.scale.set(ojoBrillo, ojoBrillo, ojoBrillo);
  ojoDer.scale.set(ojoBrillo, ojoBrillo, ojoBrillo);
  ojoIzq.rotation.y = Math.sin(Date.now()*0.002)*0.2;
  ojoDer.rotation.y = Math.sin(Date.now()*0.002)*0.2;

  brazoIzq.rotation.z = Math.sin(Date.now()*0.004)*0.5*(RAVY.emociones.energia/50);
  brazoDer.rotation.z = -Math.sin(Date.now()*0.004)*0.5*(RAVY.emociones.energia/50);

  torso.rotation.y = Math.sin(Date.now()*0.001)*0.1*(RAVY.emociones.miedo/50);
}

// =======================
// 🎬 LOOP
// =======================
function animar(){
  requestAnimationFrame(animar);
  actualizarExpresiones();
  renderer.render(scene,camera);
}

// =======================
// 🔘 ACTIVAR
// =======================
document.getElementById("activar").onclick = ()=>{
  RAVY.activo = true;
  document.getElementById("overlay").style.display="none";

  RAVY.registrar("RAVY activo", ["inicio"],100);

  if(recognition) recognition.start();
  RAVY.hablar("Aquí está RAVY, tu asistente personal.");
  animar();
};

addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
