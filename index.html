<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAVY – Tu asistente personal</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      overflow: hidden;
    }

    /* ================= LOGIN ================= */
    #login {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 20px;
      background: radial-gradient(circle, #001122, #000);
    }

    #login h1 {
      font-size: 28px;
      letter-spacing: 2px;
    }

    #login button {
      padding: 14px 26px;
      font-size: 16px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      background: linear-gradient(145deg, #00cfff, #0044ff);
      color: white;
      box-shadow: 0 0 20px #00cfff;
    }

    /* ================= RAVY ================= */
    #ravy {
      display: none;
      position: absolute;
      inset: 0;
    }

    /* Botón inicio */
    #inicio {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 5;
    }

    #inicio button {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      font-size: 26px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      color: white;
      background: radial-gradient(circle, #00ffff, #0044ff);
      box-shadow: 0 0 60px #00ffff;
    }

    /* Controles */
    #controles {
      position: absolute;
      bottom: 25px;
      width: 100%;
      display: none;
      justify-content: center;
      gap: 20px;
      z-index: 5;
    }

    .control {
      width: 130px;
      height: 46px;
      border-radius: 30px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      color: white;
      background: linear-gradient(145deg, #111, #333);
      box-shadow: 0 0 15px #00cfff;
    }

    .control:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <!-- ================= LOGIN ================= -->
  <div id="login">
    <h1>Bienvenido a RAVY</h1>
    <button onclick="loginGoogle()">Entrar con Google</button>
  </div>

  <!-- ================= RAVY ================= -->
  <div id="ravy">
    <!-- Botón inicio -->
    <div id="inicio">
      <button onclick="activarRAVY()">RAVY</button>
    </div>

    <!-- Controles -->
    <div id="controles">
      <button class="control" onclick="escuchar()">Escuchar</button>
      <button class="control" onclick="responder()">Responder</button>
      <button class="control" onclick="reposo()">Reposo</button>
    </div>
  </div>

  <!-- ================= LIBRERÍAS ================= -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

  <!-- ================= MÓDULOS ================= -->
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/ravy-core.js"></script>

</body>
</html>
