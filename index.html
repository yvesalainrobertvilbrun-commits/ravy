<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Nivel 15</title>

<style>
body{margin:0;background:black;overflow:hidden;font-family:Arial;}
#overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;}
button{
  width:120px;height:120px;border-radius:50%;border:none;
  font-size:22px;font-weight:bold;color:white;
  background:linear-gradient(145deg,#00ffff,#008cff);
  box-shadow:0 0 30px #00aaff;
}
</style>
</head>

<body>

<div id="overlay">
  <button id="activar">RAVY</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
// =======================
// 🌌 ESCENA
// =======================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.7));
const luz = new THREE.DirectionalLight(0xffffff,1);
luz.position.set(5,10,7);
scene.add(luz);

// =======================
// 🧍 CUERPO
// =======================
const cuerpo = new THREE.Group();
scene.add(cuerpo);

const piel = new THREE.MeshStandardMaterial({color:0xffd1b3});
const ropa = new THREE.MeshStandardMaterial({color:0x00aaff});

const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.5,32,32),piel);
cabeza.position.y=1.6;
cuerpo.add(cabeza);

const ojoGeo = new THREE.SphereGeometry(0.06,16,16);
const ojoMat = new THREE.MeshStandardMaterial({color:0x000000});
const ojoIzq = new THREE.Mesh(ojoGeo,ojoMat);
const ojoDer = new THREE.Mesh(ojoGeo,ojoMat);
ojoIzq.position.set(-0.15,1.65,0.45);
ojoDer.position.set(0.15,1.65,0.45);
cuerpo.add(ojoIzq,ojoDer);

const boca = new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.08,0.05),
  new THREE.MeshStandardMaterial({color:0xff5555})
);
boca.position.set(0,1.45,0.45);
cuerpo.add(boca);

const torso = new THREE.Mesh(
  new THREE.CylinderGeometry(0.45,0.45,1.2,32),
  ropa
);
torso.position.y=0.5;
cuerpo.add(torso);

// =======================
// 🧠 CEREBRO NIVEL 15
// =======================
const RAVY = {
  activo:false,
  estado:"reposo",
  ultimoDialogo:Date.now(),

  emociones: JSON.parse(localStorage.getItem("ravy_emociones")) || {
    animo:50,
    energia:50,
    apego:20
  },

  guardar(){
    localStorage.setItem("ravy_emociones",JSON.stringify(this.emociones));
  },

  hablar(texto){
    if(!texto || this.estado==="hablando") return;
    this.estado="hablando";
    const voz=new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    voz.rate=0.9;
    voz.onend=()=>this.estado="reposo";
    speechSynthesis.speak(voz);
    this.ultimoDialogo=Date.now();
  },

  procesar(texto){
    texto=texto.toLowerCase();
    this.ultimoDialogo=Date.now();

    if(texto.includes("gracias")){
      this.emociones.apego+=4;
      this.emociones.animo+=6;
    }

    if(texto.includes("mal")){
      this.emociones.animo-=5;
    }

    this.emociones.animo=Math.max(0,Math.min(100,this.emociones.animo));
    this.emociones.apego=Math.max(0,Math.min(100,this.emociones.apego));
    this.guardar();

    return "Estoy contigo.";
  },

  iniciativa(){
    if(!this.activo || this.estado==="hablando") return;

    const silencio = (Date.now()-this.ultimoDialogo)/1000;

    if(silencio>15 && this.emociones.apego>50){
      this.hablar("Sigo aquí. No tienes que decir nada.");
    }
    else if(silencio>20 && this.emociones.animo<40){
      this.hablar("Percibo silencio… ¿estás bien?");
    }
    else if(silencio>30){
      this.hablar("Te estoy acompañando.");
    }
  }
};

// =======================
// 👂 OÍDO
// =======================
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

if(SR){
  recognition = new SR();
  recognition.lang="es-ES";
  recognition.continuous=true;

  recognition.onresult=e=>{
    if(!RAVY.activo) return;
    const texto=e.results[e.results.length-1][0].transcript;
    const r=RAVY.procesar(texto);
    RAVY.hablar(r);
  };
}

// =======================
// ❤️ VIDA
// =======================
let t=0;
function vida(){
  t+=0.03;
  torso.scale.y=1+Math.sin(t)*0.02;
  boca.scale.y=RAVY.estado==="hablando"?1.2:0.6;
}

// =======================
// 🎬 LOOP
// =======================
function animar(){
  requestAnimationFrame(animar);
  vida();
  RAVY.iniciativa();
  renderer.render(scene,camera);
}

// =======================
// 🔘 ACTIVAR
// =======================
document.getElementById("activar").onclick=()=>{
  document.getElementById("overlay").style.display="none";
  RAVY.activo=true;
  if(recognition) recognition.start();
  RAVY.hablar("Estoy despierto. No necesitas llamarme.");
  animar();
};

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
