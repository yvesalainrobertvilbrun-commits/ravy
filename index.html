<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Nivel 3 Memoria Inteligente</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

/* ---------- INICIO ---------- */
#inicio{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}
#inicio button{
  width:160px;
  height:160px;
  border-radius:50%;
  border:none;
  font-size:26px;
  font-weight:bold;
  color:white;
  background:radial-gradient(circle,#00ffff,#0066ff);
  box-shadow:0 0 50px #00ffff;
  cursor:pointer;
}

/* ---------- CONTROLES ---------- */
#controles{
  position:absolute;
  bottom:25px;
  width:100%;
  display:none;
  justify-content:center;
  gap:25px;
  z-index:10;
}
.control{
  width:120px;
  height:48px;
  border-radius:30px;
  border:none;
  font-weight:bold;
  font-size:14px;
  color:white;
  cursor:pointer;
  background:linear-gradient(145deg,#111,#333);
  box-shadow:0 0 18px #00ffff;
  transition: all 0.2s ease-in-out;
}
.control:hover{ 
  transform:scale(1.05);
  box-shadow:0 0 25px #00ffff;
}

/* ---------- ESTADO DE LUZ ---------- */
#estado{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:60px;
  height:60px;
  border-radius:50%;
  background:rgba(0,191,255,0.5);
  box-shadow:0 0 25px #00bfff, 0 0 50px #00bfff inset;
  display:none;
}

/* ---------- MENSAJES ---------- */
#mensaje{
  position:absolute;
  top:100px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  font-size:16px;
  z-index:15;
}
</style>
</head>

<body>

<!-- INICIO -->
<div id="inicio">
  <button onclick="activarRAVY()">RAVY</button>
</div>

<!-- MENSAJE DE ESTADO -->
<div id="mensaje"></div>

<!-- LUZ AZUL -->
<div id="estado"></div>

<!-- CONTROLES -->
<div id="controles">
  <button class="control" onclick="escuchar()">Escuchar</button>
  <button class="control" onclick="responder()">Responder</button>
  <button class="control" onclick="reposo()">Reposo</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
/* ================= ESCENA ================= */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z = 6;
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);
scene.add(new THREE.AmbientLight(0xffffff,0.7));
const luz = new THREE.DirectionalLight(0xffffff,1);
luz.position.set(5,10,7);
scene.add(luz);

/* ================= MEMORIA NIVEL 3 ================= */
const memoriaRavy = JSON.parse(localStorage.getItem("ravy_memoria")) || {
  historial:[],
  temas:{},
  preferencias:{},
  emocion:{alegria:60,confianza:60},
  ultimoTema:null,
  resumen:""
};

function guardarMemoria(){ localStorage.setItem("ravy_memoria",JSON.stringify(memoriaRavy)); }

/* ================= VOZ ================= */
function hablar(texto){
  const u = new SpeechSynthesisUtterance(texto);
  u.lang="es-ES";
  u.rate=0.95;
  speechSynthesis.speak(u);
}

/* ================= MIC ================= */
let recognition;
let ultimaEntrada="";
const mensajeDiv = document.getElementById("mensaje");

if(!('SpeechRecognition' in window) && !('webkitSpeechRecognition' in window)){
  mensajeDiv.innerText = "Micrófono no soportado en este navegador.";
}else{
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = "es-ES";
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = ()=>{
    mensajeDiv.innerText = "RAVY está escuchando...";
    estadoLuz(true);
  };

  recognition.onend = ()=>{
    mensajeDiv.innerText = "Micrófono inactivo";
    estadoLuz(false);
  };

  recognition.onerror = (e)=>{
    mensajeDiv.innerText = "Error en micrófono: " + e.error;
    estadoLuz(false);
  };

  recognition.onresult = e=>{
    ultimaEntrada = e.results[0][0].transcript.toLowerCase();
    mensajeDiv.innerText = `Escuché: "${ultimaEntrada}"`;
    procesarMemoria(ultimaEntrada);
    hablar("Entendido.");
  };
}

/* ================= MEMORIA SEMÁNTICA Y AUTÓNOMA ================= */
function procesarMemoria(texto){
  memoriaRavy.historial.push(texto);

  const claves = {
    musica:["musica","canción","artista"],
    familia:["familia","hijo","esposa","madre"],
    trabajo:["trabajo","negocio","proyecto"],
    tiempo:["hora","día","noche"]
  };

  for(const tema in claves){
    if(claves[tema].some(p=>texto.includes(p))){
      memoriaRavy.temas[tema]=(memoriaRavy.temas[tema]||0)+1;
      memoriaRavy.ultimoTema=tema;
    }
  }

  if(texto.includes("me gusta")) memoriaRavy.preferencias[texto]=true;

  // Incrementar alegría automáticamente
  memoriaRavy.emocion.alegria=Math.min(100,memoriaRavy.emocion.alegria+1);

  // 🔹 Aprendizaje autónomo: generar resumen automático
  if(memoriaRavy.historial.length>5){
    memoriaRavy.resumen = "Hemos hablado sobre: " + Object.keys(memoriaRavy.temas).join(", ");
  }

  guardarMemoria();
}

/* ================= IA NIVEL 3 ================= */
function IA_Real(entrada){
  const h = new Date().getHours();

  if(entrada.includes("hora")){
    const d = new Date();
    return `Ahora mismo son las ${d.getHours()} y ${d.getMinutes()}.`;
  }

  if(entrada.includes("buenos")){
    if(h<12) return "Buenos días, estoy contigo.";
    if(h<18) return "Buenas tardes, aquí estoy.";
    return "Buenas noches, sigo atento a ti.";
  }

  if(entrada.includes("quien eres")){
    return "Aquí está RAVY, tu asistente personal.";
  }

  if(memoriaRavy.resumen){
    return `Según lo que recuerdo: ${memoriaRavy.resumen}. Te escucho con atención.`;
  }

  if(memoriaRavy.ultimoTema){
    return `Seguimos hablando sobre ${memoriaRavy.ultimoTema}. Te escucho.`;
  }

  return "Te escucho con atención.";
}

/* ================= RESPONDER ================= */
function responder(){
  if(!ultimaEntrada){ hablar("Aún no me has dicho nada."); return; }
  const r = IA_Real(ultimaEntrada);
  hablar(r);
  ultimaEntrada="";
}

/* ================= CONTROLES ================= */
function escuchar(){ 
  if(recognition){ recognition.start(); } 
}

function activarRAVY(){
  document.getElementById("inicio").style.display="none";
  document.getElementById("controles").style.display="flex";
  animarLuz();
  hablar("Aquí está RAVY, tu asistente personal.");
}

function reposo(){ location.reload(); }

/* ================= LUZ AZUL ================= */
const luzDiv = document.getElementById("estado");
let brillo=0.5;
let dir=0.005;
function animarLuz(){
  luzDiv.style.display="block";
  requestAnimationFrame(animarLuz);
  brillo+=dir;
  if(brillo>0.9 || brillo<0.5) dir*=-1;
  luzDiv.style.boxShadow=`0 0 ${20+brillo*30}px #00bfff, 0 0 ${50+brillo*50}px #00bfff inset`;
  luzDiv.style.background=`rgba(0,191,255,${0.3+brillo/2})`;
}
function estadoLuz(encendido){
  luzDiv.style.display = encendido ? "block" : "none";
}

/* ================= ANIMACIÓN ================= */
function animar(){ requestAnimationFrame(animar); renderer.render(scene,camera); }

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
