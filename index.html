<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Voz Viva</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
}
#overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}
button{
  width:120px;
  height:120px;
  border-radius:50%;
  border:none;
  font-size:22px;
  font-weight:bold;
  color:white;
  background:linear-gradient(145deg,#00ffff,#008cff);
  box-shadow:0 0 30px #00aaff;
}
</style>
</head>

<body>

<div id="overlay">
  <button id="activar">RAVY</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
// =======================
// 🌌 ESCENA
// =======================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.7));
const luz = new THREE.DirectionalLight(0xffffff,1);
luz.position.set(5,10,7);
scene.add(luz);

// =======================
// 🧍 CUERPO
// =======================
const cuerpo = new THREE.Group();
scene.add(cuerpo);

const piel = new THREE.MeshStandardMaterial({color:0xffd1b3});
const ropa = new THREE.MeshStandardMaterial({color:0x00aaff});

const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.5,32,32),piel);
cabeza.position.y = 1.6;
cuerpo.add(cabeza);

// OJOS
const ojoMat = new THREE.MeshStandardMaterial({color:0xffffff});
const irisMat = new THREE.MeshStandardMaterial({color:0x000000});

const ojoIzq = new THREE.Mesh(new THREE.SphereGeometry(0.08,16,16),ojoMat);
const ojoDer = new THREE.Mesh(new THREE.SphereGeometry(0.08,16,16),ojoMat);
ojoIzq.position.set(-0.15,1.65,0.45);
ojoDer.position.set(0.15,1.65,0.45);

const irisIzq = new THREE.Mesh(new THREE.SphereGeometry(0.04,16,16),irisMat);
const irisDer = new THREE.Mesh(new THREE.SphereGeometry(0.04,16,16),irisMat);
irisIzq.position.set(-0.15,1.65,0.52);
irisDer.position.set(0.15,1.65,0.52);

cuerpo.add(ojoIzq, ojoDer, irisIzq, irisDer);

// BOCA
const boca = new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.08,0.05),
  new THREE.MeshStandardMaterial({color:0xff5555})
);
boca.position.set(0,1.45,0.45);
cuerpo.add(boca);

// TORSO
const torso = new THREE.Mesh(
  new THREE.CylinderGeometry(0.45,0.45,1.2,32),
  ropa
);
torso.position.y = 0.5;
cuerpo.add(torso);

// =======================
// 🧠 RAVY – RESPETO & PROTECCIÓN
// =======================
const RAVY = {
  activo:false,
  emociones:{ alegria:60, confianza:100, energia:60 },

  hablar(texto){
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    voz.rate=0.9;
    speechSynthesis.speak(voz);
  },

  procesar(texto){
    texto = texto.toLowerCase();
    if(texto.includes("gracias")) return "Siempre te protegeré.";
    if(texto.includes("hola")) return "Estoy aquí contigo.";
    return "Te escucho. Estoy atento.";
  }
};

// =======================
// 👂 RECONOCIMIENTO
// =======================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.continuous=true;
  recognition.onresult = e=>{
    if(!RAVY.activo) return;
    const texto = e.results[e.results.length-1][0].transcript;
    RAVY.hablar(RAVY.procesar(texto));
  };
}

// =======================
// 🔊 SENSOR DE VOZ (EMOCIÓN)
// =======================
let audioCtx, analyser, mic, data;

async function iniciarMicrofono(){
  audioCtx = new AudioContext();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  data = new Uint8Array(analyser.frequencyBinCount);

  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  mic = audioCtx.createMediaStreamSource(stream);
  mic.connect(analyser);
}

function analizarVoz(){
  if(!analyser) return;

  analyser.getByteFrequencyData(data);
  let volumen = data.reduce((a,b)=>a+b,0)/data.length;

  RAVY.emociones.energia = Math.min(100, volumen);
  RAVY.emociones.alegria = Math.min(100, 50 + volumen/2);
}

// =======================
// 👁️ MIRADA
// =======================
let mouseX=0, mouseY=0;
addEventListener("mousemove",e=>{
  mouseX=(e.clientX/innerWidth-0.5)*0.4;
  mouseY=(e.clientY/innerHeight-0.5)*0.4;
});

function actualizarMirada(){
  irisIzq.position.x = -0.15 + mouseX;
  irisDer.position.x =  0.15 + mouseX;
  irisIzq.position.y = 1.65 - mouseY;
  irisDer.position.y = 1.65 - mouseY;
}

// =======================
// ❤️ VIDA
// =======================
let t=0;
function actualizarVida(){
  t+=0.02;
  analizarVoz();

  torso.scale.y = 1 + Math.sin(t)*0.04;
  boca.scale.x = 1 + RAVY.emociones.alegria/200;
  boca.scale.y = 0.7 + RAVY.emociones.energia/200;

  const parp = Math.abs(Math.sin(t*0.5))*0.1;
  ojoIzq.scale.y = 1-parp;
  ojoDer.scale.y = 1-parp;

  actualizarMirada();
}

// =======================
// 🎬 LOOP
// =======================
function animar(){
  requestAnimationFrame(animar);
  actualizarVida();
  renderer.render(scene,camera);
}

// =======================
// 🔘 ACTIVAR
// =======================
document.getElementById("activar").onclick = async ()=>{
  document.getElementById("overlay").style.display="none";
  RAVY.activo=true;
  await iniciarMicrofono();
  if(recognition) recognition.start();
  RAVY.hablar("Te siento. Estoy contigo.");
  animar();
};

addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
