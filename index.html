<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY 3D</title>
<style>
body { background:black; color:#00aaff; font-family:Arial,sans-serif; text-align:center; padding:30px; }
#cuerpo-ravy-3d { width:160px; margin:30px auto; position:relative; }
#cabeza { width:100px; height:100px; margin:0 auto; background:radial-gradient(circle at center, rgba(0,170,255,0.7), rgba(0,170,255,0.2)); border-radius:50%; position:relative; box-shadow:0 0 40px rgba(0,170,255,0.7),0 0 80px rgba(0,170,255,0.3); transition:transform 0.1s, box-shadow 0.1s; }
#torso { width:60px; height:100px; margin:-10px auto 0; background:rgba(0,170,255,0.6); border-radius:30px; box-shadow:0 0 30px rgba(0,170,255,0.6); transition:transform 0.1s; }
.brazo { width:20px; height:80px; background:rgba(0,170,255,0.5); position:absolute; top:30px; border-radius:10px; transition:transform 0.1s; }
#brazo-izq { left:-20px; transform-origin:top center; }
#brazo-der { right:-20px; transform-origin:top center; }
.ojo { width:15px; height:15px; background:white; border-radius:50%; position:absolute; top:30px; }
.ojo.izquierdo { left:20px; }
.ojo.derecho { right:20px; }
.boca { width:40px; height:10px; border-bottom:3px solid white; border-radius:0 0 20px 20px; position:absolute; bottom:20px; left:50%; transform:translateX(-50%); transition:transform 0.1s; }
button { background:#00aaff; color:black; border:none; padding:12px 20px; font-size:16px; border-radius:8px; cursor:pointer; margin-top:20px; }
</style>
</head>
<body>

<h1>RAVY 3D</h1>
<p>Presiona el botón para activarme y dar órdenes</p>

<div id="cuerpo-ravy-3d">
  <div id="cabeza">
    <div class="ojo izquierdo"></div>
    <div class="ojo derecho"></div>
    <div class="boca"></div>
  </div>
  <div id="torso"></div>
  <div id="brazo-izq" class="brazo"></div>
  <div id="brazo-der" class="brazo"></div>
</div>

<button id="activar-ravy">Despertar a RAVY</button>

<script>
const RAVY = {
  nombre:"RAVY",
  idioma:"es-ES",
  activo:false,
  contexto:{},

  ejecutarOrden(texto){
    let frases=[];
    let idioma=this.idioma;
    const t = texto.toLowerCase();

    if(t.includes("hola")) frases=["Hola, aquí estoy 😊"];
    else if(t.includes("estado") || t.includes("cómo estás")) frases=["Activo y listo para ayudarte 💙"];
    else if(t.includes("abre google") || t.includes("google")){ frases=["Abriendo Google..."]; window.open("https://www.google.com","_blank"); }
    else if(t.includes("hora") || t.includes("qué hora")){ const ahora=new Date(); frases=[`La hora actual es ${ahora.getHours()}:${ahora.getMinutes()}`]; }
    else if(t.includes("chiste")) frases=["¿Por qué la computadora fue al doctor? Porque tenía un virus 😂"];
    else if(t.includes("enciende luz") || t.includes("luz")){ 
      frases=["Encendiendo efecto luminoso..."]; 
      const torso=document.getElementById("torso");
      torso.style.background="rgba(255,255,0,0.8)";
      setTimeout(()=>torso.style.background="rgba(0,170,255,0.6)",1000);
    }
    else frases=[];

    this.contexto.ultimoTexto=texto;
    this.contexto.ultimaRespuesta=frases;
    return {frases, idioma};
  }
};

function hablar(frases, idioma){
  if(frases.length===0) return;
  frases.forEach((frase,i)=>{
    setTimeout(()=>{
      const voz=new SpeechSynthesisUtterance(frase);
      voz.lang=idioma;
      speechSynthesis.speak(voz);
    },i*1800);
  });
}

// ===== RECONOCIMIENTO DE VOZ Y AUDIO PARA ANIMACIONES =====
let recognition;
let audioContext, analyser, microphone, dataArray;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.interimResults=false;
  recognition.continuous=true;

  recognition.onresult=function(event){
    if(!RAVY.activo) return;
    const texto=event.results[event.results.length-1][0].transcript;
    const {frases, idioma}=RAVY.ejecutarOrden(texto);
    hablar(frases, idioma);
  };
}

// ===== BOTÓN ACTIVAR =====
document.getElementById("activar-ravy").addEventListener("click", async ()=>{
  RAVY.activo=true;

  // Iniciar reconocimiento de voz
  if(recognition) recognition.start();

  // Iniciar audio para animación 3D
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    microphone = audioContext.createMediaStreamSource(stream);
    analyser = audioContext.createAnalyser();
    microphone.connect(analyser);
    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    requestAnimationFrame(animarCuerpo);
  } catch(e) {
    console.log("Micrófono no disponible:", e);
  }
});

// ===== ANIMAR CUERPO 3D SEGÚN VOZ =====
function animarCuerpo(){
  if(RAVY.activo && analyser){
    analyser.getByteFrequencyData(dataArray);
    let volumen = dataArray.reduce((a,b)=>a+b,0)/dataArray.length;

    const cabeza=document.getElementById("cabeza");
    const boca=document.querySelector(".boca");
    const torso=document.getElementById("torso");
    const brazoIzq=document.getElementById("brazo-izq");
    const brazoDer=document.getElementById("brazo-der");

    // Movimiento según volumen
    let escalaCabeza = 1 + volumen/400;
    cabeza.style.transform=`scale(${escalaCabeza}) rotate(${volumen/50-1}deg)`;
    boca.style.transform=`scaleY(${1 + volumen/200})`;
    torso.style.transform=`translateY(${volumen/120}px)`;
    brazoIzq.style.transform=`rotate(${volumen/15-3}deg)`;
    brazoDer.style.transform=`rotate(${-volumen/15+3}deg)`;

    requestAnimationFrame(animarCuerpo);
  }
}
</script>

</body>
</html>
