<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RAVY</title>

<style>
body{
  margin:0;
  height:100vh;
  background:radial-gradient(circle at top,#0f2027,#000);
  font-family:system-ui, Arial;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ========== INICIO ========== */
#inicio{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

#btnInicio{
  padding:28px 90px;
  font-size:30px;
  font-weight:600;
  border:none;
  border-radius:60px;
  background:linear-gradient(135deg,#00f2ff,#007bff);
  cursor:pointer;
  box-shadow:0 0 40px #00f2ff88;
  transition:.3s;
}
#btnInicio:hover{
  transform:scale(1.08);
}

/* ========== RAVY ========== */
#ravy{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

/* Avatar */
#avatar{
  width:160px;
  height:160px;
  border-radius:50%;
  background:radial-gradient(circle at top,#00f2ff,#004d66);
  box-shadow:0 0 45px #00f2ff88;
  animation:respirar 4s ease-in-out infinite;
}

.hablando{
  animation:hablar .35s infinite alternate;
}

@keyframes respirar{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.04); }
}
@keyframes hablar{
  from{ transform:scale(1.02); }
  to{ transform:scale(1.09); }
}

#estado{
  font-size:15px;
  opacity:.85;
}

/* ========== BOTONES PRO ========== */
.panel{
  display:flex;
  gap:18px;
}

.btn{
  min-width:140px;
  padding:15px 22px;
  border:none;
  border-radius:18px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:.25s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.btn:active{
  transform:scale(0.95);
}

/* Escuchar */
.listen{
  background:linear-gradient(135deg,#00ffb3,#00b37a);
  color:#003b2a;
  box-shadow:0 8px 20px #00ffb355;
}
.listen:hover{
  box-shadow:0 12px 30px #00ffb399;
}

/* Responder */
.think{
  background:linear-gradient(135deg,#00aaff,#0066cc);
  color:#001f2f;
  box-shadow:0 8px 20px #00aaff55;
}
.think:hover{
  box-shadow:0 12px 30px #00aaff99;
}

/* Reposo */
.sleep{
  background:linear-gradient(135deg,#ff4d4d,#b30000);
  color:#330000;
  width:240px;
  margin-top:10px;
  box-shadow:0 8px 25px #ff4d4d66;
}
.sleep:hover{
  box-shadow:0 12px 35px #ff4d4daa;
}
</style>
</head>

<body>

<!-- INICIO -->
<div id="inicio">
  <button id="btnInicio">RAVY</button>
</div>

<!-- RAVY -->
<div id="ravy">
  <div id="avatar"></div>
  <div id="estado">Modo reposo</div>

  <div class="panel">
    <button class="btn listen" onclick="escuchar()">🎤 Escuchar</button>
    <button class="btn think" onclick="responder()">🧠 Responder</button>
  </div>

  <button class="btn sleep" onclick="reposo()">💤 Reposo</button>
</div>

<script>
/* ================= MEMORIA ================= */
let memoriaRavy = JSON.parse(localStorage.getItem("memoriaRavy")) || {
  usuario:{ nombre:"" },
  corto:[],
  largo:[],
  resumen:"",
  trato:"neutral"
};

function guardar(){
  localStorage.setItem("memoriaRavy",JSON.stringify(memoriaRavy));
}

/* ================= VOZ ================= */
function hablar(texto){
  const voz = new SpeechSynthesisUtterance(texto);
  voz.lang="es-ES";
  voz.rate=0.95;
  speechSynthesis.cancel();
  avatar.classList.add("hablando");
  speechSynthesis.speak(voz);
  voz.onend=()=>avatar.classList.remove("hablando");
}

/* ================= RECONOCIMIENTO ================= */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SR();
recognition.lang="es-ES";
recognition.continuous=false;

let ultimaEntrada="";

recognition.onresult=e=>{
  ultimaEntrada=e.results[0][0].transcript.toLowerCase();
  estado.textContent="Escuchado. Pulsa responder.";

  memoriaRavy.corto.push(ultimaEntrada);
  if(memoriaRavy.corto.length>5){
    crearResumen();
    memoriaRavy.corto=[];
  }
  guardar();
};

/* ================= MEMORIA ================= */
function crearResumen(){
  const idea = memoriaRavy.corto.join(" | ");
  memoriaRavy.largo.push(idea);
  if(memoriaRavy.largo.length>20) memoriaRavy.largo.shift();
  memoriaRavy.resumen =
    "Últimos temas: " + memoriaRavy.largo.slice(-3).join(" / ");
}

/* ================= RESPUESTA ================= */
function responder(){
  if(!ultimaEntrada){
    hablar("Te escucho cuando quieras.");
    return;
  }

  let r="";

  if(ultimaEntrada.includes("hola")||ultimaEntrada.includes("buenos")){
    r="Aquí está RAVY, tu asistente personal.";
  }
  else if(ultimaEntrada.includes("mi nombre es")){
    memoriaRavy.usuario.nombre=
      ultimaEntrada.split("mi nombre es")[1].trim();
    guardar();
    r="Perfecto, lo recordaré.";
  }
  else if(ultimaEntrada.includes("hora")){
    const d=new Date();
    r=`Son las ${d.getHours()} y ${d.getMinutes()}.`;
  }
  else if(ultimaEntrada.includes("recuerdas")){
    r = memoriaRavy.resumen || "Aún estoy formando recuerdos.";
  }
  else{
    r="Te escucho.";
  }

  hablar(r);
  ultimaEntrada="";
}

/* ================= CONTROLES ================= */
function escuchar(){
  estado.textContent="Escuchando...";
  recognition.start();
}

function reposo(){
  ultimaEntrada="";
  document.getElementById("ravy").style.display="none";
  document.getElementById("inicio").style.display="flex";
}

/* ================= INICIO ================= */
btnInicio.onclick=()=>{
  document.getElementById("inicio").style.display="none";
  document.getElementById("ravy").style.display="flex";
  estado.textContent="Aquí está RAVY, tu asistente personal.";
  hablar("Aquí está RAVY, tu asistente personal.");
};
</script>

</body>
</html>
