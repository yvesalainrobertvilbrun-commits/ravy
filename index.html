<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Nivel 27</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

/* ---------- INICIO ---------- */
#inicio{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}
#inicio button{
  width:170px;
  height:170px;
  border-radius:50%;
  border:none;
  font-size:28px;
  font-weight:bold;
  color:white;
  background:radial-gradient(circle,#00ffff,#0044ff);
  box-shadow:0 0 60px #00ffff;
  cursor:pointer;
}

/* ---------- CONTROLES ---------- */
#controles{
  position:absolute;
  bottom:25px;
  width:100%;
  display:none;
  justify-content:center;
  gap:25px;
  z-index:10;
}
.control{
  width:130px;
  height:50px;
  border-radius:35px;
  border:none;
  font-weight:bold;
  font-size:14px;
  color:white;
  cursor:pointer;
  background:linear-gradient(145deg,#0a0a0a,#2a2a2a);
  box-shadow:0 0 20px #00ffff;
}
.control:hover{ transform:scale(1.08); }
</style>
</head>

<body>

<div id="inicio">
  <button onclick="activarRAVY()">RAVY</button>
</div>

<div id="controles">
  <button class="control" onclick="escuchar()">Escuchar</button>
  <button class="control" onclick="responder()">Responder</button>
  <button class="control" onclick="reposo()">Reposo</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
/* ================= ESCENA ================= */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);

/* ================= LUCES BASE ================= */
scene.add(new THREE.AmbientLight(0x003366,0.6));

/* ================= AVATAR (NO SE BORRA) ================= */
const cuerpo = new THREE.Group();
scene.add(cuerpo);

/* ================= NIVEL 27 – NÚCLEO DE IA ================= */

/* Núcleo */
const nucleoMat = new THREE.MeshStandardMaterial({
  color:0x00ffff,
  emissive:0x00ccff,
  emissiveIntensity:1.2,
  transparent:true,
  opacity:0.9
});

const nucleo = new THREE.Mesh(
  new THREE.SphereGeometry(0.6,64,64),
  nucleoMat
);
scene.add(nucleo);

/* Halo */
const halo = new THREE.Mesh(
  new THREE.TorusGeometry(1.1,0.05,32,100),
  new THREE.MeshBasicMaterial({
    color:0x00ffff,
    transparent:true,
    opacity:0.7
  })
);
scene.add(halo);

/* Luz dinámica */
const luzAzul = new THREE.PointLight(0x00ffff,2.5,10);
scene.add(luzAzul);

/* ================= MEMORIA ================= */
const memoriaRavy = JSON.parse(localStorage.getItem("ravy_memoria")) || {
  historial:[],
  temas:{},
  preferencias:{},
  emocion:{alegria:60,confianza:60},
  ultimoTema:null
};

function guardarMemoria(){
  localStorage.setItem("ravy_memoria",JSON.stringify(memoriaRavy));
}

/* ================= VOZ ================= */
let hablando = false;

function hablar(texto){
  hablando = true;
  const u = new SpeechSynthesisUtterance(texto);
  u.lang="es-ES";
  u.rate=0.95;
  u.onend = ()=> hablando=false;
  speechSynthesis.speak(u);
}

/* ================= MIC ================= */
let recognition;
let ultimaEntrada="";

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.onresult = e=>{
    ultimaEntrada = e.results[0][0].transcript.toLowerCase();
    procesarMemoria(ultimaEntrada);
    hablar("Entendido.");
  };
}

/* ================= MEMORIA SEMÁNTICA ================= */
function procesarMemoria(texto){
  memoriaRavy.historial.push(texto);
  if(texto.includes("hora")) memoriaRavy.ultimoTema="el tiempo";
  guardarMemoria();
}

/* ================= IA ================= */
function IA_Real(entrada){
  if(entrada.includes("hora")){
    const d=new Date();
    return `Ahora mismo son las ${d.getHours()} y ${d.getMinutes()}.`;
  }
  if(entrada.includes("quien eres")){
    return "Soy RAVY, una inteligencia diseñada para acompañarte.";
  }
  return "Te escucho con atención.";
}

/* ================= CONTROLES ================= */
function escuchar(){
  if(recognition) recognition.start();
}

function responder(){
  if(!ultimaEntrada){
    hablar("Estoy atento.");
    return;
  }
  hablar(IA_Real(ultimaEntrada));
  ultimaEntrada="";
}

function activarRAVY(){
  document.getElementById("inicio").style.display="none";
  document.getElementById("controles").style.display="flex";
  animar();
  hablar("RAVY activado.");
}

function reposo(){
  location.reload();
}

/* ================= ANIMACIÓN NIVEL 27 ================= */
let t=0;
function animar(){
  requestAnimationFrame(animar);
  t+=0.01;

  nucleo.scale.setScalar(1 + Math.sin(t*2)*0.05);
  halo.rotation.x += 0.003;
  halo.rotation.y += 0.006;

  if(hablando){
    luzAzul.intensity = 3 + Math.sin(t*10);
    nucleo.material.emissiveIntensity = 2;
  }else{
    luzAzul.intensity = 2;
    nucleo.material.emissiveIntensity = 1.2;
  }

  renderer.render(scene,camera);
}

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
