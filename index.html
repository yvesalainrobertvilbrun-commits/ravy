<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAVY</title>
  <style>
    body {
      background: black;
      color: #00aaff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px;
    }
    input {
      padding: 12px;
      width: 90%;
      max-width: 400px;
      border-radius: 8px;
      border: none;
      margin-bottom: 15px;
      font-size: 16px;
    }
    button {
      background: #00aaff;
      color: black;
      border: none;
      padding: 12px 18px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    /* CUERPO HUMANOIDE 3D BÁSICO */
    #cuerpo-ravy-3d {
      width: 120px;
      margin: 30px auto;
      position: relative;
    }

    #cabeza {
      width: 100px;
      height: 100px;
      margin: 0 auto;
      background: radial-gradient(circle at center, rgba(0,170,255,0.7), rgba(0,170,255,0.2));
      border-radius: 50%;
      position: relative;
      box-shadow: 0 0 40px rgba(0,170,255,0.7), 0 0 80px rgba(0,170,255,0.3);
      animation: pulso 2s infinite ease-in-out;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    #torso {
      width: 60px;
      height: 100px;
      margin: -10px auto 0;
      background: rgba(0,170,255,0.6);
      border-radius: 30px;
      box-shadow: 0 0 30px rgba(0,170,255,0.6);
    }

    .ojo {
      width: 15px;
      height: 15px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 30px;
    }

    .ojo.izquierdo {
      left: 20px;
    }

    .ojo.derecho {
      right: 20px;
    }

    .boca {
      width: 40px;
      height: 10px;
      border-bottom: 3px solid white;
      border-radius: 0 0 20px 20px;
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
    }

    @keyframes pulso {
      0% { transform: scale(1); opacity: 0.6; }
      25% { transform: scale(1.05); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
      75% { transform: scale(1.05); opacity: 0.8; }
      100% { transform: scale(1); opacity: 0.6; }
    }
  </style>
</head>
<body>

  <h1>RAVY</h1>
  <p>Escríbeme algo</p>

  <div id="cuerpo-ravy-3d">
    <div id="cabeza">
      <div class="ojo izquierdo"></div>
      <div class="ojo derecho"></div>
      <div class="boca"></div>
    </div>
    <div id="torso"></div>
  </div>

  <input id="entrada" placeholder="Habla conmigo..." />
  <br>
  <button onclick="responder()">Responder</button>

  <script>
    function responder() {
      const textoUsuario = document.getElementById("entrada").value.toLowerCase();
      let respuesta = "";
      let idioma = "es-ES";

      // Detectar idioma criollo haitiano
      if (textoUsuario.includes("bonjou") || textoUsuario.includes("kijan")) {
        respuesta = "Bonjou. Mwen la avèk ou. Mwen se RAVY.";
        idioma = "fr-FR";
      } 
      // Español
      else if (textoUsuario.includes("hola")) {
        respuesta = "Hola. Aquí está RAVY contigo.";
        idioma = "es-ES";
      } 
      else if (textoUsuario.includes("estado")) {
        respuesta = "Estoy activo, atento y evolucionando contigo.";
        idioma = "es-ES";
      } 
      else {
        respuesta = "Te escucho. Continúa.";
        idioma = "es-ES";
      }

      // Reproducir voz
      const voz = new SpeechSynthesisUtterance(respuesta);
      voz.lang = idioma;
      speechSynthesis.speak(voz);

      // Efecto visual: pulso más fuerte cuando habla
      const cabeza = document.getElementById("cabeza");
      cabeza.style.transform = "scale(1.2)";
      cabeza.style.boxShadow = "0 0 80px rgba(0,170,255,1), 0 0 150px rgba(0,170,255,0.5)";
      setTimeout(() => {
        cabeza.style.transform = "";
        cabeza.style.boxShadow = "0 0 40px rgba(0,170,255,0.7), 0 0 80px rgba(0,170,255,0.3)";
      }, 500);
    }
  </script>

</body>
</html>
