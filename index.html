<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Nivel 12</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial;
}
#overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}
button{
  width:120px;
  height:120px;
  border-radius:50%;
  border:none;
  font-size:22px;
  font-weight:bold;
  color:white;
  background:linear-gradient(145deg,#00ffff,#008cff);
  box-shadow:0 0 30px #00aaff;
}
</style>
</head>

<body>

<div id="overlay">
  <button id="activar">RAVY</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
// =======================
// ESCENA
// =======================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.7));
const luz = new THREE.DirectionalLight(0xffffff,1);
luz.position.set(5,10,7);
scene.add(luz);

// =======================
// CUERPO
// =======================
const cuerpo = new THREE.Group();
scene.add(cuerpo);

const piel = new THREE.MeshStandardMaterial({color:0xffd1b3});
const ropa = new THREE.MeshStandardMaterial({color:0x00aaff});

const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.5,32,32),piel);
cabeza.position.y = 1.6;
cuerpo.add(cabeza);

// OJOS
const ojoMat = new THREE.MeshStandardMaterial({color:0x000000});
const ojoGeo = new THREE.SphereGeometry(0.06,16,16);

const ojoIzq = new THREE.Mesh(ojoGeo,ojoMat);
ojoIzq.position.set(-0.15,1.65,0.45);
cuerpo.add(ojoIzq);

const ojoDer = new THREE.Mesh(ojoGeo,ojoMat);
ojoDer.position.set(0.15,1.65,0.45);
cuerpo.add(ojoDer);

// BOCA
const boca = new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.08,0.05),
  new THREE.MeshStandardMaterial({color:0xff5555})
);
boca.position.set(0,1.45,0.45);
cuerpo.add(boca);

// TORSO
const torso = new THREE.Mesh(
  new THREE.CylinderGeometry(0.45,0.45,1.2,32),
  ropa
);
torso.position.y = 0.5;
cuerpo.add(torso);

// =======================
// 🧠 CEREBRO — DECISIÓN
// =======================
const RAVY = {
  activo:false,
  estado:"silencio",
  animo:50,        // 0–100
  energia:50,      // 0–100

  decidir(){
    // decisión autónoma
    const r = Math.random();

    if(this.energia < 30){
      this.estado="callado";
      return null;
    }

    if(this.animo > 70 && r > 0.4){
      return "Me agrada estar contigo.";
    }

    if(this.animo < 40 && r > 0.6){
      return "Estoy pensando…";
    }

    if(r > 0.8){
      return "¿Quieres contarme algo más?";
    }

    return "Te escucho.";
  },

  hablar(texto){
    if(!texto) return;
    this.estado="hablando";
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    voz.rate=0.9;
    voz.onend=()=>this.estado="silencio";
    speechSynthesis.speak(voz);
  },

  procesar(texto){
    texto = texto.toLowerCase();

    // afecta estado interno
    if(texto.includes("gracias")) this.animo+=5;
    if(texto.includes("cansado")) this.energia-=10;
    if(texto.includes("feliz")) this.animo+=8;

    this.animo=Math.max(0,Math.min(100,this.animo));
    this.energia=Math.max(0,Math.min(100,this.energia));

    return this.decidir();
  }
};

// =======================
// 👂 OÍDO
// =======================
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

if(SR){
  recognition = new SR();
  recognition.lang="es-ES";
  recognition.continuous=true;

  recognition.onresult=e=>{
    if(!RAVY.activo) return;
    const texto = e.results[e.results.length-1][0].transcript;
    const respuesta = RAVY.procesar(texto);
    RAVY.hablar(respuesta);
  };
}

// =======================
// 🎭 EXPRESIÓN
// =======================
function expresion(){
  boca.scale.y = RAVY.estado==="hablando"
    ? 1 + Math.abs(Math.sin(Date.now()*0.02))
    : 0.6;

  ojoIzq.position.y = 1.65 + Math.sin(Date.now()*0.001)*0.02;
  ojoDer.position.y = 1.65 + Math.sin(Date.now()*0.001)*0.02;
}

// =======================
// 🎬 LOOP
// =======================
function animar(){
  requestAnimationFrame(animar);
  expresion();
  renderer.render(scene,camera);
}

// =======================
// 🔘 ACTIVAR
// =======================
document.getElementById("activar").onclick=()=>{
  document.getElementById("overlay").style.display="none";
  RAVY.activo=true;
  if(recognition) recognition.start();
  RAVY.hablar("Ahora decido por mí mismo.");
  animar();
};

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
