<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Registro y Asistente</title>
<style>
body{
  margin:0;
  background:black;
  font-family:Arial, sans-serif;
  overflow:hidden;
}

/* ---------- LOGIN ---------- */
#loginBox{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,50,0.95);
  z-index:20;
  color:white;
  text-align:center;
}
#loginBox input{
  display:block;
  margin:10px auto;
  padding:10px;
  border-radius:10px;
  border:none;
  width:70%;
  font-size:16px;
}
#loginBox button{
  margin-top:15px;
  padding:12px 25px;
  border:none;
  border-radius:15px;
  font-size:18px;
  font-weight:bold;
  color:white;
  background:linear-gradient(145deg,#00ffff,#0066ff);
  cursor:pointer;
  box-shadow:0 0 30px #00ffff;
}
#loginBox button:hover{
  transform:scale(1.05);
  box-shadow:0 0 50px #00ffff;
}

/* ---------- INICIO RAVY ---------- */
#inicio{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
  display:none;
}
#inicio button{
  width:160px;
  height:160px;
  border-radius:50%;
  border:none;
  font-size:26px;
  font-weight:bold;
  color:white;
  background:radial-gradient(circle,#00ffff,#0066ff);
  box-shadow:0 0 50px #00ffff;
  cursor:pointer;
}

/* ---------- CONTROLES ---------- */
#controles{
  position:absolute;
  bottom:25px;
  width:100%;
  display:none;
  justify-content:center;
  gap:25px;
  z-index:10;
}
.control{
  width:120px;
  height:48px;
  border-radius:30px;
  border:none;
  font-weight:bold;
  font-size:14px;
  color:white;
  cursor:pointer;
  background:linear-gradient(145deg,#111,#333);
  box-shadow:0 0 18px #00ffff;
}
.control:hover{ transform:scale(1.05); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Registro / Login RAVY</h2>
  <input type="text" id="usuario" placeholder="Nombre de usuario">
  <input type="password" id="password" placeholder="Contraseña">
  <button onclick="registrar()">Entrar</button>
  <p id="mensaje"></p>
</div>

<!-- INICIO -->
<div id="inicio">
  <button onclick="activarRAVY()">RAVY</button>
</div>

<!-- CONTROLES -->
<div id="controles">
  <button class="control" onclick="escuchar()">Escuchar</button>
  <button class="control" onclick="responder()">Responder</button>
  <button class="control" onclick="reposo()">Reposo</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
/* =================== LOGIN =================== */
function registrar(){
  const usuario = document.getElementById("usuario").value.trim();
  const pass = document.getElementById("password").value.trim();
  const mensaje = document.getElementById("mensaje");
  if(!usuario || !pass){
    mensaje.textContent="Completa todos los campos.";
    return;
  }
  const usuarios = JSON.parse(localStorage.getItem("usuariosRAVY"))||{};
  if(usuarios[usuario]){
    if(usuarios[usuario]===pass){
      mensaje.textContent="Bienvenido de nuevo "+usuario;
      setTimeout(()=>{loginExitoso();},1000);
    }else{
      mensaje.textContent="Contraseña incorrecta.";
    }
  }else{
    usuarios[usuario]=pass;
    localStorage.setItem("usuariosRAVY",JSON.stringify(usuarios));
    mensaje.textContent="Registro exitoso. Bienvenido "+usuario;
    setTimeout(()=>{loginExitoso();},1000);
  }
}
function loginExitoso(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("inicio").style.display="flex";
}

/* =================== ESCENA 3D =================== */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z=6;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.7));
const luz = new THREE.DirectionalLight(0xffffff,1);
luz.position.set(5,10,7);
scene.add(luz);

/* =================== LUZ AZUL (Avatar) =================== */
const luzRavy = new THREE.PointLight(0x1a75ff,1,10);
luzRavy.position.set(0,1,0);
scene.add(luzRavy);
let angulo=0;

/* =================== MEMORIA =================== */
const memoriaRavy = JSON.parse(localStorage.getItem("ravy_memoria"))||{
  historial:[],
  emocion:{alegria:60,confianza:60}
};
function guardarMemoria(){
  localStorage.setItem("ravy_memoria",JSON.stringify(memoriaRavy));
}

/* =================== VOZ =================== */
function hablar(texto){
  const u = new SpeechSynthesisUtterance(texto);
  u.lang="es-ES"; u.rate=0.95;
  speechSynthesis.speak(u);
}

/* =================== MIC =================== */
let recognition;
let ultimaEntrada="";
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.continuous=false;
  recognition.onresult = e=>{
    ultimaEntrada=e.results[0][0].transcript.toLowerCase();
    memoriaRavy.historial.push(ultimaEntrada);
    guardarMemoria();
    hablar("Entendido.");
  };
}

/* =================== IA =================== */
function IA_Real(entrada){
  const h=new Date().getHours();
  if(entrada.includes("hora")){
    const d=new Date();
    return `Ahora son las ${d.getHours()} y ${d.getMinutes()}`;
  }
  if(entrada.includes("buenos")){
    if(h<12) return "Buenos días, estoy contigo.";
    if(h<18) return "Buenas tardes, sigo atento a ti.";
    return "Buenas noches, estoy aquí.";
  }
  if(entrada.includes("quien eres")) return "Aquí está RAVY, tu asistente personal.";
  return "Te escucho con atención.";
}

/* =================== CONTROLES =================== */
function activarRAVY(){
  document.getElementById("inicio").style.display="none";
  document.getElementById("controles").style.display="flex";
  animar();
  hablar("Aquí está RAVY, tu asistente personal.");
}
function escuchar(){ if(recognition) recognition.start(); }
function responder(){ if(!ultimaEntrada){ hablar("Aún no me has dicho nada."); return; } const r=IA_Real(ultimaEntrada); hablar(r); ultimaEntrada=""; }
function reposo(){ location.reload(); }

/* =================== ANIMACIÓN =================== */
function animar(){
  requestAnimationFrame(animar);
  angulo+=0.02;
  luzRavy.position.x=Math.sin(angulo)*2;
  luzRavy.position.z=Math.cos(angulo)*2;
  luzRavy.position.y=1+Math.sin(angulo*2)*0.3;
  renderer.render(scene,camera);
}
addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
