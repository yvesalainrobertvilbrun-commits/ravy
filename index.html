<script>
// =======================
// 🧠 CEREBRO RAVY – NIVEL 15 (MEMORIA)
// =======================
const RAVY = {
  activo:false,
  modo:"reposo", // reposo | escuchar | responder

  emociones: JSON.parse(localStorage.getItem("ravy_emociones")) || {
    alegria:50,
    energia:50
  },

  identidad: JSON.parse(localStorage.getItem("ravy_identidad")) || {
    estiloUsuario:"neutral",
    saludos:0
  },

  memoria: JSON.parse(localStorage.getItem("ravy_memoria")) || {
    corta:[],
    persistente:[]
  },

  guardar(){
    localStorage.setItem("ravy_emociones",JSON.stringify(this.emociones));
    localStorage.setItem("ravy_identidad",JSON.stringify(this.identidad));
    localStorage.setItem("ravy_memoria",JSON.stringify(this.memoria));
  },

  // =======================
  // 🧠 MEMORIA
  // =======================
  recordar(texto){
    // memoria corta
    this.memoria.corta.push(texto);
    if(this.memoria.corta.length > 10) this.memoria.corta.shift();

    // memoria persistente
    this.memoria.persistente.push({
      texto,
      fecha:Date.now(),
      energia:this.emociones.energia,
      alegria:this.emociones.alegria
    });

    if(this.memoria.persistente.length > 300){
      this.memoria.persistente.shift();
    }

    this.guardar();
  },

  // =======================
  // 🧠 ANALIZAR
  // =======================
  analizar(texto){
    if(texto.includes("gracias") || texto.includes("por favor")){
      this.emociones.alegria += 2;
      this.identidad.estiloUsuario = "calido";
    }

    if(texto.length < 5){
      this.identidad.estiloUsuario = "directo";
    }
  },

  // =======================
  // 🗣️ PROCESAR
  // =======================
  procesar(texto){
    texto = texto.toLowerCase();
    this.recordar(texto);
    this.analizar(texto);

    // SALUDOS
    const hora = new Date().getHours();
    if(texto.includes("buenos días")){
      return "Buenos días. Estoy aquí contigo.";
    }
    if(texto.includes("buenas tardes")){
      return "Buenas tardes. Te escucho.";
    }
    if(texto.includes("buenas noches")){
      return "Buenas noches. Estoy atento.";
    }
    if(texto.includes("hola")){
      return "Hola. Dime.";
    }

    // CONVERSACIÓN NORMAL
    if(texto.includes("cómo estás")){
      return "Estoy bien y atento a ti.";
    }

    if(texto.includes("qué recuerdas")){
      return `Recuerdo ${this.memoria.persistente.length} momentos contigo.`;
    }

    return "Te escucho.";
  },

  // =======================
  // 🔊 HABLAR
  // =======================
  hablar(texto){
    if(this.modo !== "responder") return;

    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang="es-ES";
    voz.rate = this.identidad.estiloUsuario==="calido" ? 0.85 : 0.95;
    voz.pitch = 1;
    speechSynthesis.speak(voz);
  }
};

// =======================
// 👂 OÍDO
// =======================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.continuous=false;

  recognition.onresult = e=>{
    if(RAVY.modo !== "escuchar") return;
    const texto = e.results[0][0].transcript;
    const respuesta = RAVY.procesar(texto);
    RAVY.hablar(respuesta);
  };
}

// =======================
// 🔘 BOTONES
// =======================
function modoEscuchar(){
  RAVY.modo="escuchar";
  recognition && recognition.start();
}

function modoResponder(){
  RAVY.modo="responder";
}

function modoReposo(){
  RAVY.modo="reposo";
  RAVY.activo=false;
  location.reload();
}

// =======================
// 🔘 ACTIVAR PRINCIPAL
// =======================
document.getElementById("activar").onclick = ()=>{
  RAVY.activo=true;
  document.getElementById("overlay").style.display="none";
  RAVY.modo="responder";
  RAVY.hablar("Aquí está RAVY, tu asistente personal.");
  animar();
};
</script>
