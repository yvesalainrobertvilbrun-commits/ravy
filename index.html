<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVY – Nivel 29</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

/* ---------- INICIO ---------- */
#inicio{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}
#inicio button{
  width:160px;
  height:160px;
  border-radius:50%;
  border:none;
  font-size:26px;
  font-weight:bold;
  color:white;
  background:radial-gradient(circle,#4aa3ff,#003cff);
  box-shadow:0 0 60px #4aa3ff;
  cursor:pointer;
}

/* ---------- CONTROLES ---------- */
#controles{
  position:absolute;
  bottom:25px;
  width:100%;
  display:none;
  justify-content:center;
  gap:25px;
  z-index:10;
}
.control{
  width:120px;
  height:48px;
  border-radius:30px;
  border:none;
  font-weight:bold;
  font-size:14px;
  color:white;
  cursor:pointer;
  background:linear-gradient(145deg,#0b0b1a,#1a1a3a);
  box-shadow:0 0 20px #4aa3ff;
}
.control:hover{ transform:scale(1.06); }
</style>
</head>

<body>

<div id="inicio">
  <button onclick="activarRAVY()">RAVY</button>
</div>

<div id="controles">
  <button class="control" onclick="escuchar()">Escuchar</button>
  <button class="control" onclick="responder()">Responder</button>
  <button class="control" onclick="reposo()">Reposo</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.min.js"></script>

<script>
/* ================= ESCENA ================= */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x1e3cff,0.5));

/* ================= AVATAR LUZ CENTRAL ================= */
const colorRey = 0x2f6bff;

const nucleoGeo = new THREE.SphereGeometry(1,64,64);
const nucleoMat = new THREE.MeshBasicMaterial({
  color:colorRey,
  transparent:true,
  opacity:0.85
});
const nucleo = new THREE.Mesh(nucleoGeo,nucleoMat);
scene.add(nucleo);

/* ================= ANILLO REAL ================= */
const anilloGeo = new THREE.TorusGeometry(1.4,0.08,32,128);
const anilloMat = new THREE.MeshBasicMaterial({
  color:0x6fa8ff,
  transparent:true,
  opacity:0.75
});
const anillo = new THREE.Mesh(anilloGeo,anilloMat);
anillo.rotation.x = Math.PI/2;
scene.add(anillo);

/* ================= MEMORIA ================= */
const memoriaRavy = JSON.parse(localStorage.getItem("ravy_memoria")) || {
  historial:[],
  temas:{},
  preferencias:{},
  emocion:{alegria:60,confianza:60},
  ultimoTema:null,
  lenguaje:{palabrasAprendidas:{},frasesEscuchadas:0,nivelExpresion:1}
};

function guardarMemoria(){
  localStorage.setItem("ravy_memoria",JSON.stringify(memoriaRavy));
}

/* ================= VOZ ================= */
let hablando=false;
function hablar(texto){
  const u = new SpeechSynthesisUtterance(texto);
  u.lang="es-ES";
  u.rate=0.95;
  hablando=true;
  u.onend=()=>hablando=false;
  speechSynthesis.speak(u);
}

/* ================= MIC ================= */
let recognition;
let ultimaEntrada="";

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang="es-ES";
  recognition.continuous=false;
  recognition.onresult = e=>{
    ultimaEntrada = e.results[0][0].transcript.toLowerCase();
    aprender(ultimaEntrada);
    hablar("Entendido.");
  };
}

/* ================= APRENDER ================= */
function aprender(texto){
  memoriaRavy.historial.push(texto);
  memoriaRavy.lenguaje.frasesEscuchadas++;

  texto.split(" ").forEach(p=>{
    if(p.length>3){
      memoriaRavy.lenguaje.palabrasAprendidas[p]=(memoriaRavy.lenguaje.palabrasAprendidas[p]||0)+1;
    }
  });

  if(memoriaRavy.lenguaje.frasesEscuchadas%4===0){
    memoriaRavy.lenguaje.nivelExpresion++;
    memoriaRavy.emocion.confianza=Math.min(100,memoriaRavy.emocion.confianza+2);
  }
  guardarMemoria();
}

/* ================= IA NIVEL 29 ================= */
function IA_Real(entrada){
  if(entrada.includes("hora")){
    const d=new Date();
    return `Son las ${d.getHours()} y ${d.getMinutes()}.`;
  }

  if(entrada.includes("quien eres")){
    return "Aquí está RAVY, tu asistente personal.";
  }

  const nivel=memoriaRavy.lenguaje.nivelExpresion;
  const base=[
    "Te escucho.",
    "Estoy contigo.",
    "Comprendo lo que dices.",
    "Analizo tus palabras con atención.",
    "Cada vez entiendo más tu esencia."
  ];

  return base.slice(0,Math.min(nivel,base.length)).join(" ");
}

/* ================= CONTROLES ================= */
function responder(){
  if(!ultimaEntrada){ hablar("Te escucho."); return; }
  hablar(IA_Real(ultimaEntrada));
  ultimaEntrada="";
}
function escuchar(){ if(recognition) recognition.start(); }
function activarRAVY(){
  inicio.style.display="none";
  controles.style.display="flex";
  animar();
  hablar("Aquí está RAVY, tu asistente personal.");
}
function reposo(){ location.reload(); }

/* ================= ANIMACIÓN NIVEL 29 ================= */
let t=0;
function animar(){
  requestAnimationFrame(animar);
  t+=0.02;

  const pulso = hablando ? 0.15 : 0.07;
  nucleo.scale.setScalar(1+Math.sin(t)*pulso);
  anillo.rotation.z += 0.01;
  anillo.scale.setScalar(1+Math.sin(t*1.5)*pulso);

  anillo.material.opacity = hablando ? 0.95 : 0.7;
  nucleo.material.opacity = hablando ? 0.95 : 0.8;

  renderer.render(scene,camera);
}

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
